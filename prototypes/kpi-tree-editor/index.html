<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Structure — DXR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: "Inter", system-ui, sans-serif;
      --color-p0: oklch(0.982 0 0); --color-p1: oklch(1 0 0);
      --color-g0: oklch(1 0 0); --color-g1: oklch(0.991 0 0); --color-g2: oklch(0.982 0 0);
      --color-g3: oklch(0.955 0 0); --color-g4: oklch(0.931 0 0); --color-g5: oklch(0.91 0 0);
      --color-g6: oklch(0.885 0 0); --color-g7: oklch(0.851 0 0); --color-g8: oklch(0.792 0 0);
      --color-g9: oklch(0.643 0 0); --color-g10: oklch(0.507 0 0);
      --color-g11: oklch(0.361 0.003 286.228); --color-g12: oklch(0.21 0.004 286.059);
      --color-a1: oklch(0.994 0.001 286.376); --color-a2: oklch(0.982 0.008 271.33);
      --color-a3: oklch(0.961 0.018 269.09); --color-a4: oklch(0.933 0.032 266.166);
      --color-a5: oklch(0.901 0.048 267.198); --color-a6: oklch(0.857 0.07 268.824);
      --color-a7: oklch(0.804 0.098 270.675); --color-a8: oklch(0.73 0.139 271.732);
      --color-a9: oklch(0.571 0.235 271.643); --color-a10: oklch(0.526 0.213 271.816);
      --color-a11: oklch(0.511 0.213 271.713); --color-a12: oklch(0.312 0.107 271.681);
      --color-y1: oklch(0.994 0.003 84.559); --color-y2: oklch(0.981 0.02 84.59);
      --color-y3: oklch(0.954 0.047 83.943); --color-y4: oklch(0.928 0.065 78.977);
      --color-y5: oklch(0.902 0.086 77.209); --color-y6: oklch(0.866 0.114 74.958);
      --color-y7: oklch(0.823 0.122 68.55); --color-y8: oklch(0.755 0.141 68.718);
      --color-y9: oklch(0.784 0.171 68.907); --color-y10: oklch(0.751 0.141 69.244);
      --color-y11: oklch(0.575 0.132 62.633); --color-y12: oklch(0.353 0.053 69.99);
      --color-d1: oklch(0.993 0.003 17.212); --color-d2: oklch(0.982 0.009 26.017);
      --color-d3: oklch(0.955 0.022 27.81); --color-d4: oklch(0.918 0.042 27.012);
      --color-d5: oklch(0.886 0.06 27.206); --color-d6: oklch(0.853 0.08 26.442);
      --color-d7: oklch(0.806 0.102 26.189); --color-d8: oklch(0.744 0.129 25.796);
      --color-d9: oklch(0.631 0.218 26.103); --color-d10: oklch(0.591 0.22 26.112);
      --color-d11: oklch(0.56 0.218 26.228); --color-d12: oklch(0.34 0.115 26.406);
      --color-s1: oklch(0.994 0.006 137.773); --color-s2: oklch(0.982 0.011 136.559);
      --color-s3: oklch(0.96 0.025 137.807); --color-s4: oklch(0.934 0.04 137.208);
      --color-s5: oklch(0.901 0.058 136.615); --color-s6: oklch(0.858 0.079 136.575);
      --color-s7: oklch(0.798 0.104 136.63); --color-s8: oklch(0.715 0.142 136.47);
      --color-s9: oklch(0.6 0.155 136.544); --color-s10: oklch(0.555 0.142 136.627);
      --color-s11: oklch(0.526 0.141 136.444); --color-s12: oklch(0.326 0.058 136.282);
      --color-alpha-2: oklch(0 0 0 / 0.02); --color-alpha-4: oklch(0 0 0 / 0.04);
      --color-alpha-6: oklch(0 0 0 / 0.06); --color-alpha-8: oklch(0 0 0 / 0.08);
      --color-alpha-10: oklch(0 0 0 / 0.1); --color-alpha-12: oklch(0 0 0 / 0.12);
      --color-alpha-16: oklch(0 0 0 / 0.16); --color-alpha-24: oklch(0 0 0 / 0.24);
      --color-alpha-36: oklch(0 0 0 / 0.36); --color-alpha-48: oklch(0 0 0 / 0.48);
      --color-alpha-80: oklch(0 0 0 / 0.8);
      --text-micro: 10px; --text-micro--font-weight: 450; --text-micro--line-height: 14px;
      --text-micro-medium: 10px; --text-micro-medium--font-weight: 500; --text-micro-medium--line-height: 14px;
      --text-mini: 12px; --text-mini--font-weight: 450; --text-mini--line-height: 15px;
      --text-mini-medium: 12px; --text-mini-medium--font-weight: 500; --text-mini-medium--line-height: 15px;
      --text-sm: 13px; --text-sm--font-weight: 450; --text-sm--line-height: 18px; --text-sm--letter-spacing: -0.28px;
      --text-sm-medium: 13px; --text-sm-medium--font-weight: 500; --text-sm-medium--line-height: 18px; --text-sm-medium--letter-spacing: -0.28px;
      --text-regular: 14px; --text-regular--font-weight: 450; --text-regular--line-height: 20px; --text-regular--letter-spacing: -0.13px;
      --text-regular-medium: 14px; --text-regular-medium--font-weight: 500; --text-regular-medium--line-height: 20px; --text-regular-medium--letter-spacing: -0.13px;
      --radius-0: 0px; --radius-2: 2px; --radius-4: 4px; --radius-6: 6px; --radius-8: 8px; --radius-10: 10px; --radius-12: 12px; --radius-full: 999px;
      --shadow-xs: 0 0 0 1px var(--color-alpha-6), 0 1px 3px 0 var(--color-alpha-4);
      --shadow-md: 0px 0px 1px 0px rgba(0,0,0,.27), 0px 4px 6px -1px rgba(0,0,0,.1), 0px 2px 4px -2px rgba(0,0,0,.1);
      --shadow-lg: 0px 0px 1px 0px rgba(0,0,0,.20), 0px 10px 15px -3px rgba(0,0,0,.1), 0px 4px 6px -4px rgba(0,0,0,.1);
      --duration-fast: 120ms; --duration-normal: 200ms; --duration-slow: 300ms;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1); --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }
    [x-cloak]{display:none!important}
    .tr{display:flex;align-items:center;cursor:pointer;transition:background 80ms;user-select:none}
    .tr:hover{background:var(--color-g3)}
    .tr.sel{background:var(--color-a3)}
    .tr .act{opacity:0;transition:opacity 80ms}
    .tr:hover .act{opacity:1}
    .tr .tag{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:999px;font-size:10px;font-weight:500;line-height:14px;white-space:nowrap}
    .seg{display:flex;border-radius:var(--radius-6);background:var(--color-g2);padding:2px;gap:2px}
    .seg button{flex:1;border-radius:var(--radius-4);padding:4px 8px;font-size:12px;line-height:15px;font-weight:450;transition:all 120ms;white-space:nowrap;color:var(--color-g9)}
    .seg button:hover{color:var(--color-g11)}
    .seg button.on{background:var(--color-p1);color:var(--color-g12);font-weight:500;box-shadow:var(--shadow-xs)}
    .kbd{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:20px;padding:0 5px;border-radius:4px;background:var(--color-g2);border:1px solid var(--color-g4);font-size:11px;font-weight:500;color:var(--color-g10);font-family:inherit}
  </style>
</head>
<body class="bg-p0 font-sans antialiased" x-data="app()" @keydown.window="handleKey($event)" x-cloak>

  <header class="sticky top-0 z-30 flex items-center justify-between border-b border-g4 bg-p1 px-6 py-2.5">
    <div class="flex items-center gap-3">
      <div class="flex h-7 w-7 items-center justify-center rounded-6 bg-a9 text-mini-medium text-white">D</div>
      <span class="text-regular-medium text-g12">KPI Structure</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-micro text-g8" x-text="stats.groups+' groups · '+stats.kpis+' KPIs'"></span>
      <div class="relative">
        <button class="rounded-6 px-2.5 py-1 text-mini text-g9 hover:bg-g3 hover:text-g11 transition-colors flex items-center gap-1" @click="showHelp=!showHelp">
          <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg>
          Shortcuts
        </button>
        <div x-show="showHelp" @click.away="showHelp=false" x-transition class="absolute right-0 top-full mt-2 w-72 rounded-8 bg-p1 shadow-md border border-g4 p-4 z-40">
          <p class="text-sm-medium text-g12 mb-3">Keyboard shortcuts</p>
          <div class="space-y-2 text-mini text-g11">
            <div class="flex items-center justify-between"><span>Navigate</span><div class="flex gap-1"><span class="kbd">↑</span><span class="kbd">↓</span></div></div>
            <div class="flex items-center justify-between"><span>Expand / Collapse</span><div class="flex gap-1"><span class="kbd">→</span><span class="kbd">←</span></div></div>
            <div class="flex items-center justify-between"><span>Indent (make child)</span><span class="kbd">Tab</span></div>
            <div class="flex items-center justify-between"><span>Outdent (move up level)</span><div class="flex gap-1"><span class="kbd">⇧</span><span class="kbd">Tab</span></div></div>
            <div class="flex items-center justify-between"><span>Reorder</span><div class="flex gap-1"><span class="kbd">⌘</span><span class="kbd">↑↓</span></div></div>
            <div class="flex items-center justify-between"><span>Add sibling</span><span class="kbd">Enter</span></div>
            <div class="flex items-center justify-between"><span>Delete</span><span class="kbd">⌫</span></div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="flex" style="height:calc(100vh - 45px)">

    <!-- ═══ TREE PANEL ═══ -->
    <div class="flex-1 shrink-0 border-r border-g4 bg-p1 flex flex-col" style="min-width:320px;max-width:480px">
      <div class="px-4 py-3 border-b border-g4">
        <p class="text-mini-medium text-g10">Outline</p>
      </div>
      <div class="flex-1 overflow-y-auto py-1">
        <template x-for="item in flat" :key="item.n.id">
          <div class="tr px-2 py-0.5" :class="selId===item.n.id?'sel':''" :style="'padding-left:'+(item.d*20+8)+'px'" :data-nid="item.n.id" @click="selectNode(item.n)">
            <button x-show="item.hc" class="flex items-center justify-center w-5 h-5 shrink-0 rounded-4 text-g8 hover:text-g11 hover:bg-g3 transition-colors" @click.stop="item.n.exp=!item.n.exp;_v++">
              <svg class="h-3 w-3 transition-transform duration-fast" :class="item.n.exp?'rotate-90':''" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </button>
            <span x-show="!item.hc" class="w-5 shrink-0 flex items-center justify-center">
              <span class="w-1.5 h-1.5 rounded-full" :class="selId===item.n.id?'bg-a9':'bg-g6'"></span>
            </span>
            <span class="flex-1 truncate ml-1 text-sm" :class="item.hc?(item.d===0?'text-g12 font-semibold':'text-g12 font-medium'):'text-g11'" x-text="item.n.refId?refName(item.n.refId):item.n.name"></span>
            <!-- Focus ref badge -->
            <span x-show="item.n.refId" class="tag bg-y3 text-y11 ml-1">Focus</span>
            <!-- Add child -->
            <button class="act flex items-center justify-center w-5 h-5 shrink-0 rounded-4 text-g8 hover:text-a11 hover:bg-a3 transition-colors ml-1" @click.stop="addChildOf(item.n.id)" title="Add child" x-show="!item.n.refId">
              <svg class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <!-- Delete -->
            <button class="act flex items-center justify-center w-5 h-5 shrink-0 rounded-4 text-g8 hover:text-d11 hover:bg-d3 transition-colors" @click.stop="deleteNode(item.n.id)" title="Delete">
              <svg class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
        </template>
      </div>
      <div class="px-4 py-3 border-t border-g4">
        <button class="w-full rounded-6 px-3 py-1.5 text-sm text-a11 hover:bg-a3 transition-colors text-left" @click="addRoot()">+ Add department</button>
      </div>
    </div>

    <!-- ═══ PROPERTIES PANEL ═══ -->
    <div class="flex-1 overflow-y-auto bg-p0" style="min-width:0">

      <!-- Empty state -->
      <div x-show="!selNode" class="flex flex-col items-center justify-center py-20 text-center">
        <div class="w-10 h-10 rounded-8 bg-g2 flex items-center justify-center mb-3">
          <svg class="h-5 w-5 text-g8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6z"/><path d="M3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25z"/><path d="M13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6z"/><path d="M13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25a2.25 2.25 0 01-2.25-2.25v-2.25z"/></svg>
        </div>
        <p class="text-sm text-g10">Select a node to edit its properties</p>
        <p class="text-mini text-g9 mt-1">Use arrow keys to navigate, Tab to indent</p>
      </div>

      <!-- ═══ REFERENCE NODE (Focus KPI ref) ═══ -->
      <template x-if="selNode && selNode.refId">
        <div class="max-w-lg mx-auto px-8 py-6">
          <div class="flex items-center gap-2 mb-5">
            <svg class="h-4 w-4 text-a9 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
            <h2 class="text-regular-medium text-g12" x-text="refName(selNode.refId)"></h2>
          </div>
          <div class="rounded-8 bg-a3 px-4 py-3 mb-5">
            <p class="text-sm text-a11">This is a Focus KPI reference. It mirrors a KPI that lives in its native department.</p>
          </div>
          <button class="rounded-6 bg-a9 px-3 py-1.5 text-sm text-white shadow-xs hover:bg-a10 transition-colors" @click="selId=selNode.refId">Go to original KPI</button>
          <div class="border-t border-g4 pt-5 mt-5">
            <button class="rounded-6 px-3 py-1.5 text-sm text-d11 hover:bg-d3 transition-colors" @click="removeFocusRef(selNode.id)">Remove from Focus KPIs</button>
          </div>
        </div>
      </template>

      <!-- ═══ LEAF KPI PROPERTIES ═══ -->
      <template x-if="selNode && selIsLeaf && !selNode.refId">
        <div class="max-w-lg mx-auto px-8 py-6">
          <h2 class="text-regular-medium text-g12 mb-5" x-text="selNode.name"></h2>

          <!-- Name -->
          <div class="mb-5">
            <label class="block text-mini-medium text-g10 mb-1.5">Name</label>
            <input data-name-input type="text" class="w-full rounded-6 bg-p1 px-3 py-1.5 text-sm text-g12 shadow-xs outline-none placeholder:text-g9 focus:ring-2 focus:ring-a9" :value="selNode?.name" @input="if(selNode){selNode.name=$event.target.value;_v++}" placeholder="KPI name...">
          </div>

          <!-- Format -->
          <div class="mb-5">
            <label class="block text-mini-medium text-g10 mb-1.5">Format</label>
            <div class="seg">
              <button :class="selNode.fmt==='number'?'on':''" @click="selNode.fmt='number';_v++">Number</button>
              <button :class="selNode.fmt==='currency'?'on':''" @click="selNode.fmt='currency';_v++">Currency</button>
              <button :class="selNode.fmt==='percentage'?'on':''" @click="selNode.fmt='percentage';_v++">Percentage (%)</button>
            </div>
          </div>

          <!-- Aggregation -->
          <div class="mb-5">
            <label class="block text-mini-medium text-g10 mb-1.5">Aggregation</label>
            <div class="seg">
              <button :class="selNode.agg==='total'?'on':''" @click="selNode.agg='total';_v++">Total</button>
              <button :class="selNode.agg==='average'?'on':''" @click="selNode.agg='average';_v++">Average</button>
              <button :class="selNode.agg==='max'?'on':''" @click="selNode.agg='max';_v++">Max</button>
              <button :class="selNode.agg==='manual'?'on':''" @click="selNode.agg='manual';_v++">Manual</button>
            </div>
          </div>

          <!-- Period behavior -->
          <div class="mb-5">
            <label class="block text-mini-medium text-g10 mb-1.5">Period behavior</label>
            <div class="seg">
              <button :class="selNode.period==='resets'?'on':''" @click="selNode.period='resets';_v++">Resets monthly</button>
              <button :class="selNode.period==='carries_over'?'on':''" @click="selNode.period='carries_over';_v++">Carries over</button>
            </div>
            <p class="text-micro text-g8 mt-1.5" x-text="selNode.period==='resets'?'Starts at 0 each month (e.g. Bookings, Adspend)':'Starts from last month\'s end value (e.g. Followers, Cash Position)'"></p>
          </div>

          <!-- Owner -->
          <div class="mb-5">
            <label class="block text-mini-medium text-g10 mb-1.5">Owner</label>
            <select class="w-full rounded-6 bg-p1 px-3 py-1.5 text-sm text-g12 shadow-xs outline-none focus:ring-2 focus:ring-a9 appearance-none cursor-pointer" :value="selNode.ownerId" @change="selNode.ownerId=$event.target.value;_v++">
              <option value="">No owner</option>
              <template x-for="u in users" :key="u.id">
                <option :value="u.id" x-text="u.name+' · '+u.role" :selected="selNode.ownerId===u.id"></option>
              </template>
            </select>
          </div>

          <!-- ── Source Configuration ── -->
          <div class="border-t border-g4 pt-5 mb-5">
            <p class="text-micro-medium text-g9 uppercase tracking-wide mb-4">Source Configuration</p>

            <div class="mb-5">
              <label class="block text-mini-medium text-g10 mb-1.5">Source mode</label>
              <div class="seg">
                <button :class="selNode.sourceMode==='manual'?'on':''" @click="selNode.sourceMode='manual';_v++">Manual</button>
                <button :class="selNode.sourceMode!=='manual'?'on':''" @click="if(selNode.sourceMode==='manual')selNode.sourceMode='review';_v++">Connected</button>
              </div>
            </div>

            <div x-show="selNode.sourceMode==='manual'" class="rounded-8 bg-g2 px-4 py-3 mb-4">
              <p class="text-sm text-g11">Value is entered manually each period by the KPI owner.</p>
            </div>

            <div x-show="selNode.sourceMode!=='manual'" class="mb-4">
              <label class="block text-mini-medium text-g10 mb-1.5">Database</label>
              <div class="relative" x-data="{open:false}">
                <button class="w-full flex items-center justify-between rounded-6 bg-p1 px-3 py-2 text-sm shadow-xs transition-colors hover:bg-g2" :class="selNode.db?'text-g12':'text-g9'" @click="open=!open" x-text="selNode.db||'Select database...'"></button>
                <div x-show="open" @click.away="open=false" x-transition class="absolute top-full left-0 mt-1 w-full rounded-8 bg-p1 shadow-md border border-g4 z-10 p-1">
                  <template x-for="db in databases" :key="db">
                    <button class="w-full text-left rounded-6 px-3 py-2 text-sm text-g11 hover:bg-g3 transition-colors" @click="selNode.db=db;_v++;open=false" x-text="db"></button>
                  </template>
                </div>
              </div>
            </div>

            <div x-show="selNode.sourceMode!=='manual' && !selNode.db" class="rounded-8 bg-g2 px-4 py-3 mb-4">
              <p class="text-sm text-g9">Select a database above to configure filter conditions.</p>
            </div>

            <div x-show="selNode.sourceMode!=='manual' && selNode.db" class="mb-4">
              <label class="block text-mini-medium text-g10 mb-1.5">Filter conditions</label>
              <div class="space-y-2">
                <template x-for="(f,fi) in selNode.filters" :key="fi">
                  <div class="flex items-center gap-1.5">
                    <span class="text-mini text-g9 w-10 text-right shrink-0" x-text="fi===0?'Where':'AND'"></span>
                    <div class="relative w-28 shrink-0" x-data="{open:false}">
                      <button class="w-full text-left rounded-6 bg-p1 px-2.5 py-1.5 text-sm shadow-xs hover:bg-g2 transition-colors truncate" :class="f.field?'text-g12':'text-g9'" @click="open=!open" x-text="f.field||'Field...'"></button>
                      <div x-show="open" @click.away="open=false" x-transition class="absolute top-full left-0 mt-1 w-44 rounded-8 bg-p1 shadow-md border border-g4 z-20 p-1">
                        <template x-for="fd in fieldDefs" :key="fd.name">
                          <button class="w-full text-left rounded-6 px-3 py-1.5 text-sm text-g11 hover:bg-g3 transition-colors" @click="f.field=fd.name;f.operator='is';f.value='';_v++;open=false" x-text="fd.name"></button>
                        </template>
                      </div>
                    </div>
                    <div class="relative w-24 shrink-0" x-data="{open:false}">

  </main>

  <script>
  function app() {
    const users = [
      { id:'u1', name:'Philipp Epping', role:'CEO' },
      { id:'u2', name:'Anton Wieprecht', role:'Marketing Lead' },
      { id:'u3', name:'Robert Meier', role:'Sales Rep' },
      { id:'u4', name:'Lisa König', role:'Sales Rep' },
      { id:'u5', name:'Mira Schuster', role:'People & Culture' },
      { id:'u6', name:'Klara Engel', role:'Finance' },
    ];

    const databases = ['Marketing Tracking','CRM Pipeline','Finance Tracker'];
    const fieldDefs = [
      { name:'UTM Source',type:'select' },{ name:'Status',type:'select' },
      { name:'Lead Source',type:'select' },{ name:'Campaign',type:'text' },
      { name:'Channel',type:'select' },{ name:'Name',type:'text' },{ name:'Revenue',type:'number' },
    ];
    const ops = {
      select:[{id:'is',label:'is'},{id:'is_not',label:'is not'},{id:'is_empty',label:'is empty'},{id:'is_not_empty',label:'is not empty'}],
      text:[{id:'is',label:'is'},{id:'is_not',label:'is not'},{id:'contains',label:'contains'},{id:'is_empty',label:'is empty'},{id:'is_not_empty',label:'is not empty'}],
      number:[{id:'is',label:'is'},{id:'gt',label:'greater than'},{id:'lt',label:'less than'},{id:'is_empty',label:'is empty'},{id:'is_not_empty',label:'is not empty'}],
    };

    let _nid = 200;
    function N(id,nm,ch,p){
      return {id,name:nm,exp:true,children:ch||[],fmt:'number',agg:'total',period:'resets',ownerId:'',source:'',companyDashboard:false,focusKpi:false,refId:'',sourceMode:'manual',db:'',filters:[],dateField:'',dateScope:'week',...p};
    }

    const tree = [
      N('sc','COMPANY OVERVIEW',[
        N('sc1','Total Revenue',[],{fmt:'currency',ownerId:'u1',source:'Plecto',companyDashboard:true,sourceMode:'auto',db:'CRM Pipeline'}),
        N('sc2','Active Clients',[],{period:'carries_over',ownerId:'u1',source:'CRM',companyDashboard:true}),
        N('sc3','Revenue per Employee',[],{fmt:'currency',agg:'average',ownerId:'u1',source:'DATEV',companyDashboard:true}),
        N('sc4','CAC',[],{fmt:'currency',agg:'average',ownerId:'u1',companyDashboard:true}),
        N('sc5','Cash Position',[],{fmt:'currency',period:'carries_over',ownerId:'u6',source:'DATEV',companyDashboard:true}),
      ]),
      N('fk','FOCUS KPIs',[
        N('fkr1','',[], {refId:'m1'}),
        N('fkr2','',[], {refId:'s2'}),
        N('fkr3','',[], {refId:'c4'}),
      ]),
      N('mkt','MARKETING',[
        N('m1','Total Bookings',[],{ownerId:'u2',companyDashboard:true,focusKpi:true,sourceMode:'review',db:'Marketing Tracking',filters:[{field:'UTM Source',operator:'is',value:'Paid Ads'},{field:'Status',operator:'is',value:'Show'}]}),
        N('m2','Adspend',[],{fmt:'currency',ownerId:'u2',source:'Meta Ads',companyDashboard:true,sourceMode:'auto',db:'Marketing Tracking'}),
        N('m3','Cost per Booking',[],{fmt:'currency',agg:'average',ownerId:'u2',companyDashboard:true}),
        N('pa','Paid Ads',[
          N('pa1','Adspend',[],{fmt:'currency',ownerId:'u2',source:'Meta Ads',sourceMode:'auto',db:'Marketing Tracking'}),
          N('pa2','Impressions',[],{ownerId:'u2',source:'Meta Ads'}),
          N('pa3','CTR',[],{fmt:'percentage',agg:'average',ownerId:'u2',source:'Meta Ads'}),
          N('pa4','CPC',[],{fmt:'currency',agg:'average',ownerId:'u2',source:'Meta Ads'}),
          N('pa5','CPM',[],{fmt:'currency',agg:'average',ownerId:'u2',source:'Meta Ads'}),
          N('pa6','LP Visitors',[],{ownerId:'u2'}),
          N('pa7','Opt-Ins',[],{ownerId:'u2'}),
          N('pa8','Opt-In Rate',[],{fmt:'percentage',agg:'average',ownerId:'u2'}),
          N('pa9','VSL Starts',[],{ownerId:'u2'}),
          N('pa10','VSL Watch Rate',[],{fmt:'percentage',agg:'average',ownerId:'u2'}),
          N('pa11','Bookings',[],{ownerId:'u2'}),
          N('pa12','Booking Rate',[],{fmt:'percentage',agg:'average',ownerId:'u2'}),
        ],{exp:false}),
        N('oe','Outbound Email',[
          N('oe1','Emails Sent',[],{ownerId:'u1',source:'Instantly'}),
          N('oe2','Reply Rate',[],{fmt:'percentage',agg:'average',ownerId:'u1',source:'Instantly'}),
          N('oe3','Bookings',[],{ownerId:'u1',source:'Instantly'}),
        ],{exp:false}),
        N('oy','Organic / YouTube',[
          N('oy1','Watchtime AW',[],{ownerId:'u2',source:'YouTube'}),
          N('oy2','Watchtime PEA',[],{ownerId:'u1',source:'YouTube'}),
          N('oy3','Watchtime PES',[],{ownerId:'u1',source:'YouTube'}),
          N('oy4','Bookings',[],{ownerId:'u2',source:'YouTube'}),
        ],{exp:false}),
      ]),
      N('set','SETTING',[
        N('s1','Leads',[],{ownerId:'u2',source:'Airtable',companyDashboard:true}),
        N('s2','Sets',[],{ownerId:'u1',source:'Plecto',companyDashboard:true,focusKpi:true}),
        N('s3','Set Rate',[],{fmt:'percentage',agg:'average',ownerId:'u1',source:'Plecto',companyDashboard:true}),
        N('hc','Human Calling',[
          N('hc1','Dials',[],{ownerId:'u3',source:'Aircall'}),
          N('hc2','Pickups',[],{ownerId:'u3',source:'Aircall'}),
          N('hc3','Connect Rate',[],{fmt:'percentage',agg:'average',ownerId:'u3',source:'Aircall'}),
          N('hc4','Sets',[],{ownerId:'u3',source:'Plecto'}),
          N('hc5','Dial-Set Ratio',[],{fmt:'percentage',agg:'average',ownerId:'u3',source:'Plecto'}),
        ],{exp:false}),
        N('ai','AI Setting',[
          N('ai1','Conversations',[],{ownerId:'u2',source:'AI Tool'}),
          N('ai2','Qualified Leads',[],{ownerId:'u2',source:'AI Tool'}),
          N('ai3','Sets',[],{ownerId:'u2',source:'AI Tool'}),
          N('ai4','Conversation-Set Ratio',[],{fmt:'percentage',agg:'average',ownerId:'u2',source:'AI Tool'}),
        ],{exp:false}),
      ]),
      N('cls','CLOSING',[
        N('c1','FE-Deals',[],{ownerId:'u1',source:'Plecto',companyDashboard:true}),
        N('c2','FE-Dealvolumen',[],{fmt:'currency',ownerId:'u1',source:'Plecto',companyDashboard:true}),
        N('c3','Avg. Dealsize',[],{fmt:'currency',agg:'average',ownerId:'u1',source:'Plecto',companyDashboard:true}),
        N('c4','Call-Close Rate',[],{fmt:'percentage',agg:'manual',ownerId:'u1',source:'Plecto',companyDashboard:true,focusKpi:true}),
      ]),
      N('del','DELIVERY',[
        N('d1','BE-Dealvolumen',[],{fmt:'currency',ownerId:'u1',source:'Plecto',companyDashboard:true}),
        N('d2','Retention Rate',[],{fmt:'percentage',agg:'average',ownerId:'u1',source:'Plecto',companyDashboard:true}),
        N('d3','Time-to-First-Value',[],{agg:'average',ownerId:'u1',companyDashboard:true}),
        N('dse','DSE',[
          N('dse1','Time-to-First-Milestone',[],{agg:'average',ownerId:'u1'}),
          N('dse2','Projekt Timing (Gesamt)',[],{agg:'average',ownerId:'u1'}),
        ],{exp:false}),
        N('am','Account Management',[
          N('am1','Portfolio Umsatz (LM)',[],{fmt:'currency',ownerId:'u1'}),
          N('am2','Rekordmonate (LM)',[],{ownerId:'u1'}),
        ],{exp:false}),
        N('cs','Client Success',[
          N('cs1','Testimonials',[],{ownerId:'u1'}),
          N('cs2','KPI-Collection Rate',[],{fmt:'percentage',agg:'max',ownerId:'u1'}),
        ],{exp:false}),
      ]),
      N('ppl','PEOPLE & CULTURE',[
        N('p1','Open Roles',[],{period:'carries_over',ownerId:'u5',source:'Personio',companyDashboard:true}),
        N('p2','Einstellungen',[],{ownerId:'u5',source:'Personio',companyDashboard:true}),
        N('p3','Time-to-Hire',[],{agg:'average',ownerId:'u5',source:'Personio',companyDashboard:true}),
        N('p4','eNPS',[],{agg:'average',period:'carries_over',ownerId:'u5',source:'Personio',companyDashboard:true}),
        N('hf','Hiring Funnel',[
          N('hf1','Loom Videos',[],{ownerId:'u5',source:'Personio'}),
          N('hf2','Gruppeninterview Einladungen',[],{ownerId:'u5',source:'Personio'}),
          N('hf3','Einstellungen',[],{ownerId:'u5',source:'Personio'}),
        ],{exp:false}),
      ]),
      N('fin','FINANCE',[
        N('f1','Cash In',[],{fmt:'currency',ownerId:'u6',source:'DATEV',companyDashboard:true}),
        N('f2','Cash Out',[],{fmt:'currency',ownerId:'u6',source:'DATEV',companyDashboard:true}),
        N('f3','Cashflow',[],{fmt:'currency',ownerId:'u6',source:'DATEV',companyDashboard:true}),
      ]),
    ];

    function flatList(nodes, depth) {
      const r = [];
      for (const n of nodes) {
        r.push({ n, d: depth, hc: n.children.length > 0 });
        if (n.exp && n.children.length) r.push(...flatList(n.children, depth + 1));
      }
      return r;
    }
    function findNode(id, nodes) {
      for (const n of nodes) {
        if (n.id === id) return n;
        if (n.children.length) { const f = findNode(id, n.children); if (f) return f; }
      }
      return null;
    }
    function findParent(id, nodes, parent) {
      for (const n of nodes) {
        if (n.id === id) return parent;
        if (n.children.length) { const f = findParent(id, n.children, n); if (f) return f; }
      }
      return null;
    }
    function removeFromTree(id, nodes) {
      const idx = nodes.findIndex(n => n.id === id);
      if (idx >= 0) { nodes.splice(idx, 1); return true; }
      for (const n of nodes) { if (removeFromTree(id, n.children)) return true; }
      return false;
    }
    function countDescendants(node) {
      let c = node.children.length;
      for (const ch of node.children) c += countDescendants(ch);
      return c;
    }
    function countStats(nodes) {
      let groups = 0, kpis = 0;
      for (const n of nodes) {
        if (n.children.length) { groups++; const s = countStats(n.children); groups += s.groups; kpis += s.kpis; }
        else if (!n.refId) kpis++;
      }
      return { groups, kpis };
    }

    return {
      tree, users, databases, fieldDefs,
      selId: 'sc',
      showHelp: false,
      toast: '',
      _v: 0,

      get flat() { this._v; return flatList(this.tree, 0); },
      get selNode() { if (!this.selId) return null; return findNode(this.selId, this.tree); },
      get selIsLeaf() { return this.selNode && this.selNode.children.length === 0; },
      get stats() { this._v; return countStats(this.tree); },

      opLabel(op) { return {is:'is',is_not:'is not',contains:'contains',does_not_contain:'does not contain',gt:'>',lt:'<',is_empty:'is empty',is_not_empty:'is not empty'}[op]||'is'; },
      opsFor(fn) { const d = fieldDefs.find(f=>f.name===fn); return ops[d?.type||'text']; },
      countAll(node) { return countDescendants(node); },
      selIdx() { return this.flat.findIndex(f => f.n.id === this.selId); },

      refName(refId) {
        const orig = findNode(refId, this.tree);
        return orig ? orig.name : 'Unknown KPI';
      },

      selectNode(node) {
        if (node.refId) {
          this.selId = node.refId;
          this.toast = 'Jumped to original KPI — this is a Focus reference';
          clearTimeout(this._toastTimer);
          this._toastTimer = setTimeout(() => { this.toast = ''; }, 2500);
        } else {
          this.selId = node.id;
        }
      },

      toggleFocus() {
        if (!this.selNode) return;
        const fk = findNode('fk', this.tree);
        if (!fk) return;
        if (this.selNode.focusKpi) {
          const ri = fk.children.findIndex(c => c.refId === this.selId);
          if (ri >= 0) fk.children.splice(ri, 1);
          this.selNode.focusKpi = false;
        } else {
          const ref = N('fkr' + (++_nid), '', [], { refId: this.selId });
          fk.children.push(ref);
          fk.exp = true;
          this.selNode.focusKpi = true;
          this.selNode.companyDashboard = true;
        }
        this._v++;
      },

      removeFocusRef(refNodeId) {
        const refNode = findNode(refNodeId, this.tree);
        if (refNode && refNode.refId) {
          const orig = findNode(refNode.refId, this.tree);
          if (orig) orig.focusKpi = false;
        }
        removeFromTree(refNodeId, this.tree);
        this.selId = null;
        this._v++;
      },

      nav(dir) {
        const fl = this.flat;
        const ni = this.selIdx() + dir;
        if (ni >= 0 && ni < fl.length) {
          this.selId = fl[ni].n.id;
          this.$nextTick(() => { document.querySelector('[data-nid="'+this.selId+'"]')?.scrollIntoView({ block:'nearest' }); });
        }
      },
      indent() {
        const node = this.selNode; if (!node) return;
        const parent = findParent(this.selId, this.tree, null);
        const siblings = parent ? parent.children : this.tree;
        const idx = siblings.indexOf(node); if (idx <= 0) return;
        const prev = siblings[idx - 1];
        siblings.splice(idx, 1); prev.children.push(node); prev.exp = true; this._v++;
      },
      outdent() {
        const node = this.selNode; if (!node) return;
        const parent = findParent(this.selId, this.tree, null); if (!parent) return;
        const gp = findParent(parent.id, this.tree, null);
        const gpChildren = gp ? gp.children : this.tree;
        const pidx = gpChildren.indexOf(parent);
        parent.children.splice(parent.children.indexOf(node), 1);
        gpChildren.splice(pidx + 1, 0, node); this._v++;
      },
      moveUp() {
        const node = this.selNode; if (!node) return;
        const parent = findParent(this.selId, this.tree, null);
        const siblings = parent ? parent.children : this.tree;
        const idx = siblings.indexOf(node); if (idx <= 0) return;
        [siblings[idx - 1], siblings[idx]] = [siblings[idx], siblings[idx - 1]]; this._v++;
      },
      moveDown() {
        const node = this.selNode; if (!node) return;
        const parent = findParent(this.selId, this.tree, null);
        const siblings = parent ? parent.children : this.tree;
        const idx = siblings.indexOf(node); if (idx >= siblings.length - 1) return;
        [siblings[idx], siblings[idx + 1]] = [siblings[idx + 1], siblings[idx]]; this._v++;
      },
      addSibling() {
        const nn = N('n' + (++_nid), 'New KPI', []);
        if (!this.selId) { this.tree.push(nn); this.selId = nn.id; this._v++; return; }
        const parent = findParent(this.selId, this.tree, null);
        const siblings = parent ? parent.children : this.tree;
        siblings.splice(siblings.findIndex(n => n.id === this.selId) + 1, 0, nn);
        this.selId = nn.id; this._v++;
        this.$nextTick(() => { document.querySelector('[data-name-input]')?.focus(); document.querySelector('[data-name-input]')?.select(); });
      },
      addChild() {
        if (!this.selNode) return;
        const nn = N('n' + (++_nid), 'New KPI', []);
        this.selNode.children.push(nn); this.selNode.exp = true;
        this.selId = nn.id; this._v++;
        this.$nextTick(() => { document.querySelector('[data-name-input]')?.focus(); document.querySelector('[data-name-input]')?.select(); });
      },
      addChildOf(id) {
        const parent = findNode(id, this.tree); if (!parent) return;
        const nn = N('n' + (++_nid), 'New KPI', []);
        parent.children.push(nn); parent.exp = true;
        this.selId = nn.id; this._v++;
        this.$nextTick(() => { document.querySelector('[data-name-input]')?.focus(); document.querySelector('[data-name-input]')?.select(); });
      },
      addRoot() {
        const nn = N('n' + (++_nid), 'NEW DEPARTMENT', []);
        this.tree.push(nn); this.selId = nn.id; this._v++;
        this.$nextTick(() => { document.querySelector('[data-name-input]')?.focus(); document.querySelector('[data-name-input]')?.select(); });
      },
      deleteNode(id) {
        if (!id) return;
        const node = findNode(id, this.tree);
        if (node && node.focusKpi) {
          const fk = findNode('fk', this.tree);
          if (fk) {
            const ri = fk.children.findIndex(c => c.refId === id);
            if (ri >= 0) fk.children.splice(ri, 1);
          }
        }
        if (node && node.refId) {
          const orig = findNode(node.refId, this.tree);
          if (orig) orig.focusKpi = false;
        }
        const fl = this.flat;
        const ci = fl.findIndex(f => f.n.id === id);
        removeFromTree(id, this.tree);
        if (this.selId === id) {
          if (ci < fl.length - 1) this.selId = fl[ci + 1]?.n.id || null;
          else if (ci > 0) this.selId = fl[ci - 1]?.n.id || null;
          else this.selId = null;
        }
        this._v++;
      },
      handleKey(e) {
        if (['INPUT', 'SELECT', 'TEXTAREA'].includes(e.target.tagName)) { if (e.key === 'Escape') e.target.blur(); return; }
        const m = e.metaKey || e.ctrlKey;
        switch (true) {
          case e.key === 'ArrowUp' && !m: e.preventDefault(); this.nav(-1); break;
          case e.key === 'ArrowDown' && !m: e.preventDefault(); this.nav(1); break;
          case e.key === 'ArrowRight': { const n = this.selNode; if (n && n.children.length && !n.exp) { n.exp = true; this._v++; e.preventDefault(); } break; }
          case e.key === 'ArrowLeft': { const n = this.selNode; if (n && n.children.length && n.exp) { n.exp = false; this._v++; e.preventDefault(); } else if (n) { const p = findParent(this.selId, this.tree, null); if (p) this.selId = p.id; e.preventDefault(); } break; }
          case e.key === 'Tab' && !e.shiftKey: e.preventDefault(); this.indent(); break;
          case e.key === 'Tab' && e.shiftKey: e.preventDefault(); this.outdent(); break;
          case e.key === 'ArrowUp' && m: e.preventDefault(); this.moveUp(); break;
          case e.key === 'ArrowDown' && m: e.preventDefault(); this.moveDown(); break;
          case e.key === 'Enter': e.preventDefault(); this.addSibling(); break;
          case e.key === 'Backspace' || e.key === 'Delete': e.preventDefault(); this.deleteNode(this.selId); break;
        }
      },
    };
  }
  </script>

  <div x-show="toast" x-transition:enter="transition ease-out duration-normal" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-fast" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 rounded-full bg-g12 text-p1 px-4 py-2 text-sm shadow-lg" x-text="toast"></div>
