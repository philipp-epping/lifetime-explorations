<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Source Config — Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: "Inter", system-ui, sans-serif;
      --color-p0: oklch(0.982 0 0); --color-p1: oklch(1 0 0);
      --color-g0: oklch(1 0 0); --color-g1: oklch(0.991 0 0); --color-g2: oklch(0.982 0 0);
      --color-g3: oklch(0.955 0 0); --color-g4: oklch(0.931 0 0); --color-g5: oklch(0.91 0 0);
      --color-g6: oklch(0.885 0 0); --color-g7: oklch(0.851 0 0); --color-g8: oklch(0.792 0 0);
      --color-g9: oklch(0.643 0 0); --color-g10: oklch(0.507 0 0);
      --color-g11: oklch(0.361 0.003 286.228); --color-g12: oklch(0.21 0.004 286.059);
      --color-a1: oklch(0.994 0.001 286.376); --color-a2: oklch(0.982 0.008 271.33);
      --color-a3: oklch(0.961 0.018 269.09); --color-a4: oklch(0.933 0.032 266.166);
      --color-a5: oklch(0.901 0.048 267.198); --color-a6: oklch(0.857 0.07 268.824);
      --color-a7: oklch(0.804 0.098 270.675); --color-a8: oklch(0.73 0.139 271.732);
      --color-a9: oklch(0.571 0.235 271.643); --color-a10: oklch(0.526 0.213 271.816);
      --color-a11: oklch(0.511 0.213 271.713); --color-a12: oklch(0.312 0.107 271.681);
      --color-y1: oklch(0.994 0.003 84.559); --color-y2: oklch(0.981 0.02 84.59);
      --color-y3: oklch(0.954 0.047 83.943); --color-y4: oklch(0.928 0.065 78.977);
      --color-y5: oklch(0.902 0.086 77.209); --color-y6: oklch(0.866 0.114 74.958);
      --color-y7: oklch(0.823 0.122 68.55); --color-y8: oklch(0.755 0.141 68.718);
      --color-y9: oklch(0.784 0.171 68.907); --color-y10: oklch(0.751 0.141 69.244);
      --color-y11: oklch(0.575 0.132 62.633); --color-y12: oklch(0.353 0.053 69.99);
      --color-d1: oklch(0.993 0.003 17.212); --color-d2: oklch(0.982 0.009 26.017);
      --color-d3: oklch(0.955 0.022 27.81); --color-d4: oklch(0.918 0.042 27.012);
      --color-d5: oklch(0.886 0.06 27.206); --color-d6: oklch(0.853 0.08 26.442);
      --color-d7: oklch(0.806 0.102 26.189); --color-d8: oklch(0.744 0.129 25.796);
      --color-d9: oklch(0.631 0.218 26.103); --color-d10: oklch(0.591 0.22 26.112);
      --color-d11: oklch(0.56 0.218 26.228); --color-d12: oklch(0.34 0.115 26.406);
      --color-s1: oklch(0.994 0.006 137.773); --color-s2: oklch(0.982 0.011 136.559);
      --color-s3: oklch(0.96 0.025 137.807); --color-s4: oklch(0.934 0.04 137.208);
      --color-s5: oklch(0.901 0.058 136.615); --color-s6: oklch(0.858 0.079 136.575);
      --color-s7: oklch(0.798 0.104 136.63); --color-s8: oklch(0.715 0.142 136.47);
      --color-s9: oklch(0.6 0.155 136.544); --color-s10: oklch(0.555 0.142 136.627);
      --color-s11: oklch(0.526 0.141 136.444); --color-s12: oklch(0.326 0.058 136.282);
      --color-alpha-2: oklch(0 0 0 / 0.02); --color-alpha-4: oklch(0 0 0 / 0.04);
      --color-alpha-6: oklch(0 0 0 / 0.06); --color-alpha-8: oklch(0 0 0 / 0.08);
      --color-alpha-10: oklch(0 0 0 / 0.1); --color-alpha-12: oklch(0 0 0 / 0.12);
      --color-alpha-16: oklch(0 0 0 / 0.16); --color-alpha-24: oklch(0 0 0 / 0.24);
      --color-alpha-36: oklch(0 0 0 / 0.36); --color-alpha-48: oklch(0 0 0 / 0.48);
      --color-alpha-80: oklch(0 0 0 / 0.8);
      --text-micro: 10px; --text-micro--font-weight: 450; --text-micro--line-height: 14px;
      --text-micro-medium: 10px; --text-micro-medium--font-weight: 500; --text-micro-medium--line-height: 14px;
      --text-mini: 12px; --text-mini--font-weight: 450; --text-mini--line-height: 15px;
      --text-mini-medium: 12px; --text-mini-medium--font-weight: 500; --text-mini-medium--line-height: 15px;
      --text-sm: 13px; --text-sm--font-weight: 450; --text-sm--line-height: 18px; --text-sm--letter-spacing: -0.28px;
      --text-sm-medium: 13px; --text-sm-medium--font-weight: 500; --text-sm-medium--line-height: 18px; --text-sm-medium--letter-spacing: -0.28px;
      --text-regular: 14px; --text-regular--font-weight: 450; --text-regular--line-height: 20px; --text-regular--letter-spacing: -0.13px;
      --text-regular-medium: 14px; --text-regular-medium--font-weight: 500; --text-regular-medium--line-height: 20px; --text-regular-medium--letter-spacing: -0.13px;
      --radius-0: 0px; --radius-2: 2px; --radius-4: 4px; --radius-6: 6px; --radius-8: 8px; --radius-10: 10px; --radius-12: 12px; --radius-full: 999px;
      --shadow-xs: 0 0 0 1px var(--color-alpha-6), 0 1px 3px 0 var(--color-alpha-4);
      --shadow-md: 0px 0px 1px 0px rgba(0,0,0,.27), 0px 4px 6px -1px rgba(0,0,0,.1), 0px 2px 4px -2px rgba(0,0,0,.1);
      --shadow-lg: 0px 0px 1px 0px rgba(0,0,0,.20), 0px 10px 15px -3px rgba(0,0,0,.1), 0px 4px 6px -4px rgba(0,0,0,.1);
      --duration-fast: 120ms; --duration-normal: 200ms; --duration-slow: 300ms;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1); --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }
    [x-cloak]{display:none!important}
    .kg{border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed;border-left:1px solid var(--color-g11);border-top:1px solid var(--color-g11)}
    .kg th,.kg td{border-right:1px solid var(--color-g11);border-bottom:1px solid var(--color-g11);padding:0 10px;text-align:center;vertical-align:middle;height:36px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .kg th{background:var(--color-g11);color:var(--color-g7);height:32px}
    .kg td{background:var(--color-g12);color:var(--color-g3)}
    .kg td:first-child,.kg th:first-child{text-align:left;overflow:visible}
    .sc-g{background:var(--color-s7)!important;color:var(--color-s12)!important}
    .sc-y{background:var(--color-y7)!important;color:var(--color-y12)!important}
    .sc-r{background:var(--color-d8)!important;color:var(--color-p1)!important}
    .source-badge{display:inline-flex;align-items:center;gap:4px;cursor:pointer;transition:all 120ms;border-radius:4px;padding:2px 6px;margin:-2px -6px}
    .source-badge:hover{background:var(--color-g11)}
    .editable-cell{cursor:pointer;position:relative}
    .editable-cell:hover{background:var(--color-a2)}
    .seg{display:flex;border-radius:var(--radius-6);background:var(--color-g2);padding:2px;gap:2px}
    .seg button{flex:1;border-radius:var(--radius-4);padding:4px 8px;font-size:12px;line-height:15px;font-weight:450;transition:all 120ms;white-space:nowrap;color:var(--color-g9)}
    .seg button:hover{color:var(--color-g11)}
    .seg button.on{background:var(--color-p1);color:var(--color-g12);font-weight:500;box-shadow:var(--shadow-xs)}
  </style>
</head>
<body class="bg-p0 font-sans antialiased" x-data="app()" x-cloak>

  <header class="sticky top-0 z-30 flex items-center justify-between border-b border-g4 bg-p1 px-6 py-2.5">
    <div class="flex items-center gap-3">
      <div class="flex h-7 w-7 items-center justify-center rounded-6 bg-a9 text-mini-medium text-white">D</div>
      <span class="text-regular-medium text-g12">KPI Source Config — Prototype</span>
    </div>
    <span class="text-mini text-g9">Click any source label to open the config modal</span>
  </header>

  <main class="mx-auto px-6 py-5" style="max-width:1200px">
    <div class="mb-4">
      <h1 class="text-regular-medium text-g12">Paid Marketing</h1>
      <p class="mt-0.5 text-mini text-g9">Mar 2026 — CW10</p>
    </div>

    <div class="overflow-x-auto rounded-8">
      <table class="kg text-sm">
        <thead><tr>
          <th style="width:240px" class="text-mini-medium text-g7">Paid Marketing</th>
          <th style="width:100px" class="text-mini-medium text-g7">Target</th>
          <th style="width:100px" class="text-mini-medium text-g7">Actual</th>
          <th style="width:140px" class="text-mini-medium text-g7">Status</th>
          <th style="width:180px" class="text-mini-medium text-g7">Source</th>
          <th style="width:140px" class="text-mini-medium text-g7">Owner</th>
        </tr></thead>
        <tbody>
          <template x-for="kpi in kpis" :key="kpi.id">
            <tr>
              <td class="text-left"><span class="text-g3" x-text="kpi.name"></span><span class="text-micro text-g8 ml-1" x-text="({total:'Total',average:'Avg',max:'Max',manual:'Manual'})[kpi.agg]||'Total'"></span></td>
              <td class="tabular-nums text-g5" x-text="fmt(kpi.target, kpi.fmt)"></td>
              <td class="tabular-nums font-medium text-g2" x-text="fmt(kpi.actual, kpi.fmt)"></td>
              <td :class="stC(kpi.status)"><span x-text="stL(kpi.status)"></span></td>
              <td>
                <div class="source-badge" @click.stop="openModal(kpi)">
                  <svg x-show="kpi.sourceMode==='manual'" class="h-3 w-3 text-g8 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  <svg x-show="kpi.sourceMode==='auto'" class="h-3 w-3 text-a9 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                  <svg x-show="kpi.sourceMode==='review'" class="h-3 w-3 text-a9 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <span class="text-mini" :class="kpi.source ? 'text-g3' : 'text-g8'" x-text="kpi.source || '+ add'"></span>
                </div>
              </td>
              <td class="text-mini text-g8" x-text="kpi.owner"></td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

    <div class="mt-6 rounded-8 bg-p1 p-4 shadow-xs">
      <h2 class="text-sm-medium text-g11 mb-2">Source mode legend</h2>
      <div class="flex gap-6 text-mini text-g9">
        <div class="flex items-center gap-1.5">
          <svg class="h-3 w-3 text-g8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <span>Manual</span>
        </div>
        <div class="flex items-center gap-1.5">
          <svg class="h-3 w-3 text-a9" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Connected — Review</span>
        </div>
        <div class="flex items-center gap-1.5">
          <svg class="h-3 w-3 text-a9" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
          <span>Connected — Auto-fill</span>
        </div>
      </div>
    </div>
  </main>

  <!-- ═══ SOURCE CONFIG MODAL ═══ -->
  <template x-teleport="body">
    <div x-show="modal.open" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-300" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="fixed inset-0 z-50 bg-alpha-48" @click.self="closeModal()">
      <div @click.stop x-show="modal.open" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full" class="absolute top-0 right-0 h-full bg-p1 shadow-lg border-l border-g4 flex flex-col" style="width:500px" @keydown.escape.window="closeModal()">

        <!-- Header -->
        <div class="flex items-center justify-between border-b border-g4 px-5 py-3.5">
          <h2 class="text-regular-medium text-g12" x-text="modal.kpi?.name || 'KPI Properties'"></h2>
          <div class="flex items-center gap-2">
            <template x-if="!modal.editing">
              <button class="rounded-6 px-3 py-1.5 text-sm text-g10 hover:bg-g3 hover:text-g11 transition-colors" @click="modal.editing=true">Edit</button>
            </template>
            <button class="rounded-6 p-1.5 text-g9 hover:bg-g3 hover:text-g11 transition-colors" @click="closeModal()">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
        </div>

        <!-- Body -->
        <div class="overflow-y-auto flex-1 px-5 py-4 pb-5" style="min-height:0">

          <!-- ── VIEW MODE ── -->
          <template x-if="!modal.editing">
            <div>
              <!-- KPI Properties (read-only) -->
              <div class="grid grid-cols-2 gap-x-6 gap-y-3 mb-5">
                <div>
                  <p class="text-micro text-g9 mb-0.5">Format</p>
                  <p class="text-sm text-g12" x-text="({number:'Number',currency:'EUR (€)',percentage:'Percentage (%)'})[modal.kpi?.fmt] || 'Number'"></p>
                </div>
                <div>
                  <p class="text-micro text-g9 mb-0.5">Aggregation</p>
                  <p class="text-sm text-g12" x-text="({total:'Total',average:'Average',max:'Max',manual:'Manual'})[modal.kpi?.agg] || 'Total'"></p>
                </div>
                <div>
                  <p class="text-micro text-g9 mb-0.5">Period</p>
                  <p class="text-sm text-g12" x-text="modal.kpi?.period==='carries_over' ? 'Carries over' : 'Resets monthly'"></p>
                </div>
                <div>
                  <p class="text-micro text-g9 mb-0.5">Owner</p>
                  <p class="text-sm text-g12" x-text="modal.kpi?.owner || '—'"></p>
                </div>
              </div>

              <!-- Source Configuration separator -->
              <div class="border-t border-g4 pt-4 mb-4">
                <p class="text-micro-medium text-g9 uppercase tracking-wide">Source Configuration</p>
              </div>

              <!-- Description box with mode pill integrated top-right -->
              <div class="rounded-8 bg-g2 px-4 py-3 mb-4">
                <div class="flex items-start justify-between gap-3 mb-1.5">
                  <p class="text-micro-medium text-g9 uppercase tracking-wide pt-0.5">Description</p>
                  <template x-if="modal.kpi?.sourceMode==='manual'">
                    <span class="inline-flex items-center gap-1.5 rounded-full bg-g4 px-2.5 py-0.5 text-micro-medium text-g11 shrink-0">
                      <svg class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      Manual
                    </span>
                  </template>
                  <template x-if="modal.kpi?.sourceMode==='review'">
                    <span class="inline-flex items-center gap-1.5 rounded-full bg-a3 px-2.5 py-0.5 text-micro-medium text-a11 shrink-0">
                      <svg class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                      Connected — Review
                    </span>
                  </template>
                  <template x-if="modal.kpi?.sourceMode==='auto'">
                    <span class="inline-flex items-center gap-1.5 rounded-full bg-a3 px-2.5 py-0.5 text-micro-medium text-a11 shrink-0">
                      <svg class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                      Connected — Auto-fill
                    </span>
                  </template>
                </div>
                <p class="text-sm text-g11 leading-relaxed" x-html="modal.kpi?.description"></p>
              </div>

              <!-- Filter conditions (shared for all modes) -->
              <template x-if="modal.kpi?.filters?.length > 0 || modal.kpi?.dateField">
                <div class="mb-4">
                  <p class="text-micro-medium text-g9 uppercase tracking-wide mb-2">Filter conditions</p>
                  <div class="space-y-1.5">
                    <template x-for="(f, fi) in (modal.kpi?.filters || [])" :key="fi">
                      <div class="flex items-center gap-2 text-mini">
                        <span class="text-g9 w-12 text-right shrink-0" x-text="fi === 0 ? 'Where' : 'AND'"></span>
                        <span class="rounded-4 bg-g3 px-2 py-1 text-g12 font-medium" x-text="f.field"></span>
                        <span class="text-g9" x-text="operatorLabel(f.operator || 'is')"></span>
                        <template x-if="!isUnaryOp(f.operator || 'is')">
                          <span class="rounded-4 bg-a3 px-2 py-1 text-a12 font-medium" x-text="f.value"></span>
                        </template>
                      </div>
                    </template>
                    <div class="flex items-center gap-2 text-mini" x-show="modal.kpi?.dateField">
                      <span class="text-g9 w-12 text-right shrink-0" x-text="(modal.kpi?.filters?.length > 0) ? 'AND' : 'Where'"></span>
                      <span class="rounded-4 bg-g3 px-2 py-1 text-g12 font-medium">Filled Day</span>
                      <span class="text-g9">falls within</span>
                      <span class="rounded-4 bg-a3 px-2 py-1 text-a12 font-medium" x-text="modal.kpi?.dateScope === 'week' ? 'Current week' : 'Current month'"></span>
                    </div>
                  </div>
                </div>
              </template>

              <!-- Connected: data source + preview -->
              <template x-if="modal.kpi?.sourceMode==='review' || modal.kpi?.sourceMode==='auto'">
                <div>
                  <!-- Data source row -->
                  <div class="mb-4" x-show="modal.kpi?.db || modal.kpi?.source">
                    <p class="text-micro-medium text-g9 uppercase tracking-wide mb-2">Data source</p>
                    <div class="flex items-center gap-2 text-mini">
                      <span class="text-g9 w-12 text-right shrink-0">From</span>
                      <span class="rounded-4 bg-a3 px-2 py-1 text-a12 font-medium" x-text="modal.kpi?.db || modal.kpi?.source"></span>
                    </div>
                  </div>

                  <!-- Preview with expand -->
                  <div>
                    <div class="flex items-center justify-between mb-2">
                      <p class="text-mini-medium text-g10">Preview: Matching records</p>
                      <div class="flex items-center gap-2">
                        <div class="relative" x-data="{open:false}">
                          <button class="flex items-center gap-1.5 rounded-6 bg-g2 px-2.5 py-1 text-micro-medium text-g11 hover:bg-g3 transition-colors" @click="open=!open">
                            <span x-text="cwLabel(modal.viewCW)"></span>
                            <svg class="h-3 w-3 text-g8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                          </button>
                          <div x-show="open" @click.away="open=false" x-transition class="absolute right-0 top-full mt-1 rounded-8 bg-p1 shadow-md border border-g4 z-10 p-1" style="min-width:160px">
                            <template x-for="w in weeks" :key="w.id">
                              <button class="w-full text-left rounded-6 px-3 py-1.5 text-mini transition-colors whitespace-nowrap" :class="modal.viewCW===w.id ? 'text-a11 bg-a3 font-medium' : 'text-g11 hover:bg-g3'" @click="modal.viewCW=w.id;modal.viewExpanded=false;open=false" x-text="cwLabel(w.id)"></button>
                            </template>
                          </div>
                        </div>
                        <p class="text-micro text-g9" x-text="(modal.viewExpanded ? viewAllRows.length : viewPreviewRows.length) + (viewTotalCount > 5 && !modal.viewExpanded ? ' of ' + viewTotalCount : '') + ' records'"></p>
                      </div>
                    </div>
                    <div class="rounded-8 border border-g4 overflow-hidden" :class="modal.viewExpanded && viewTotalCount > 8 ? 'max-h-72 overflow-y-auto' : ''">
                      <template x-if="viewPreviewRows.length > 0">
                        <table class="w-full text-mini">
                          <thead><tr class="bg-g2 border-b border-g4 sticky top-0 z-[1]">
                            <template x-for="col in (modal.kpi?.previewCols || [])" :key="col">
                              <th class="px-3 py-2 text-left text-mini-medium text-g10 font-medium" x-text="col"></th>

    const allRecords = [

    function parseNum(s) {
      if (!s || s === '—') return null;
      const c = String(s).replace(/[€\s]/g,'').replace(/\./g,'').replace(',','.');
      const n = parseFloat(c);
      return isNaN(n) ? null : n;
    }

    function filterRows(rows, filters, cw) {
      let result = rows.filter(r => r._cw === cw);
      for (const f of filters) {
        if (!f.field) continue;
        if (f.operator === 'is_empty') { result = result.filter(r => !r[f.field]); continue; }
        if (f.operator === 'is_not_empty') { result = result.filter(r => !!r[f.field]); continue; }
        if (!f.value) continue;
        result = result.filter(r => {
          const raw = r[f.field] || '';
          const val = raw.toLowerCase();
          const v = f.value.toLowerCase();
          if (f.operator === 'is') return val === v;
          if (f.operator === 'is_not') return val !== v;
          if (f.operator === 'contains') return val.includes(v);
          if (f.operator === 'does_not_contain') return !val.includes(v);
          if (['gt','lt','gte','lte'].includes(f.operator)) {
            const nv = parseNum(raw), nf = parseNum(f.value);
            if (nv === null || nf === null) return false;
            if (f.operator === 'gt') return nv > nf;
            if (f.operator === 'lt') return nv < nf;
            if (f.operator === 'gte') return nv >= nf;
            if (f.operator === 'lte') return nv <= nf;
          }
          return true;
        });
      }
      return result;
    }

        } else if (f.value) {

          parts.push(`<strong>${f.field}</strong> ${op} <strong>${f.value}</strong>`);

      const scope = kpi.dateScope === 'week' ? 'where Filled Day falls within the current week' : 'where Filled Day falls within the current month';

        if (parts.length) desc += ` where ${parts.join(' and ')}`;
        if (kpi.dateField) desc += (parts.length ? ', and ' : ', ') + scope;

      }
      const src = kpi.db || kpi.source;
      if (!src) return '';
      if (!parts.length && !kpi.dateField) return `All records from <strong>${src}</strong>.`;

      if (parts.length) desc += ` where ${parts.join(' and ')}`;
      if (kpi.dateField) desc += (parts.length ? ', and ' : ' ') + scope;
      return desc + '.';
    }
