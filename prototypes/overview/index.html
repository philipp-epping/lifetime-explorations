<body class="bg-p0 font-sans antialiased">

  <div x-data="explorations()" x-cloak class="mx-auto max-w-5xl px-6 py-10">

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-lg font-semibold text-g12 tracking-tight">Explorations</h1>
      <p class="text-sm text-g9 mt-1">Prototypes and design explorations for Lifetime.</p>
    </div>

    <!-- Filter tabs -->
    <div class="flex items-center gap-1 mb-5 border-b border-g4">
      <template x-for="tab in tabs" :key="tab.key">
        <button
          @click="activeTab = tab.key"
          :class="activeTab === tab.key
            ? 'text-g12 border-b-2 border-g12'
            : 'text-g9 border-b-2 border-transparent hover:text-g11'"
          class="px-3 py-2 text-sm-medium transition-colors -mb-px"
        >
          <span x-text="tab.label"></span>
          <span
            class="ml-1.5 inline-flex items-center justify-center rounded-full bg-g3 px-1.5 text-micro-medium text-g10 min-w-5 h-4"
            x-text="countForTab(tab.key)"
          ></span>
        </button>
      </template>
    </div>

    <!-- Table -->
    <div class="rounded-8 bg-p1 shadow-xs overflow-hidden">

      <!-- Table header -->
      <div class="grid grid-cols-[1fr_minmax(120px,200px)_140px_90px_44px] items-center gap-3 px-4 py-2.5 border-b border-g4 text-micro-medium text-g9 uppercase tracking-wide">
        <span>Exploration</span>
        <span>Project</span>
        <span>Status</span>
        <span>Started</span>
        <span></span>
      </div>

      <!-- Table rows -->
      <template x-for="item in filteredItems" :key="item.slug">
        <div class="grid grid-cols-[1fr_minmax(120px,200px)_140px_90px_44px] items-center gap-3 px-4 py-3 border-b border-g3 last:border-b-0 hover:bg-g2 transition-colors duration-fast group">

          <!-- Name + description -->
          <div class="min-w-0">
            <a
              :href="'../' + item.slug + '/index.html'"
              class="text-sm-medium text-g12 hover:text-a11 transition-colors truncate block"
              x-text="item.name"
            ></a>
            <p class="text-mini text-g9 truncate mt-0.5" x-text="item.description"></p>
          </div>

          <!-- Project -->
          <span class="text-sm text-g10 truncate" x-text="item.project"></span>

          <!-- Status dropdown -->
          <div class="relative" x-data="{ open: false }">
            <button
              @click="open = !open"
              class="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-micro-medium transition-colors cursor-pointer"
              :class="statusStyle(item.status)"
            >
              <span x-text="item.status"></span>
              <svg class="w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div
              x-show="open"
              @click.away="open = false"
              x-transition.opacity
              class="absolute left-0 top-full mt-1 z-20 w-40 rounded-8 bg-p1 shadow-md py-1"
            >
              <template x-for="s in statuses" :key="s">
                <button
                  @click="item.status = s; open = false; saveState()"
                  class="flex items-center gap-2 w-full px-3 py-1.5 text-sm text-g11 hover:bg-g3 transition-colors text-left"
                >
                  <span class="w-2 h-2 rounded-full" :class="statusDot(s)"></span>
                  <span x-text="s"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Started date -->
          <span class="text-mini text-g9 tabular-nums" x-text="item.started"></span>

          <!-- Download -->
          <a
            :href="'../' + item.slug + '/index.html'"
            :download="item.slug + '.html'"
            class="flex items-center justify-center w-7 h-7 rounded-6 text-g9 hover:text-g11 hover:bg-g3 transition-colors opacity-0 group-hover:opacity-100"
            title="Download HTML"
          >
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5m0 0l5-5m-5 5V3"/></svg>
          </a>
        </div>
      </template>

      <!-- Empty state -->
      <div x-show="filteredItems.length === 0" class="px-4 py-12 text-center">
        <p class="text-sm text-g9">No explorations match this filter.</p>
      </div>
    </div>

    <!-- Count -->
    <p class="text-mini text-g9 mt-3 px-1">
      <span x-text="filteredItems.length"></span> of <span x-text="items.length"></span> explorations
    </p>
  </div>

  <script>
    function explorations() {
      const defaultItems = [
        {
          slug: 'kpi-structure-settings',
          name: 'KPI Structure Settings',
          description: 'Configure which KPIs appear in which views across the company hierarchy',
          project: 'KPI Tracking',
          status: 'In Exploration',
          started: '2026-03-17',
        },
        {
          slug: 'settings',
          name: 'Settings',
          description: 'User and workspace settings panel',
          project: 'Settings',
          status: 'In Exploration',
          started: '2025-03-13',
        },
        {
          slug: 'kpi-source-config',
          name: 'KPI Source Config',
          description: 'Configure manual vs connected data sources for KPIs',
          project: 'KPI Tracking',
          status: 'In Exploration',
          started: '2025-03-10',
        },
        {
          slug: 'kpi-tree-editor',
          name: 'KPI Tree Editor',
          description: 'Hierarchical KPI structure editor with keyboard shortcuts',
          project: 'KPI Tracking',
          status: 'In Exploration',
          started: '2025-03-08',
        },
        {
          slug: 'kpi-tracker',
          name: 'KPI Tracker',
          description: 'KPI tracking dashboard with role switching and drill-down',
          project: 'KPI Tracking',
          status: 'In Exploration',
          started: '2025-03-05',
        },
        {
          slug: 'login',
          name: 'Login & Auth',
          description: 'Magic link authentication flow',
          project: 'Authentication',
          status: 'In Exploration',
          started: '2025-02-20',
        },
      ];

      const saved = localStorage.getItem('explorations-status');
      let items = defaultItems;
      if (saved) {
        try {
          const statusMap = JSON.parse(saved);
          items = defaultItems.map(item => ({
            ...item,
            status: statusMap[item.slug] || item.status,
          }));
        } catch (e) { /* ignore */ }
      }

      return {
        activeTab: 'All',
        statuses: ['In Exploration', 'In Design', 'Completed', 'Cancelled'],
        tabs: [
          { key: 'All', label: 'All' },
          { key: 'In Exploration', label: 'In Exploration' },
          { key: 'In Design', label: 'In Design' },
          { key: 'Completed', label: 'Completed' },
          { key: 'Cancelled', label: 'Cancelled' },
        ],
        items,

        get filteredItems() {
          const filtered = this.activeTab === 'All'
            ? this.items
            : this.items.filter(i => i.status === this.activeTab);
          return filtered.sort((a, b) => b.started.localeCompare(a.started));
        },

        countForTab(key) {
          return key === 'All'
            ? this.items.length
            : this.items.filter(i => i.status === key).length;
        },

        statusStyle(status) {
          const styles = {
            'In Exploration': 'bg-a3 text-a11',
            'In Design': 'bg-y3 text-y11',
            'Completed': 'bg-s3 text-s11',
            'Cancelled': 'bg-g3 text-g9',
          };
          return styles[status] || 'bg-g3 text-g9';
        },

        statusDot(status) {
          const dots = {
            'In Exploration': 'bg-a9',
            'In Design': 'bg-y9',
            'Completed': 'bg-s9',
            'Cancelled': 'bg-g8',
          };
          return dots[status] || 'bg-g8';
        },

        saveState() {
          const statusMap = {};
          this.items.forEach(i => { statusMap[i.slug] = i.status; });
          localStorage.setItem('explorations-status', JSON.stringify(statusMap));
        },
      };
    }
  </script>

</body>
</html>
