<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Tracker — DXR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: "Inter", system-ui, sans-serif;
      --color-p0: oklch(0.982 0 0); --color-p1: oklch(1 0 0);
      --color-g0: oklch(1 0 0); --color-g1: oklch(0.991 0 0); --color-g2: oklch(0.982 0 0);
      --color-g3: oklch(0.955 0 0); --color-g4: oklch(0.931 0 0); --color-g5: oklch(0.91 0 0);
      --color-g6: oklch(0.885 0 0); --color-g7: oklch(0.851 0 0); --color-g8: oklch(0.792 0 0);
      --color-g9: oklch(0.643 0 0); --color-g10: oklch(0.507 0 0);
      --color-g11: oklch(0.361 0.003 286.228); --color-g12: oklch(0.21 0.004 286.059);
      --color-a1: oklch(0.994 0.001 286.376); --color-a2: oklch(0.982 0.008 271.33);
      --color-a3: oklch(0.961 0.018 269.09); --color-a4: oklch(0.933 0.032 266.166);
      --color-a5: oklch(0.901 0.048 267.198); --color-a6: oklch(0.857 0.07 268.824);
      --color-a7: oklch(0.804 0.098 270.675); --color-a8: oklch(0.73 0.139 271.732);
      --color-a9: oklch(0.571 0.235 271.643); --color-a10: oklch(0.526 0.213 271.816);
      --color-a11: oklch(0.511 0.213 271.713); --color-a12: oklch(0.312 0.107 271.681);
      --color-y1: oklch(0.994 0.003 84.559); --color-y2: oklch(0.981 0.02 84.59);
      --color-y3: oklch(0.954 0.047 83.943); --color-y4: oklch(0.928 0.065 78.977);
      --color-y5: oklch(0.902 0.086 77.209); --color-y6: oklch(0.866 0.114 74.958);
      --color-y7: oklch(0.823 0.122 68.55); --color-y8: oklch(0.755 0.141 68.718);
      --color-y9: oklch(0.784 0.171 68.907); --color-y10: oklch(0.751 0.141 69.244);
      --color-y11: oklch(0.575 0.132 62.633); --color-y12: oklch(0.353 0.053 69.99);
      --color-d1: oklch(0.993 0.003 17.212); --color-d2: oklch(0.982 0.009 26.017);
      --color-d3: oklch(0.955 0.022 27.81); --color-d4: oklch(0.918 0.042 27.012);
      --color-d5: oklch(0.886 0.06 27.206); --color-d6: oklch(0.853 0.08 26.442);
      --color-d7: oklch(0.806 0.102 26.189); --color-d8: oklch(0.744 0.129 25.796);
      --color-d9: oklch(0.631 0.218 26.103); --color-d10: oklch(0.591 0.22 26.112);
      --color-d11: oklch(0.56 0.218 26.228); --color-d12: oklch(0.34 0.115 26.406);
      --color-s1: oklch(0.994 0.006 137.773); --color-s2: oklch(0.982 0.011 136.559);
      --color-s3: oklch(0.96 0.025 137.807); --color-s4: oklch(0.934 0.04 137.208);
      --color-s5: oklch(0.901 0.058 136.615); --color-s6: oklch(0.858 0.079 136.575);
      --color-s7: oklch(0.798 0.104 136.63); --color-s8: oklch(0.715 0.142 136.47);
      --color-s9: oklch(0.6 0.155 136.544); --color-s10: oklch(0.555 0.142 136.627);
      --color-s11: oklch(0.526 0.141 136.444); --color-s12: oklch(0.326 0.058 136.282);
      --color-alpha-2: oklch(0 0 0 / 0.02); --color-alpha-4: oklch(0 0 0 / 0.04);
      --color-alpha-6: oklch(0 0 0 / 0.06); --color-alpha-8: oklch(0 0 0 / 0.08);
      --color-alpha-10: oklch(0 0 0 / 0.1); --color-alpha-12: oklch(0 0 0 / 0.12);
      --color-alpha-16: oklch(0 0 0 / 0.16); --color-alpha-24: oklch(0 0 0 / 0.24);
      --color-alpha-36: oklch(0 0 0 / 0.36); --color-alpha-48: oklch(0 0 0 / 0.48);
      --color-alpha-80: oklch(0 0 0 / 0.8);
      --text-micro: 10px; --text-micro--font-weight: 450; --text-micro--line-height: 14px;
      --text-micro-medium: 10px; --text-micro-medium--font-weight: 500; --text-micro-medium--line-height: 14px;
      --text-mini: 12px; --text-mini--font-weight: 450; --text-mini--line-height: 15px;
      --text-mini-medium: 12px; --text-mini-medium--font-weight: 500; --text-mini-medium--line-height: 15px;
      --text-sm: 13px; --text-sm--font-weight: 450; --text-sm--line-height: 18px; --text-sm--letter-spacing: -0.28px;
      --text-sm-medium: 13px; --text-sm-medium--font-weight: 500; --text-sm-medium--line-height: 18px; --text-sm-medium--letter-spacing: -0.28px;
      --text-regular: 14px; --text-regular--font-weight: 450; --text-regular--line-height: 20px; --text-regular--letter-spacing: -0.13px;
      --text-regular-medium: 14px; --text-regular-medium--font-weight: 500; --text-regular-medium--line-height: 20px; --text-regular-medium--letter-spacing: -0.13px;
      --radius-0: 0px; --radius-2: 2px; --radius-4: 4px; --radius-6: 6px; --radius-8: 8px; --radius-10: 10px; --radius-12: 12px; --radius-full: 999px;
      --shadow-xs: 0 0 0 1px var(--color-alpha-6), 0 1px 3px 0 var(--color-alpha-4);
      --shadow-md: 0px 0px 1px 0px rgba(0,0,0,.27), 0px 4px 6px -1px rgba(0,0,0,.1), 0px 2px 4px -2px rgba(0,0,0,.1);
      --shadow-lg: 0px 0px 1px 0px rgba(0,0,0,.20), 0px 10px 15px -3px rgba(0,0,0,.1), 0px 4px 6px -4px rgba(0,0,0,.1);
      --duration-fast: 120ms; --duration-normal: 200ms; --duration-slow: 300ms;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1); --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }
    [x-cloak]{display:none!important}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}

    /* Dark spreadsheet table */
    .kg{border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed;border-left:1px solid var(--color-g11);border-top:1px solid var(--color-g11)}
    .kg th,.kg td{border-right:1px solid var(--color-g11);border-bottom:1px solid var(--color-g11);padding:0 10px;text-align:center;vertical-align:middle;height:36px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .kg th{background:var(--color-g11);color:var(--color-g7);height:32px}
    .kg td{background:var(--color-g12);color:var(--color-g3)}
    .kg td:first-child,.kg th:first-child{text-align:left;overflow:visible}
    .kg td.st-cell{overflow:visible}
    .kg .sc{position:sticky;left:0;z-index:10}
    .kg .dh td{background:var(--color-a9);color:white;font-weight:600;border-color:var(--color-a10);letter-spacing:.3px}
    .kg .ch td{background:var(--color-a11);color:var(--color-a5);font-weight:500;border-color:var(--color-a12)}
    .pc-g{background:var(--color-s6)!important;color:var(--color-s12)!important;font-weight:500}
    .pc-y{background:var(--color-y6)!important;color:var(--color-y12)!important;font-weight:500}
    .pc-r{background:var(--color-d6)!important;color:var(--color-d12)!important;font-weight:500}
    .sc-g{background:var(--color-s7)!important;color:var(--color-s12)!important}
    .sc-y{background:var(--color-y7)!important;color:var(--color-y12)!important}
    .sc-r{background:var(--color-d8)!important;color:var(--color-d12)!important}
    .wk{color:var(--color-g6)}
    .kpi-name{cursor:pointer;transition:background 120ms}
    .kpi-name:hover{background:var(--color-g11)!important}
    .cg-btn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border:1px solid var(--color-g9);border-radius:2px;background:var(--color-g11);cursor:pointer;font-size:12px;line-height:1;color:var(--color-g6);transition:all 120ms;flex-shrink:0}
    .cg-btn:hover{background:var(--color-g10);border-color:var(--color-g8)}
    .pace-cell{position:relative;cursor:default}
    .pace-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--color-g11);color:var(--color-g3);padding:5px 10px;border-radius:var(--radius-4);font-size:11px;font-weight:400;white-space:nowrap;z-index:30;pointer-events:none;box-shadow:var(--shadow-md)}
    .pace-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--color-g11)}
    .pace-cell:hover .pace-tip{display:block}
    .st-drop{background:var(--color-g12);border:1px solid var(--color-g10)}
    .st-drop button:hover{background:var(--color-g11)}
    .own-drop{background:var(--color-g12);border:1px solid var(--color-g10)}
    .own-drop button:hover{background:var(--color-g11)}
    .kg input.ei{border:none;padding:0;margin:0;height:100%;background:transparent;font:inherit;color:inherit;text-align:center;outline:none;width:100%;cursor:default}
    .kg input.ei:focus{cursor:text;background:var(--color-g11);border-radius:2px}
    .source-badge{display:inline-flex;align-items:center;gap:4px;cursor:pointer;transition:all 120ms;border-radius:4px;padding:2px 6px;margin:-2px -6px}
    .source-badge:hover{background:var(--color-g11)}

    /* Tree editor */
    .tr{display:flex;align-items:center;cursor:pointer;transition:background 80ms;user-select:none}
    .tr:hover{background:var(--color-g3)}
    .tr.sel{background:var(--color-a3)}
    .tr .act{opacity:0;transition:opacity 80ms}
    .tr:hover .act{opacity:1}
    .tr .tag{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:999px;font-size:10px;font-weight:500;line-height:14px;white-space:nowrap}
    .seg{display:flex;border-radius:var(--radius-6);background:var(--color-g2);padding:2px;gap:2px}
    .seg button{flex:1;border-radius:var(--radius-4);padding:4px 8px;font-size:12px;line-height:15px;font-weight:450;transition:all 120ms;white-space:nowrap;color:var(--color-g9)}
    .seg button:hover{color:var(--color-g11)}
    .seg button.on{background:var(--color-p1);color:var(--color-g12);font-weight:500;box-shadow:var(--shadow-xs)}
    .kbd{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:20px;padding:0 5px;border-radius:4px;background:var(--color-g2);border:1px solid var(--color-g4);font-size:11px;font-weight:500;color:var(--color-g10);font-family:inherit}

    /* Source modal preview */
    .editable-cell{cursor:pointer;position:relative}
    .editable-cell:hover{background:var(--color-a2)}

    /* Cell detail popover */
    .cd-pop{position:fixed;z-index:60;width:340px;max-height:420px;background:var(--color-p1);border:1px solid var(--color-g4);border-radius:var(--radius-8);box-shadow:var(--shadow-lg);overflow:hidden;display:flex;flex-direction:column}
    .cd-pop-body{overflow-y:auto;flex:1;min-height:0}
    .cd-pop table{width:100%;border-collapse:collapse}
    .cd-pop th{text-align:left;padding:6px 10px;font-size:11px;font-weight:500;color:var(--color-g10);border-bottom:1px solid var(--color-g4);background:var(--color-g2)}
    .cd-pop td{padding:5px 10px;font-size:12px;color:var(--color-g11);border-bottom:1px solid var(--color-g3)}
    .cd-pop tr:last-child td{border-bottom:0}
    .cd-pop tr:hover td{background:var(--color-g2)}

    /* Connected cell indicator */
    .kg td.cell-conn{cursor:pointer;position:relative}
    .kg td.cell-conn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--color-a8);opacity:0;transition:opacity 120ms}
    .kg td.cell-conn:hover::after{opacity:1}
    .kg td.cell-conn .ei{cursor:pointer}
    .kg td.cell-conn .ei:focus{cursor:text}

    /* Detail modal */
    .dtl-modal{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center}
    .dtl-inner{background:var(--color-p1);border-radius:var(--radius-12);box-shadow:var(--shadow-lg);width:90%;max-width:900px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
    .dtl-table{width:100%;border-collapse:collapse}
    .dtl-table th{text-align:left;padding:8px 14px;font-size:12px;font-weight:500;color:var(--color-g10);border-bottom:1px solid var(--color-g4);background:var(--color-g2);position:sticky;top:0;z-index:1}
    .dtl-table td{padding:6px 14px;font-size:13px;color:var(--color-g11);border-bottom:1px solid var(--color-g3)}
    .dtl-table tr:hover td{background:var(--color-g2)}
    .dtl-table .st-badge{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;cursor:pointer}
    .dtl-table .st-won{background:var(--color-s3);color:var(--color-s11)}
    .dtl-table .st-show{background:var(--color-s3);color:var(--color-s11)}
    .dtl-table .st-pending{background:var(--color-y3);color:var(--color-y11)}
    .dtl-table .st-bad{background:var(--color-d3);color:var(--color-d11)}
  </style>
</head>
<body class="bg-p0 font-sans antialiased" x-data="app()" @keydown.window="handleKey($event)" x-cloak>

  <!-- ═══════════ TRACKER HEADER ═══════════ -->
  <header x-show="view==='tracker'" class="sticky top-0 z-30 flex items-center justify-between border-b border-g4 bg-p1 px-6 py-2.5">
    <div class="flex items-center gap-3">
      <div class="flex h-7 w-7 items-center justify-center rounded-6 bg-a9 text-mini-medium text-white">D</div>
      <span class="text-regular-medium text-g12">DXR KPIs</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex rounded-6 bg-g2 p-0.5">
        <template x-for="r in ['ceo','lead','ic']" :key="r">
          <button class="rounded-4 px-3 py-1 text-mini-medium transition-colors" :class="role===r?'bg-p1 text-g12 shadow-xs':'text-g9 hover:text-g11'" @click="switchRole(r)" x-text="r==='ceo'?'CEO':r==='lead'?'Dept Lead':'IC'"></button>
        </template>
      </div>
      <div class="flex items-center gap-1">
        <button class="rounded-4 p-1 text-g9 hover:bg-g3 hover:text-g11 transition-colors" @click="cM===0?(cM=11,cY--):cM--"><svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
        <span class="min-w-24 text-center text-sm-medium text-g11" x-text="MN[cM]+' '+cY"></span>
        <button class="rounded-4 p-1 text-g9 hover:bg-g3 hover:text-g11 transition-colors" @click="cM===11?(cM=0,cY++):cM++"><svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>
      </div>
      <button class="rounded-6 p-1.5 text-g9 hover:bg-g3 hover:text-g11 transition-colors" @click="view='settings'" title="KPI Structure">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.241-.438.613-.431.992a7 7 0 010 .255c-.007.378.138.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a7 7 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a7 7 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.991a7 7 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </header>

  <!-- ═══════════ SETTINGS HEADER ═══════════ -->
  <header x-show="view==='settings'" class="sticky top-0 z-30 flex items-center justify-between border-b border-g4 bg-p1 px-6 py-2.5">
    <div class="flex items-center gap-3">
      <button class="rounded-6 p-1.5 text-g9 hover:bg-g3 hover:text-g11 transition-colors" @click="view='tracker'">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
      </button>
      <span class="text-regular-medium text-g12">KPI Structure</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-micro text-g8" x-text="stats.groups+' groups · '+stats.kpis+' KPIs'"></span>
      <div class="relative">
        <button class="rounded-6 px-2.5 py-1 text-mini text-g9 hover:bg-g3 hover:text-g11 transition-colors flex items-center gap-1" @click="showHelp=!showHelp">
          <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><circle cx="12" cy="17" r=".5" fill="currentColor"/></svg>
          Shortcuts
        </button>
        <div x-show="showHelp" @click.away="showHelp=false" x-transition class="absolute right-0 top-full mt-2 w-72 rounded-8 bg-p1 shadow-md border border-g4 p-4 z-40">
          <p class="text-sm-medium text-g12 mb-3">Keyboard shortcuts</p>
          <div class="space-y-2 text-mini text-g11">
            <div class="flex items-center justify-between"><span>Navigate</span><div class="flex gap-1"><span class="kbd">↑</span><span class="kbd">↓</span></div></div>
            <div class="flex items-center justify-between"><span>Expand / Collapse</span><div class="flex gap-1"><span class="kbd">→</span><span class="kbd">←</span></div></div>
            <div class="flex items-center justify-between"><span>Indent</span><span class="kbd">Tab</span></div>
            <div class="flex items-center justify-between"><span>Outdent</span><div class="flex gap-1"><span class="kbd">⇧</span><span class="kbd">Tab</span></div></div>
            <div class="flex items-center justify-between"><span>Reorder</span><div class="flex gap-1"><span class="kbd">⌘</span><span class="kbd">↑↓</span></div></div>
            <div class="flex items-center justify-between"><span>Add sibling</span><span class="kbd">Enter</span></div>
            <div class="flex items-center justify-between"><span>Delete</span><span class="kbd">⌫</span></div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ═══════════ TRACKER VIEW ═══════════════════════ -->
  <!-- ═══════════════════════════════════════════════════ -->
  <main x-show="view==='tracker'" class="mx-auto px-6 py-5" style="max-width:1500px" @click="openSt=null;openOwn=null;closeCellPop()" @scroll.window="if(cellPop.open)closeCellPop();if(openOwn&&_ownTrigger){let r=_ownTrigger.getBoundingClientRect();ownPos={x:r.left,y:r.bottom}}">

    <nav class="mb-3 flex items-center gap-1.5 text-sm text-g9" x-show="bc.length>1">
      <template x-for="(c,i) in bc" :key="i"><div class="flex items-center gap-1.5">
        <span x-show="i>0" class="text-g7">/</span>
        <button class="rounded-4 px-1.5 py-0.5 transition-colors" :class="i===bc.length-1?'text-g12 font-medium':'text-g9 hover:text-a11 hover:bg-a3'" @click="navTo(i)" x-text="c.l"></button>
      </div></template>
    </nav>

    <div x-show="role==='ceo'||role==='lead'">

      <!-- ═══ LEVEL 1 ═══ -->
      <template x-if="bc.length===1">
        <div>
          <div class="mb-4">
            <h1 class="text-regular-medium text-g12" x-text="role==='ceo'?'Company KPIs':leadDeptName"></h1>
            <p class="mt-0.5 text-mini text-g9" x-text="MN[cM]+' '+cY+' — CW'+CW"></p>
          </div>
          <div class="overflow-x-auto rounded-8">
            <div :style="'min-width:'+(sw?'1560':'1060')+'px'">
            <table class="kg text-sm">
              <thead><tr>
                <th style="width:260px" class="sc"><span class="text-mini-medium text-g7" x-text="MN[cM]+' '+cY"></span></th>
                <th style="width:120px" class="text-mini-medium text-g7">Target</th>
                <th style="width:120px" class="text-mini-medium text-g7">Actual</th>

                <th style="width:120px" class="text-mini-medium text-g7">Actual</th>
                <th style="width:130px" class="text-mini-medium text-g7">Pace</th>
                <th style="width:160px" class="text-mini-medium text-g7"><div class="flex items-center pr-1"><span class="flex-1 text-center">Status</span><button class="cg-btn" @click.stop="toggleW($event)"><span x-text="sw?'‹':'›'"></span></button></div></th>
                <template x-if="sw"><template x-for="(w,wi) in WK" :key="w">
                  <th style="width:100px" class="text-mini-medium" :class="w===CW?'text-a7':'text-g7'" :style="(wi===0?'border-left:2px solid var(--color-a8)':'')+(w===CW?';background:var(--color-a12)':'')"><div x-text="'W'+(wi+1)"></div><div class="text-micro font-normal" :class="w===CW?'text-a7':'text-g8'" x-text="WR[w]"></div></th>
                </template></template>
                <th style="width:130px" class="text-mini-medium text-g7" :style="sw?'border-left:2px solid var(--color-a8)':''">Owner</th>
                <th style="width:130px" class="text-mini-medium text-g7">Source</th>
              </tr></thead>
              <tbody>
                <template x-for="k in activeCh.children.filter(c=>!c.children.length)" :key="k.id">
                  <tr>
                    <td class="sc" style="background:var(--color-g12)"><span class="text-g3" x-text="k.name"></span><span class="text-micro text-g8 ml-1" x-text="aggLabel(k.agg)"></span></td>
                    <td class="tabular-nums text-g5"><input class="ei" type="text" :value="F(k.target,k.fmt)" :readonly="!canEdit()" @focus="if(canEdit())$el.value=k.target||''" @blur="k.target=+$el.value||k.target;reCalc(k);$el.value=F(k.target,k.fmt)" @keydown.enter="$el.blur()"></td>
                    <td class="tabular-nums font-medium text-g2" :class="(k.db||k.source)?'cell-conn':''" @click.stop="if(k.db||k.source)openCellPop(k,null,$event.currentTarget)"><input class="ei font-medium" type="text" :value="F(k.actual,k.fmt)" :readonly="!canEdit()" @focus="if(canEdit()){$el.value=k.actual||'';setTimeout(()=>$el.select())}" @blur="k.actual=+$el.value||k.actual;reCalc(k);$el.value=F(k.actual,k.fmt)" @keydown.enter="$el.blur()"></td>
                    <td class="tabular-nums font-medium pace-cell" :class="pcC(k.pr)"><span x-text="k.pv!==null?F(k.pv,k.fmt):''"></span><span class="pace-tip">Projected EOM at current pace</span></td>
                    <td :class="scC(k.status)+' st-cell'" class="relative">
                      <button class="w-full flex items-center justify-center gap-1" @click.stop="openOwn=null;openSt=openSt===k.id?null:k.id"><span x-text="scL(k.status)"></span><svg class="h-3 w-3 opacity-40 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg></button>
                      <div x-show="openSt===k.id" x-transition.opacity class="absolute left-1/2 -translate-x-1/2 top-full mt-0.5 z-20 w-40 rounded-8 p-1 st-drop shadow-md"><template x-for="s in STS" :key="s"><button class="flex w-full items-center gap-2 rounded-6 px-3 py-1.5 text-sm text-g3 transition-colors" @click.stop="k.status=s;openSt=null"><span class="inline-block h-3 w-6 rounded-2" :class="scC(s)"></span><span x-text="scL(s)"></span></button></template></div>
                    </td>
                    <template x-if="sw"><template x-for="(w,wi) in WK" :key="w">
                      <td class="tabular-nums text-mini" :class="(w===CW?'font-medium text-g2':'wk')+((k.db||k.source)?' cell-conn':'')" :style="(wi===0?'border-left:2px solid var(--color-a8)':'')+(w===CW?';background:var(--color-a12)':'')" @click.stop="if(k.db||k.source)openCellPop(k,w,$event.currentTarget)">
                        <input class="ei text-mini" :class="w===CW?'font-medium':''" type="text" :value="k.weekly?.[w]!==undefined?F(k.weekly[w],k.fmt):''" :readonly="!canEdit()" @focus="if(canEdit()){$el.value=k.weekly?.[w]??'';setTimeout(()=>$el.select())}" @blur="if(k.weekly){k.weekly[w]=$el.value===''?undefined:+$el.value};$el.value=k.weekly?.[w]!==undefined?F(k.weekly[w],k.fmt):''" @keydown.enter="$el.blur()">
                      </td>
                    </template></template>
                    <td class="text-mini" :style="sw?'border-left:2px solid var(--color-a8)':''" @click.stop><button @click="openSt=null;_ownTrigger=$el;let r=$el.getBoundingClientRect();ownPos={x:r.left,y:r.bottom};openOwn=openOwn===k.id?null:k.id" class="w-full flex items-center justify-center gap-1 hover:text-g3 transition-colors"><template x-if="k.ownerId"><span class="text-g8" x-text="ownerName(k.ownerId)"></span></template><template x-if="!k.ownerId"><span class="flex items-center gap-1 text-y11"><svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>No owner</span></template></button></td>
                    <td @click.stop><div class="source-badge" @click.stop="openSourceModal(k)">
                      <svg x-show="k.sourceMode==='manual'" class="h-3 w-3 text-g8 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                      <svg x-show="k.sourceMode==='auto'" class="h-3 w-3 text-a9 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                      <svg x-show="k.sourceMode==='review'" class="h-3 w-3 text-a9 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                      <span class="text-mini" :class="(k.db||k.source)?'text-g3':'text-g8'" x-text="k.db||k.source||'+ config'"></span>
                    </div></td>
                  </tr>
                </template>
              </tbody>
            </table>
            </div>
          </div>
        </div>
      </template>
    </div>

    <!-- ═══ IC VIEW ═══ -->
    <div x-show="role==='ic'">
      <div class="mb-4 flex items-end justify-between">
        <div>
          <h1 class="text-regular-medium text-g12">Robert Meier — My KPIs</h1>
          <p class="mt-0.5 text-mini text-g9">Fill in CW<span x-text="CW"></span> · <span x-text="MN[cM]+' '+cY"></span></p>
        </div>
        <button class="rounded-6 px-4 py-1.5 text-sm text-white shadow-xs transition-colors" :class="icS?'bg-s9 hover:bg-s10':'bg-a9 hover:bg-a10'" @click="icS=true;setTimeout(()=>icS=false,2000)" x-text="icS?'Saved!':'Save'"></button>
      </div>
      <div class="overflow-x-auto rounded-8">
        <div style="min-width:1130px">
        <table class="kg text-sm">
          <thead><tr>
            <th style="width:200px" class="text-mini-medium text-g7 text-left">KPI</th>
            <th style="width:110px" class="text-mini-medium text-g7">Target</th>
            <th style="width:110px" class="text-mini-medium text-g7">Actual</th>
            <th style="width:110px" class="text-mini-medium text-g7">Pace</th>
            <th style="width:150px" class="text-mini-medium text-g7">Status</th>
            <template x-for="w in WK" :key="w"><th style="width:90px" class="text-mini-medium" :class="w===CW?'text-a7':'text-g7'" :style="w===CW?'background:var(--color-a12)':''" x-text="'CW'+w"></th></template>
          </tr></thead>
          <tbody>
            <template x-for="(k,i) in icD" :key="k.id">
              <tr>
                <td class="text-left"><div class="text-g3"><span x-text="k.name"></span> <span class="text-micro text-g8" x-text="aggLabel(k.agg)"></span></div><div x-show="k.actual!==null" class="mt-1"><input type="text" class="w-full rounded-4 bg-g11 px-2 py-0.5 text-micro text-g7 outline-none placeholder:text-g9 focus:bg-g10 focus:text-g3" :value="k.context||''" @input="k.context=$event.target.value" placeholder="Add context..."></div></td>
                <td class="tabular-nums text-g5"><span x-text="F(k.target,k.fmt)"></span></td>
                <td class="tabular-nums font-medium text-g2"><span x-text="k.actual!==null?F(k.actual,k.fmt):'—'"></span></td>
                <td class="tabular-nums font-medium" :class="(k.pv!==null?pcC(k.pr):'')+' '+(k.pv!==null?'pace-cell':'')"><span x-text="k.pv!==null?F(k.pv,k.fmt):'-'"></span><template x-if="k.pv!==null"><span class="pace-tip">Projected EOM at current pace</span></template></td>
                <td :class="scC(k.so||k.as)+' st-cell'" class="relative">
                  <template x-if="k.actual!==null"><div>
                    <button class="w-full flex items-center justify-center gap-1" @click.stop="openOwn=null;openSt=openSt===k.id?null:k.id"><span x-text="scL(k.so||k.as)"></span><svg class="h-3 w-3 opacity-40 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg></button>
                    <div x-show="openSt===k.id" x-transition.opacity class="absolute left-1/2 -translate-x-1/2 top-full mt-0.5 z-20 w-40 rounded-8 p-1 st-drop shadow-md"><template x-for="s in STS" :key="s"><button class="flex w-full items-center gap-2 rounded-6 px-3 py-1.5 text-sm text-g3 transition-colors" @click.stop="k.so=s;openSt=null"><span class="inline-block h-3 w-6 rounded-2" :class="scC(s)"></span><span x-text="scL(s)"></span></button></template></div>
                  </div></template>
                  <template x-if="k.actual===null"><span class="text-g9">—</span></template>
                </td>
                <template x-for="w in WK" :key="w">
                  <td :style="w===CW?'background:var(--color-a12)':''">
                    <template x-if="w===CW"><input type="number" class="w-full bg-transparent text-center text-sm tabular-nums text-g2 outline-none font-medium" :value="k.weekly[w]??''" @input="uIc(i,w,$event.target.value)" placeholder="—"></template>
                    <template x-if="w!==CW"><span class="tabular-nums text-mini" :class="k.weekly[w]!==undefined?'wk':'text-g9'" x-text="k.weekly[w]!==undefined?F(k.weekly[w],k.fmt):''"></span></template>
                  </td>
                </template>
              </tr>
            </template>
          </tbody>
        </table>
        </div>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ═══════════ SETTINGS VIEW ═════════════════════ -->
  <!-- ═══════════════════════════════════════════════════ -->
  <main x-show="view==='settings'" class="flex" style="height:calc(100vh - 45px)">

    <!-- TREE PANEL -->
    <div class="flex-1 shrink-0 border-r border-g4 bg-p1 flex flex-col" style="min-width:320px;max-width:480px">
      <div class="px-4 py-3 border-b border-g4"><p class="text-mini-medium text-g10">Outline</p></div>
      <div class="flex-1 overflow-y-auto py-1">
        <template x-for="item in flat" :key="item.n.id">
          <div class="tr px-2 py-0.5" :class="selId===item.n.id?'sel':''" :style="'padding-left:'+(item.d*20+8)+'px'" :data-nid="item.n.id" @click="selectNode(item.n)">
            <button x-show="item.hc" class="flex items-center justify-center w-5 h-5 shrink-0 rounded-4 text-g8 hover:text-g11 hover:bg-g3 transition-colors" @click.stop="item.n.exp=!item.n.exp;_v++">
              <svg class="h-3 w-3 transition-transform duration-fast" :class="item.n.exp?'rotate-90':''" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
            </button>
            <span x-show="!item.hc" class="w-5 shrink-0 flex items-center justify-center"><span class="w-1.5 h-1.5 rounded-full" :class="selId===item.n.id?'bg-a9':'bg-g6'"></span></span>
            <span class="flex-1 truncate ml-1 text-sm" :class="item.hc?(item.d===0?'text-g12 font-semibold':'text-g12 font-medium'):'text-g11'" x-text="item.n.refId?refName(item.n.refId):item.n.name"></span>
            <span x-show="item.n.refId" class="tag bg-y3 text-y11 ml-1">Focus</span>
            <button class="act flex items-center justify-center w-5 h-5 shrink-0 rounded-4 text-g8 hover:text-a11 hover:bg-a3 transition-colors ml-1" @click.stop="addChildOf(item.n.id)" title="Add child" x-show="!item.n.refId">
              <svg class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            </button>
            <button class="act flex items-center justify-center w-5 h-5 shrink-0 rounded-4 text-g8 hover:text-d11 hover:bg-d3 transition-colors" @click.stop="deleteNode(item.n.id)" title="Delete">
              <svg class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
        </template>
      </div>
      <div class="px-4 py-3 border-t border-g4">
        <button class="w-full rounded-6 px-3 py-1.5 text-sm text-a11 hover:bg-a3 transition-colors text-left" @click="addRoot()">+ Add department</button>
      </div>
    </div>

    <!-- PROPERTIES PANEL -->
    <div class="flex-1 overflow-y-auto bg-p0" style="min-width:0">
      <div x-show="!selNode" class="flex flex-col items-center justify-center py-20 text-center">
        <div class="w-10 h-10 rounded-8 bg-g2 flex items-center justify-center mb-3"><svg class="h-5 w-5 text-g8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6z"/><path d="M3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25z"/><path d="M13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6z"/><path d="M13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25a2.25 2.25 0 01-2.25-2.25v-2.25z"/></svg></div>
        <p class="text-sm text-g10">Select a node to edit its properties</p>
        <p class="text-mini text-g9 mt-1">Use arrow keys to navigate, Tab to indent</p>
      </div>

      <!-- Reference node -->
      <template x-if="selNode && selNode.refId">
        <div class="max-w-lg mx-auto px-8 py-6">
          <div class="flex items-center gap-2 mb-5"><svg class="h-4 w-4 text-a9 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg><h2 class="text-regular-medium text-g12" x-text="refName(selNode.refId)"></h2></div>
          <div class="rounded-8 bg-a3 px-4 py-3 mb-5"><p class="text-sm text-a11">This is a Focus KPI reference. It mirrors a KPI that lives in its native department.</p></div>
          <button class="rounded-6 bg-a9 px-3 py-1.5 text-sm text-white shadow-xs hover:bg-a10 transition-colors" @click="selId=selNode.refId">Go to original KPI</button>
          <div class="border-t border-g4 pt-5 mt-5"><button class="rounded-6 px-3 py-1.5 text-sm text-d11 hover:bg-d3 transition-colors" @click="removeFocusRef(selNode.id)">Remove from Focus KPIs</button></div>
        </div>
      </template>

      <!-- Leaf KPI properties -->
      <template x-if="selNode && selIsLeaf && !selNode.refId">
        <div class="max-w-lg mx-auto px-8 py-6">
          <h2 class="text-regular-medium text-g12 mb-5" x-text="selNode.name"></h2>
          <div class="mb-5"><label class="block text-mini-medium text-g10 mb-1.5">Name</label><input data-name-input type="text" class="w-full rounded-6 bg-p1 px-3 py-1.5 text-sm text-g12 shadow-xs outline-none placeholder:text-g9 focus:ring-2 focus:ring-a9" :value="selNode?.name" @input="if(selNode){selNode.name=$event.target.value;_v++}" placeholder="KPI name..."></div>
          <div class="mb-5"><label class="block text-mini-medium text-g10 mb-1.5">Format</label><div class="seg"><button :class="selNode.fmt==='number'?'on':''" @click="selNode.fmt='number';_v++">Number</button><button :class="selNode.fmt==='currency'?'on':''" @click="selNode.fmt='currency';_v++">Currency</button><button :class="selNode.fmt==='percentage'?'on':''" @click="selNode.fmt='percentage';_v++">Percentage (%)</button></div></div>
          <div class="mb-5"><label class="block text-mini-medium text-g10 mb-1.5">Aggregation</label><div class="seg"><button :class="selNode.agg==='total'?'on':''" @click="selNode.agg='total';_v++">Total</button><button :class="selNode.agg==='average'?'on':''" @click="selNode.agg='average';_v++">Average</button><button :class="selNode.agg==='max'?'on':''" @click="selNode.agg='max';_v++">Max</button><button :class="selNode.agg==='manual'?'on':''" @click="selNode.agg='manual';_v++">Manual</button></div></div>
          <div class="mb-5"><label class="block text-mini-medium text-g10 mb-1.5">Period behavior</label><div class="seg"><button :class="selNode.period==='resets'?'on':''" @click="selNode.period='resets';_v++">Resets monthly</button><button :class="selNode.period==='carries_over'?'on':''" @click="selNode.period='carries_over';_v++">Carries over</button></div><p class="text-micro text-g8 mt-1.5" x-text="selNode.period==='resets'?'Starts at 0 each month (e.g. Bookings, Adspend)':'Starts from last month\'s end value (e.g. Followers, Cash Position)'"></p></div>
          <div class="mb-5"><label class="block text-mini-medium text-g10 mb-1.5">Owner</label><div class="relative" x-data="{op:false}"><button @click="op=!op" class="w-full flex items-center justify-between rounded-6 bg-p1 px-3 py-2 text-sm shadow-xs transition-colors hover:bg-g2 cursor-pointer" :class="selNode.ownerId?'text-g12':'text-g9'"><span class="flex items-center gap-2"><template x-if="selNode.ownerId && ownerUser(selNode.ownerId)"><span class="flex items-center gap-2"><span x-text="ownerName(selNode.ownerId)"></span><span class="inline-flex rounded-full px-2 py-0.5 text-micro-medium" :class="deptChipClass(ownerUser(selNode.ownerId).dept)" x-text="ownerUser(selNode.ownerId).role"></span></span></template><template x-if="!selNode.ownerId"><span>No owner</span></template></span><svg class="h-4 w-4 text-g8 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg></button><div x-show="op" @click.away="op=false" x-transition class="absolute top-full left-0 mt-1 w-full rounded-8 bg-p1 shadow-md border border-g4 z-20 p-1 max-h-64 overflow-y-auto"><button class="w-full text-left rounded-6 px-3 py-2 text-sm text-g9 hover:bg-g3 transition-colors" @click="selNode.ownerId='';_v++;op=false">No owner</button><template x-for="g in grpUsers()" :key="g.dept"><div><div class="px-3 pt-2.5 pb-1 text-micro-medium text-g9 uppercase tracking-wider" x-text="g.dept"></div><template x-for="u in g.users" :key="u.id"><button class="w-full text-left rounded-6 px-3 py-1.5 text-sm text-g11 hover:bg-g3 transition-colors flex items-center gap-2" @click="selNode.ownerId=u.id;_v++;op=false"><span x-text="u.name"></span><span class="inline-flex rounded-full px-2 py-0.5 text-micro-medium" :class="deptChipClass(u.dept)" x-text="u.role"></span></button></template></div></template></div></div></div>

          <div class="border-t border-g4 pt-5 mb-5">
            <p class="text-micro-medium text-g9 uppercase tracking-wide mb-4">Source Configuration</p>
            <div class="mb-5"><label class="block text-mini-medium text-g10 mb-1.5">Source mode</label><div class="seg"><button :class="selNode.sourceMode==='manual'?'on':''" @click="selNode.sourceMode='manual';_v++">Manual</button><button :class="selNode.sourceMode!=='manual'?'on':''" @click="if(selNode.sourceMode==='manual')selNode.sourceMode='review';_v++">Connected</button></div></div>
            <div x-show="selNode.sourceMode==='manual'" class="rounded-8 bg-g2 px-4 py-3 mb-4"><p class="text-sm text-g11">Value is entered manually each period by the KPI owner.</p></div>
            <div x-show="selNode.sourceMode!=='manual'" class="mb-4"><label class="block text-mini-medium text-g10 mb-1.5">Database</label><div class="relative" x-data="{open:false}"><button class="w-full flex items-center justify-between rounded-6 bg-p1 px-3 py-2 text-sm shadow-xs transition-colors hover:bg-g2" :class="selNode.db?'text-g12':'text-g9'" @click="open=!open" x-text="selNode.db||'Select database...'"></button><div x-show="open" @click.away="open=false" x-transition class="absolute top-full left-0 mt-1 w-full rounded-8 bg-p1 shadow-md border border-g4 z-10 p-1"><template x-for="db in databases" :key="db"><button class="w-full text-left rounded-6 px-3 py-2 text-sm text-g11 hover:bg-g3 transition-colors" @click="selNode.db=db;_v++;open=false" x-text="db"></button></template></div></div></div>

aceholder="Value..."></template><template x-if="f.operator==='is_empty'||f.operator==='is_not_empty'"><div class="flex-1"></div></template><button class="rounded-6 p-1 text-g8 hover:bg-g3 hover:text-g11 transition-colors shrink-0" @click="selNode.filters.splice(fi,1);if(!selNode.filters.length)selNode.filters.push({field:'',operator:'is',value:''});_v++"><svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div></template></div><button class="mt-2 rounded-6 px-3 py-1.5 text-mini text-a11 hover:bg-a3 transition-colors" @click="selNode.filters.push({field:'',operator:'is',value:''});_v++">+ Add condition</button></div>

            <div x-show="selNode.sourceMode!=='manual' && selNode.db" class="mb-4"><label class="block text-mini-medium text-g10 mb-2">Data entry</label><div class="space-y-2"><label class="flex items-start gap-3 rounded-8 border px-4 py-3 cursor-pointer transition-colors" :class="selNode.sourceMode==='review'?'bg-a3 border-a5':'border-g4 hover:bg-g2'" @click="selNode.sourceMode='review';_v++"><div class="mt-0.5 flex h-4 w-4 shrink-0 items-center justify-center rounded-full border-2 transition-colors" :class="selNode.sourceMode==='review'?'border-a9':'border-g6'"><div class="h-2 w-2 rounded-full transition-colors" :class="selNode.sourceMode==='review'?'bg-a9':''"></div></div><div><p class="text-sm-medium text-g12">Prefill for review</p><p class="text-mini text-g9 mt-0.5">Value is prefilled. A person reviews each period.</p></div></label><label class="flex items-start gap-3 rounded-8 border px-4 py-3 cursor-pointer transition-colors" :class="selNode.sourceMode==='auto'?'bg-a3 border-a5':'border-g4 hover:bg-g2'" @click="selNode.sourceMode='auto';_v++"><div class="mt-0.5 flex h-4 w-4 shrink-0 items-center justify-center rounded-full border-2 transition-colors" :class="selNode.sourceMode==='auto'?'border-a9':'border-g6'"><div class="h-2 w-2 rounded-full transition-colors" :class="selNode.sourceMode==='auto'?'bg-a9':''"></div></div><div><p class="text-sm-medium text-g12">Auto-fill</p><p class="text-mini text-g9 mt-0.5">Value is written automatically. No review needed.</p></div></label></div></div>

            </div>
          </div>
          <div class="border-t border-g4 pt-5"><button class="rounded-6 px-3 py-1.5 text-sm text-d11 hover:bg-d3 transition-colors" @click="deleteNode(selId)">Delete this KPI</button></div>

        </div>

  </main>

  <template x-teleport="body">

        if(v===null||v===undefined)return'—';
        if(fmt==='currency'){if(Math.abs(v)>=1000)return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:2}).format(v);}
        if(fmt==='percentage'){const r=Math.round(v*10)/10;return(r%1===0?r.toFixed(0):r.toFixed(1).replace('.',','))+'%';}
        if(typeof v==='number'){if(v>=1000)return new Intl.NumberFormat('de-DE').format(Math.round(v));return String(Math.round(v*10)/10).replace('.',',');}
        return String(v);
      },
      pcC(r){if(!r)return'';if(r>=1)return'pc-g';if(r>=0.8)return'pc-y';return'pc-r';},
      scC(s){return{green:'sc-g',yellow:'sc-y',red:'sc-r'}[s]||'';},
      scL(s){return{green:'On-Track',yellow:'Behind',red:'Off Track'}[s]||'—';},
      canEdit(){return this.role==='ceo'||this.role==='lead';},
      reCalc(k){if(!k.actual||!k.target){k.pv=null;k.pr=0;return;}const p=k.actual/DE*DM;k.pv=k.fmt==='percentage'?Math.round(p*10)/10:Math.round(p);k.pr=p/k.target;},

      deptLeafKpis(dept){return dept.children.filter(c=>!c.children.length&&!c.refId);},
      deptChannels(dept){return dept.children.filter(c=>c.children.length>0);},

      topRows(dept){
        const r=[];
        r.push({_k:dept.id+'_h',_t:'dept',_tr:'dh',name:dept.name,_click:()=>this.drillDept(dept)});
        for(const k of dept.children){if(k.children.length>0||k.refId)continue;k._k=k.id;k._t='kpi';k._tr='';k._click=()=>this.drillDept(dept);r.push(k);}
        return r;
      },

      toggleW(e){const sc=e.target.closest('.overflow-x-auto');const expanding=!this.sw;this.sw=!this.sw;this.$nextTick(()=>{if(!sc)return;setTimeout(()=>{const ths=sc.querySelectorAll('th');const lastWeekTh=ths.length>=3?ths[ths.length-3]:null;const target=lastWeekTh?lastWeekTh.offsetLeft+lastWeekTh.offsetWidth-sc.clientWidth:0;sc.scrollTo({left:expanding?Math.max(0,target):0,behavior:'smooth'});},20);});},
      switchRole(r){this.role=r;this.bc=[{l:r==='ceo'?'Company KPIs':r==='lead'?this.leadDeptName:'My KPIs'}];this.activeDept=null;this.activeCh=null;this.icS=false;this.openSt=null;},
      drillDept(dept){this.activeDept=dept;this.activeCh=null;this.bc=[{l:this.role==='ceo'?'Company KPIs':this.leadDeptName},{l:dept.name}];this.openSt=null;},
      drillCh(ch){this.activeCh=ch;this.bc=[...this.bc.slice(0,2),{l:ch.name}];this.openSt=null;},
      navTo(i){this.bc=this.bc.slice(0,i+1);if(i===0){this.activeDept=null;this.activeCh=null;}if(i===1)this.activeCh=null;this.openSt=null;},

      uIc(i,w,v){
        const val=v===''?undefined:parseFloat(v);this.icD[i].weekly[w]=val;
        const k=this.icD[i];const vs=Object.values(k.weekly).filter(x=>x!==undefined);
        if(!vs.length){k.actual=null;k.pv=null;k.pr=null;return;}
        k.actual=k.cm==='Incremental'?vs.reduce((a,b)=>a+b,0):vs[vs.length-1];
        const p=k.actual/DE*DM;k.pv=Math.round(p*10)/10;k.pr=p/k.target;
        k.as=k.pr>=1?'green':k.pr>=0.8?'yellow':'red';this.icS=false;
      },

      // Settings: tree editor
      opLabel(op){return{is:'is',is_not:'is not',contains:'contains',gt:'>',lt:'<',is_empty:'is empty',is_not_empty:'is not empty'}[op]||'is';},
      opsFor(fn){const d=fieldDefs.find(f=>f.name===fn);return ops[d?.type||'text'];},
      countAll(node){return countDescendants(node);},
      selIdx(){return this.flat.findIndex(f=>f.n.id===this.selId);},
      refName(refId){const orig=findNode(refId,this.tree);return orig?orig.name:'Unknown KPI';},

      selectNode(node){
        if(node.refId){this.selId=node.refId;this.toast='Jumped to original KPI — this is a Focus reference';clearTimeout(this._toastTimer);this._toastTimer=setTimeout(()=>{this.toast='';},2500);}
        else{this.selId=node.id;}
      },
      toggleFocus(){
        if(!this.selNode)return;const fk=findNode('fk',this.tree);if(!fk)return;
        if(this.selNode.focusKpi){const ri=fk.children.findIndex(c=>c.refId===this.selId);if(ri>=0)fk.children.splice(ri,1);this.selNode.focusKpi=false;}
        else{const ref=N('fkr'+(++_nid),'',[],{refId:this.selId});fk.children.push(ref);fk.exp=true;this.selNode.focusKpi=true;this.selNode.companyDashboard=true;}
        this._v++;
      },
      removeFocusRef(refNodeId){const refNode=findNode(refNodeId,this.tree);if(refNode&&refNode.refId){const orig=findNode(refNode.refId,this.tree);if(orig)orig.focusKpi=false;}removeFromTree(refNodeId,this.tree);this.selId=null;this._v++;},
      nav(dir){const fl=this.flat;const ni=this.selIdx()+dir;if(ni>=0&&ni<fl.length){this.selId=fl[ni].n.id;this.$nextTick(()=>{document.querySelector('[data-nid="'+this.selId+'"]')?.scrollIntoView({block:'nearest'});});}},
      indent(){const node=this.selNode;if(!node)return;const parent=findParent(this.selId,this.tree,null);const siblings=parent?parent.children:this.tree;const idx=siblings.indexOf(node);if(idx<=0)return;const prev=siblings[idx-1];siblings.splice(idx,1);prev.children.push(node);prev.exp=true;this._v++;},
      outdent(){const node=this.selNode;if(!node)return;const parent=findParent(this.selId,this.tree,null);if(!parent)return;const gp=findParent(parent.id,this.tree,null);const gpChildren=gp?gp.children:this.tree;const pidx=gpChildren.indexOf(parent);parent.children.splice(parent.children.indexOf(node),1);gpChildren.splice(pidx+1,0,node);this._v++;},
      moveUp(){const node=this.selNode;if(!node)return;const parent=findParent(this.selId,this.tree,null);const siblings=parent?parent.children:this.tree;const idx=siblings.indexOf(node);if(idx<=0)return;[siblings[idx-1],siblings[idx]]=[siblings[idx],siblings[idx-1]];this._v++;},
      moveDown(){const node=this.selNode;if(!node)return;const parent=findParent(this.selId,this.tree,null);const siblings=parent?parent.children:this.tree;const idx=siblings.indexOf(node);if(idx>=siblings.length-1)return;[siblings[idx],siblings[idx+1]]=[siblings[idx+1],siblings[idx]];this._v++;},
      addSibling(){const nn=N('n'+(++_nid),'New KPI',[]);if(!this.selId){this.tree.push(nn);this.selId=nn.id;this._v++;return;}const parent=findParent(this.selId,this.tree,null);const siblings=parent?parent.children:this.tree;siblings.splice(siblings.findIndex(n=>n.id===this.selId)+1,0,nn);this.selId=nn.id;this._v++;this.$nextTick(()=>{document.querySelector('[data-name-input]')?.focus();document.querySelector('[data-name-input]')?.select();});},
      addChild(){if(!this.selNode)return;const nn=N('n'+(++_nid),'New KPI',[]);this.selNode.children.push(nn);this.selNode.exp=true;this.selId=nn.id;this._v++;this.$nextTick(()=>{document.querySelector('[data-name-input]')?.focus();document.querySelector('[data-name-input]')?.select();});},
      addChildOf(id){const parent=findNode(id,this.tree);if(!parent)return;const nn=N('n'+(++_nid),'New KPI',[]);parent.children.push(nn);parent.exp=true;this.selId=nn.id;this._v++;this.$nextTick(()=>{document.querySelector('[data-name-input]')?.focus();document.querySelector('[data-name-input]')?.select();});},
      addRoot(){const nn=N('n'+(++_nid),'NEW DEPARTMENT',[]);this.tree.push(nn);this.selId=nn.id;this._v++;this.$nextTick(()=>{document.querySelector('[data-name-input]')?.focus();document.querySelector('[data-name-input]')?.select();});},
      deleteNode(id){
        if(!id)return;const node=findNode(id,this.tree);
        if(node&&node.focusKpi){const fk=findNode('fk',this.tree);if(fk){const ri=fk.children.findIndex(c=>c.refId===id);if(ri>=0)fk.children.splice(ri,1);}}
        if(node&&node.refId){const orig=findNode(node.refId,this.tree);if(orig)orig.focusKpi=false;}
        const fl=this.flat;const ci=fl.findIndex(f=>f.n.id===id);
        removeFromTree(id,this.tree);
        if(this.selId===id){if(ci<fl.length-1)this.selId=fl[ci+1]?.n.id||null;else if(ci>0)this.selId=fl[ci-1]?.n.id||null;else this.selId=null;}
        this._v++;
      },
      handleKey(e){
        if(this.view!=='settings'||this.modal.open)return;
        if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)){if(e.key==='Escape')e.target.blur();return;}
        const m=e.metaKey||e.ctrlKey;
        switch(true){
          case e.key==='ArrowUp'&&!m:e.preventDefault();this.nav(-1);break;
          case e.key==='ArrowDown'&&!m:e.preventDefault();this.nav(1);break;
          case e.key==='ArrowRight':{const n=this.selNode;if(n&&n.children.length&&!n.exp){n.exp=true;this._v++;e.preventDefault();}break;}
          case e.key==='ArrowLeft':{const n=this.selNode;if(n&&n.children.length&&n.exp){n.exp=false;this._v++;e.preventDefault();}else if(n){const p=findParent(this.selId,this.tree,null);if(p)this.selId=p.id;e.preventDefault();}break;}
          case e.key==='Tab'&&!e.shiftKey:e.preventDefault();this.indent();break;
          case e.key==='Tab'&&e.shiftKey:e.preventDefault();this.outdent();break;
          case e.key==='ArrowUp'&&m:e.preventDefault();this.moveUp();break;
          case e.key==='ArrowDown'&&m:e.preventDefault();this.moveDown();break;
          case e.key==='Enter':e.preventDefault();this.addSibling();break;
          case e.key==='Backspace'||e.key==='Delete':e.preventDefault();this.deleteNode(this.selId);break;
        }
      },

      // Source config modal
      openSourceModal(kpi){this.modal.kpi=kpi;this.modal.editing=false;this.modal.viewCW=CW;this.modal.editCW=CW;this.modal.viewExpanded=false;this.modal.editExpanded=false;this.modal.open=true;this.prepareSourceEdit(kpi);},
      closeSourceModal(){this.modal.open=false;},

      isConn(k){return !!(k.db||k.source);},
      openCellPop(kpi,week,el){
        if(!this.isConn(kpi))return;this.openSt=null;this.openOwn=null;
        const r=el.getBoundingClientRect();const pw=340;const rx=window.innerWidth-r.right;
        this.cellPop.kpi=kpi;this.cellPop.week=week;this.cellPop.pos={x:rx>pw+16?r.right+8:r.left-pw-8,y:Math.min(Math.max(r.top-4,8),window.innerHeight-430)};this.cellPop.open=true;
      },
      closeCellPop(){
        if(!this.cellPop.open)return;
        this.cellPop.open=false;this.cellPop.kpi=null;this.cellPop.week=null;
      },
      openDtl(){this.dtl={open:true,kpi:this.cellPop.kpi,week:this.cellPop.week};this.closeCellPop();},
      closeDtl(){this.dtl={open:false,kpi:null,week:null};this.dtlSt=null;},
      get cpRecs(){if(!this.cellPop.open||!this.cellPop.kpi)return[];return getCellRecs(this.cellPop.kpi,this.cellPop.week);},
      get cpCols(){if(!this.cellPop.kpi)return[];return getCellCols(this.cellPop.kpi);},
      get dtlRecs(){if(!this.dtl.open||!this.dtl.kpi)return[];return getCellRecs(this.dtl.kpi,this.dtl.week);},
      get dtlCols(){if(!this.dtl.kpi)return[];return getCellCols(this.dtl.kpi);},
      cpWeekLabel(){const w=this.cellPop.week;if(w===null)return MN[this.cM]+' '+this.cY;return 'CW'+w+' · '+(WR[w]||'');},
      dtlWeekLabel(){const w=this.dtl.week;if(w===null)return MN[this.cM]+' '+this.cY;return 'CW'+w+' · '+(WR[w]||'');},
      stBadgeClass(val){const v=(val||'').toLowerCase();if(['won','show','connected','hired','replied','qualified','completed','active','booked'].includes(v))return'st-won';if(['no show','no answer','bounced','disqualified','lost','cancelled'].includes(v))return'st-bad';return'st-pending';},

      prepareSourceEdit(kpi){
        this.modal.editName=kpi.name||'';this.modal.editFmt=kpi.fmt||'number';this.modal.editAgg=kpi.agg||'total';this.modal.editPeriod=kpi.period||'resets';
        this.modal.editOwner=kpi.ownerId||'';this.modal.editMode=kpi.sourceMode==='manual'?'manual':'connected';
        this.modal.editDb=kpi.db||'';this.modal.editFilters=kpi.filters?.length?kpi.filters.map(f=>({...f})):[{field:'',operator:'is',value:''}];
        this.modal.editDateScope=kpi.dateScope||'week';this.modal.editConfidence=kpi.sourceMode==='auto'?'auto':'review';
      },
      cancelSourceEdit(){this.modal.editing=false;this.prepareSourceEdit(this.modal.kpi);},
      saveSourceEdit(){
        const k=this.modal.kpi;k.name=this.modal.editName;k.fmt=this.modal.editFmt;k.agg=this.modal.editAgg;k.period=this.modal.editPeriod;k.ownerId=this.modal.editOwner;
        if(this.modal.editMode==='manual'){k.sourceMode='manual';k.source='';k.db='';}
        else{k.sourceMode=this.modal.editConfidence;k.source=this.modal.editDb;k.db=this.modal.editDb;}
        k.filters=this.modal.editFilters.filter(f=>f.field&&(f.value||this.isUnaryOp(f.operator))).map(f=>({...f}));
        k.dateScope=this.modal.editDateScope;
        this.reCalc(k);this._v++;this.modal.editing=false;
      },
    };
  }
  </script>
