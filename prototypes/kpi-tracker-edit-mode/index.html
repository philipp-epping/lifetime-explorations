<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Tracker (Edit Mode) — DXR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: "Inter", system-ui, sans-serif;
      --color-p0: oklch(0.982 0 0); --color-p1: oklch(1 0 0);
      --color-g0: oklch(1 0 0); --color-g1: oklch(0.991 0 0); --color-g2: oklch(0.982 0 0);
      --color-g3: oklch(0.955 0 0); --color-g4: oklch(0.931 0 0); --color-g5: oklch(0.91 0 0);
      --color-g6: oklch(0.885 0 0); --color-g7: oklch(0.851 0 0); --color-g8: oklch(0.792 0 0);
      --color-g9: oklch(0.643 0 0); --color-g10: oklch(0.507 0 0);
      --color-g11: oklch(0.361 0.003 286.228); --color-g12: oklch(0.21 0.004 286.059);
      --color-a1: oklch(0.994 0.001 286.376); --color-a2: oklch(0.982 0.008 271.33);
      --color-a3: oklch(0.961 0.018 269.09); --color-a4: oklch(0.933 0.032 266.166);
      --color-a5: oklch(0.901 0.048 267.198); --color-a6: oklch(0.857 0.07 268.824);
      --color-a7: oklch(0.804 0.098 270.675); --color-a8: oklch(0.73 0.139 271.732);
      --color-a9: oklch(0.571 0.235 271.643); --color-a10: oklch(0.526 0.213 271.816);
      --color-a11: oklch(0.511 0.213 271.713); --color-a12: oklch(0.312 0.107 271.681);
      --color-y1: oklch(0.994 0.003 84.559); --color-y2: oklch(0.981 0.02 84.59);
      --color-y3: oklch(0.954 0.047 83.943); --color-y4: oklch(0.928 0.065 78.977);
      --color-y5: oklch(0.902 0.086 77.209); --color-y6: oklch(0.866 0.114 74.958);
      --color-y7: oklch(0.823 0.122 68.55); --color-y8: oklch(0.755 0.141 68.718);
      --color-y9: oklch(0.784 0.171 68.907); --color-y10: oklch(0.751 0.141 69.244);
      --color-y11: oklch(0.575 0.132 62.633); --color-y12: oklch(0.353 0.053 69.99);
      --color-d1: oklch(0.993 0.003 17.212); --color-d2: oklch(0.982 0.009 26.017);
      --color-d3: oklch(0.955 0.022 27.81); --color-d4: oklch(0.918 0.042 27.012);
      --color-d5: oklch(0.886 0.06 27.206); --color-d6: oklch(0.853 0.08 26.442);
      --color-d7: oklch(0.806 0.102 26.189); --color-d8: oklch(0.744 0.129 25.796);
      --color-d9: oklch(0.631 0.218 26.103); --color-d10: oklch(0.591 0.22 26.112);
      --color-d11: oklch(0.56 0.218 26.228); --color-d12: oklch(0.34 0.115 26.406);
      --color-s1: oklch(0.994 0.006 137.773); --color-s2: oklch(0.982 0.011 136.559);
      --color-s3: oklch(0.96 0.025 137.807); --color-s4: oklch(0.934 0.04 137.208);
      --color-s5: oklch(0.901 0.058 136.615); --color-s6: oklch(0.858 0.079 136.575);
      --color-s7: oklch(0.798 0.104 136.63); --color-s8: oklch(0.715 0.142 136.47);
      --color-s9: oklch(0.6 0.155 136.544); --color-s10: oklch(0.555 0.142 136.627);
      --color-s11: oklch(0.526 0.141 136.444); --color-s12: oklch(0.326 0.058 136.282);
      --color-alpha-2: oklch(0 0 0 / 0.02); --color-alpha-4: oklch(0 0 0 / 0.04);
      --color-alpha-6: oklch(0 0 0 / 0.06); --color-alpha-8: oklch(0 0 0 / 0.08);
      --color-alpha-10: oklch(0 0 0 / 0.1); --color-alpha-12: oklch(0 0 0 / 0.12);
      --color-alpha-16: oklch(0 0 0 / 0.16); --color-alpha-24: oklch(0 0 0 / 0.24);
      --color-alpha-36: oklch(0 0 0 / 0.36); --color-alpha-48: oklch(0 0 0 / 0.48);
      --color-alpha-80: oklch(0 0 0 / 0.8);
      --text-micro: 10px; --text-micro--font-weight: 450; --text-micro--line-height: 14px;
      --text-micro-medium: 10px; --text-micro-medium--font-weight: 500; --text-micro-medium--line-height: 14px;
      --text-mini: 12px; --text-mini--font-weight: 450; --text-mini--line-height: 15px;
      --text-mini-medium: 12px; --text-mini-medium--font-weight: 500; --text-mini-medium--line-height: 15px;
      --text-sm: 13px; --text-sm--font-weight: 450; --text-sm--line-height: 18px; --text-sm--letter-spacing: -0.28px;
      --text-sm-medium: 13px; --text-sm-medium--font-weight: 500; --text-sm-medium--line-height: 18px; --text-sm-medium--letter-spacing: -0.28px;
      --text-regular: 14px; --text-regular--font-weight: 450; --text-regular--line-height: 20px; --text-regular--letter-spacing: -0.13px;
      --text-regular-medium: 14px; --text-regular-medium--font-weight: 500; --text-regular-medium--line-height: 20px; --text-regular-medium--letter-spacing: -0.13px;
      --radius-0: 0px; --radius-2: 2px; --radius-4: 4px; --radius-6: 6px; --radius-8: 8px; --radius-10: 10px; --radius-12: 12px; --radius-full: 999px;
      --shadow-xs: 0 0 0 1px var(--color-alpha-6), 0 1px 3px 0 var(--color-alpha-4);
      --shadow-md: 0px 0px 1px 0px rgba(0,0,0,.27), 0px 4px 6px -1px rgba(0,0,0,.1), 0px 2px 4px -2px rgba(0,0,0,.1);
      --shadow-lg: 0px 0px 1px 0px rgba(0,0,0,.20), 0px 10px 15px -3px rgba(0,0,0,.1), 0px 4px 6px -4px rgba(0,0,0,.1);
      --duration-fast: 120ms; --duration-normal: 200ms; --duration-slow: 300ms;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1); --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }
    [x-cloak]{display:none!important}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}

    /* Dark spreadsheet table */
    .kg{border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed;border-left:1px solid var(--color-g11);border-top:1px solid var(--color-g11)}
    .kg th,.kg td{border-right:1px solid var(--color-g11);border-bottom:1px solid var(--color-g11);padding:0 10px;text-align:center;vertical-align:middle;height:36px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .kg th{background:var(--color-g11);color:var(--color-g7);height:32px;position:sticky;top:49px;z-index:20}
    body.em .kg th{top:82px}
    .kg td{background:var(--color-g12);color:var(--color-g3)}
    .kg td:first-child,.kg th:first-child{text-align:left;overflow:visible}
    .kg td.st-cell{overflow:visible}
    .kg .sc{position:sticky;left:0;z-index:10}
    .kg th.sc{z-index:25}
    .kg-wrap{overflow:visible}
    .stick-l{position:sticky;left:0;width:fit-content}
    .kg .dh td{background:var(--color-a9);color:white;font-weight:600;border-color:var(--color-a10);letter-spacing:.3px}
    .kg .ch td{background:var(--color-a11);color:var(--color-a5);font-weight:500;border-color:var(--color-a12)}
    .pc-g{background:var(--color-s6)!important;color:var(--color-s12)!important;font-weight:500}
    .pc-y{background:var(--color-y6)!important;color:var(--color-y12)!important;font-weight:500}
    .pc-r{background:var(--color-d6)!important;color:var(--color-d12)!important;font-weight:500}
    .sc-g{background:var(--color-s7)!important;color:var(--color-s12)!important}
    .sc-y{background:var(--color-y7)!important;color:var(--color-y12)!important}
    .sc-r{background:var(--color-d8)!important;color:var(--color-d12)!important}
    .wk{color:var(--color-g6)}
    .kpi-name{cursor:pointer;transition:background 120ms}
    .kpi-name:hover{background:var(--color-g11)!important}
    .kpi-child td{font-size:12px}
    .kpi-child td:first-child{padding-left:32px}
    .kpi-child .child-dot{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--color-g9);margin-right:6px;vertical-align:middle;flex-shrink:0}
    .exp-btn{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:2px;cursor:pointer;color:var(--color-g8);transition:all 120ms;flex-shrink:0}
    .exp-btn:hover{color:var(--color-g5);background:var(--color-g11)}
    .cg-btn{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border:1px solid var(--color-g9);border-radius:2px;background:var(--color-g11);cursor:pointer;font-size:12px;line-height:1;color:var(--color-g6);transition:all 120ms;flex-shrink:0}
    .cg-btn:hover{background:var(--color-g10);border-color:var(--color-g8)}
    .pace-cell{position:relative;cursor:default}
    .pace-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--color-g11);color:var(--color-g3);padding:5px 10px;border-radius:var(--radius-4);font-size:11px;font-weight:400;white-space:nowrap;z-index:30;pointer-events:none;box-shadow:var(--shadow-md)}
    .pace-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--color-g11)}
    .pace-cell:hover .pace-tip{display:block}
    .st-drop{background:var(--color-g12);border:1px solid var(--color-g10)}
    .st-drop button:hover{background:var(--color-g11)}
    .own-drop{background:var(--color-g12);border:1px solid var(--color-g10)}
    .own-drop button:hover{background:var(--color-g11)}
    .kg input.ei{border:none;padding:0;margin:0;height:100%;background:transparent;font:inherit;color:inherit;text-align:center;outline:none;width:100%;cursor:default}
    .kg input.ei:focus{cursor:text;background:var(--color-g11);border-radius:2px}
    .source-badge{display:inline-flex;align-items:center;gap:4px;cursor:pointer;transition:all 120ms;border-radius:4px;padding:2px 6px;margin:-2px -6px}
    .source-badge:hover{background:var(--color-g11)}

    .seg{display:flex;border-radius:var(--radius-6);background:var(--color-g2);padding:2px;gap:2px}
    .seg button{flex:1;border-radius:var(--radius-4);padding:4px 8px;font-size:12px;line-height:15px;font-weight:450;transition:all 120ms;white-space:nowrap;color:var(--color-g9)}
    .seg button:hover{color:var(--color-g11)}
    .seg button.on{background:var(--color-p1);color:var(--color-g12);font-weight:500;box-shadow:var(--shadow-xs)}

    /* Edit mode */
    .edit-bar{background:var(--color-a2);border-bottom:1px solid var(--color-a5);padding:6px 24px;display:flex;align-items:center;gap:12px;position:fixed;top:49px;left:0;right:0;z-index:29}
    .edit-bar .edit-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:999px;background:var(--color-a9);color:white;font-size:11px;font-weight:500;letter-spacing:.3px}
    .edit-bar .edit-hint{font-size:12px;color:var(--color-a11)}
    .em-row{position:relative}
    .em-row .em-acts{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:2px;opacity:0;transition:opacity 80ms;z-index:5}
    .em-row:hover .em-acts{opacity:1}
    .em-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:var(--radius-4);cursor:pointer;transition:all 80ms;border:none;background:transparent;position:relative}
    .em-btn.add{color:var(--color-a9)}
    .em-btn.add:hover{background:var(--color-a3)}
    .em-btn.cfg{color:var(--color-g7)}
    .em-btn.cfg:hover{background:var(--color-g11);color:var(--color-g3)}
    .em-btn.del{color:var(--color-d9)}
    .em-btn.del:hover{background:var(--color-d3)}
    .em-btn[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--color-g12);color:var(--color-g3);padding:3px 8px;border-radius:4px;font-size:11px;font-weight:400;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 80ms;z-index:40;box-shadow:var(--shadow-md)}
    .em-btn[data-tip]::before{content:'';position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--color-g12);pointer-events:none;opacity:0;transition:opacity 80ms;z-index:40}
    .em-btn[data-tip]:hover::after,.em-btn[data-tip]:hover::before{opacity:1}

    /* Add KPI popover */
    .add-pop{position:fixed;z-index:60;width:280px;background:var(--color-p1);border:1px solid var(--color-g4);border-radius:var(--radius-8);box-shadow:var(--shadow-lg);overflow:hidden}
    .add-pop-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:13px;cursor:pointer;transition:background 80ms;color:var(--color-g11)}
    .add-pop-item:hover{background:var(--color-g2)}
    .add-pop-item .api{display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:var(--radius-4);flex-shrink:0}
    .add-pop-sep{height:1px;background:var(--color-g4);margin:0}
    .add-pop-search{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--color-g4)}
    .add-pop-search input{flex:1;border:none;background:transparent;font:inherit;font-size:13px;color:var(--color-g12);outline:none}
    .add-pop-search input::placeholder{color:var(--color-g9)}
    .add-pop-list{max-height:200px;overflow-y:auto}
    .add-pop-empty{padding:12px;text-align:center;font-size:12px;color:var(--color-g9)}
    .em-name{background:transparent;border:none;font:inherit;color:inherit;padding:0;margin:0;width:100%;outline:none;cursor:text}
    .em-name:focus{background:var(--color-g11);border-radius:2px;padding:0 4px;margin:0 -4px}
    .em-name::placeholder{color:var(--color-g8)}
    .em-dim td:not(:first-child){opacity:.35;pointer-events:none}
    .em-dim td:first-child{pointer-events:auto}
    .kg .em-add-row td{background:transparent;border-color:transparent;height:40px}
    .kg .em-add-row:hover td{background:var(--color-g12)!important}

    /* Source modal preview */
    .editable-cell{cursor:pointer;position:relative}
    .editable-cell:hover{background:var(--color-a2)}

    /* Cell detail popover */
    .cd-pop{position:fixed;z-index:60;width:340px;max-height:500px;background:var(--color-p1);border:1px solid var(--color-g4);border-radius:var(--radius-8);box-shadow:var(--shadow-lg);overflow:hidden;display:flex;flex-direction:column}
    .cd-pop-body{overflow-y:auto;flex:1;min-height:0}
    .cd-pop table{width:100%;border-collapse:collapse}
    .cd-pop th{text-align:left;padding:6px 10px;font-size:11px;font-weight:500;color:var(--color-g10);border-bottom:1px solid var(--color-g4);background:var(--color-g2)}
    .cd-pop td{padding:5px 10px;font-size:12px;color:var(--color-g11);border-bottom:1px solid var(--color-g3)}
    .cd-pop tr:last-child td{border-bottom:0}
    .cd-pop tr:hover td{background:var(--color-g2)}

    /* Connected cell indicator */
    .kg td.cell-conn{cursor:pointer;position:relative}
    .kg td.cell-conn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--color-a8);opacity:0;transition:opacity 120ms}
    .kg td.cell-conn:hover::after{opacity:1}
    .kg td.cell-conn .ei{cursor:pointer}
    .kg td.cell-conn .ei:focus{cursor:text}

    /* Detail modal */
    .dtl-modal{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center}
    .dtl-inner{background:var(--color-p1);border-radius:var(--radius-12);box-shadow:var(--shadow-lg);width:90%;max-width:900px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
    .dtl-table{width:100%;border-collapse:collapse}
    .dtl-table th{text-align:left;padding:8px 14px;font-size:12px;font-weight:500;color:var(--color-g10);border-bottom:1px solid var(--color-g4);background:var(--color-g2);position:sticky;top:0;z-index:1}
    .dtl-table td{padding:6px 14px;font-size:13px;color:var(--color-g11);border-bottom:1px solid var(--color-g3)}
    .dtl-table tr:hover td{background:var(--color-g2)}
    .dtl-table .st-badge{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;cursor:pointer}
    .dtl-table .st-won{background:var(--color-s3);color:var(--color-s11)}
    .dtl-table .st-show{background:var(--color-s3);color:var(--color-s11)}
    .dtl-table .st-pending{background:var(--color-y3);color:var(--color-y11)}
    .dtl-table .st-bad{background:var(--color-d3);color:var(--color-d11)}
    .dtl-table tr.excluded td{opacity:.4}
    .dtl-table input[type=checkbox]{accent-color:var(--color-a9);cursor:pointer}
    .dtl-search{border-top:1px solid var(--color-g4);background:var(--color-g2)}
  </style>
</head>
<body class="bg-p0 font-sans antialiased" x-data="app()" @keydown.window="handleKey($event)" :class="editMode?'em':''" x-cloak>

  <!-- ═══════════ TRACKER HEADER ═══════════ -->
  <header class="fixed top-0 left-0 right-0 z-30 flex items-center justify-between border-b border-g4 bg-p1 px-6 py-2.5">
    <div class="flex items-center gap-3">
      <div class="flex h-7 w-7 items-center justify-center rounded-6 bg-a9 text-mini-medium text-white">D</div>
      <span class="text-regular-medium text-g12">DXR KPIs</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex rounded-6 bg-g2 p-0.5">
        <template x-for="r in ['ceo','lead','ic']" :key="r">
          <button class="rounded-4 px-3 py-1 text-mini-medium transition-colors" :class="role===r?'bg-p1 text-g12 shadow-xs':'text-g9 hover:text-g11'" @click="switchRole(r)" x-text="r==='ceo'?'CEO':r==='lead'?'Dept Lead':'IC'"></button>
        </template>
      </div>
      <div class="flex items-center gap-1">
        <button class="rounded-4 p-1 text-g9 hover:bg-g3 hover:text-g11 transition-colors" @click="cM===0?(cM=11,cY--):cM--"><svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
        <span class="min-w-24 text-center text-sm-medium text-g11" x-text="MN[cM]+' '+cY"></span>
        <button class="rounded-4 p-1 text-g9 hover:bg-g3 hover:text-g11 transition-colors" @click="cM===11?(cM=0,cY++):cM++"><svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>
      </div>
      <button x-show="canEdit()&&!editMode" class="rounded-6 p-1.5 text-g9 hover:bg-a3 hover:text-a11 transition-colors" @click="editMode=true" title="Edit KPI Structure">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/></svg>
      </button>
      <button x-show="editMode" class="rounded-6 bg-a9 px-3 py-1 text-mini-medium text-white shadow-xs hover:bg-a10 transition-colors" @click="editMode=false">Done editing</button>
    </div>
  </header>

  <!-- Edit mode bar -->
  <div x-show="editMode" x-transition class="edit-bar" :style="'top:49px'">
    <span class="edit-pill"><svg class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z"/></svg>Editing</span>
    <span class="edit-hint">Click names to rename · Hover rows for actions · Click a KPI to configure</span>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ═══════════ TRACKER VIEW ═══════════════════════ -->
  <!-- ═══════════════════════════════════════════════════ -->
  <main class="mx-auto px-6 pb-5" style="max-width:1500px" :style="editMode?'padding-top:102px':'padding-top:69px'" @click="openSt=null;openOwn=null;closeCellPop()" @scroll.window="if(cellPop.open)closeCellPop();if(openOwn&&_ownTrigger){let r=_ownTrigger.getBoundingClientRect();ownPos={x:r.left,y:r.bottom}}">

    <nav class="mb-3 flex items-center gap-1.5 text-sm text-g9 stick-l" x-show="bc.length>1">
      <template x-for="(c,i) in bc" :key="i"><div class="flex items-center gap-1.5">

              <tbody>

                          </div>
                        </div></template>
                        <template x-if="row._t==='kpi'&&editMode"><div class="flex items-center gap-1.5 pr-20" @click.stop>

                      <td class="tabular-nums font-medium" :class="(row._t==='kpi'?pcC(row._n.pr):'')+' '+(row._t==='kpi'&&row._n.pv!==null?'pace-cell':'')">

                      <td :class="row._t==='kpi'?scC(row._n.status)+' st-cell':''" class="relative">

                          </div>
                        </div></template>
                      </td>
                      <template x-if="sw"><template x-for="(w,wi) in WK" :key="w">
                        <td class="tabular-nums text-mini" :class="(row._t==='kpi'?(w===CW?'font-medium text-g2':'wk'):'')+((row._t==='kpi'&&(row._n?.db||row._n?.source))?' cell-conn':'')" :style="(wi===0?'border-left:2px solid var(--color-a8)':'')+(row._t==='kpi'&&w===CW?';background:var(--color-a12)':'')" @click.stop="if(row._t==='kpi'&&(row._n.db||row._n.source))openCellPop(row._n,w,$event.currentTarget)">

                        </td>
                      </template></template>
                      <td class="text-mini" :style="sw?'border-left:2px solid var(--color-a8)':''" @click.stop><template x-if="row._t==='kpi'"><button @click="openSt=null;_ownTrigger=$el;let r=$el.getBoundingClientRect();ownPos={x:r.left,y:r.bottom};openOwn=openOwn===row._n.id?null:row._n.id" class="w-full flex items-center justify-center gap-1 hover:text-g3 transition-colors"><template x-if="row._n.ownerId"><span class="text-g8" x-text="ownerName(row._n.ownerId)"></span></template><template x-if="!row._n.ownerId"><span class="flex items-center gap-1 text-y11"><svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>No owner</span></template></button></template></td>

                        <template x-if="row._t==='kpi'"><div class="source-badge" @click.stop="openSourceModal(row._n)">

                    Add department
                  </button>
                </td></tr>
              </tbody>
            </table>
            </div>
          </div>
        </div>
      </template>

  <script>

        const orderedIds=dept.viewOrder?dept.viewOrder:[...extras.map(x=>x.id),...ownKpis.map(c=>c.id)];
        const allById={};for(const k of [...extras,...ownKpis])allById[k.id]=k;
        const rows=[];const seen=new Set();for(const id of orderedIds){const c=allById[id];if(!c||seen.has(id))continue;seen.add(id);c._hasChildren=c.children&&c.children.length>0;c._isChild=false;rows.push(c);if(c._hasChildren&&c.exp){for(const ch of c.children){ch._isChild=true;ch._hasChildren=false;rows.push(ch);seen.add(ch.id);}}}
        for(const k of [...extras,...ownKpis]){if(!seen.has(k.id)){k._hasChildren=k.children&&k.children.length>0;k._isChild=false;rows.push(k);}}return rows;},
      deptChannels(dept){return dept.children.filter(c=>c.children.length>0&&c.target===null);},
      get focusKpiNodes(){const fk=this.focusDept;if(!fk||!fk.children.length)return[];return fk.children.map(ref=>ref.refId?findNode(ref.refId,this.tree):null).filter(Boolean);},

      get allDeptRows(){
        this._v;const self=this;const result=[];
        const deptsArr=this.role==='lead'?[this.leadDept].filter(Boolean):this.depts;

        for(const dept of deptsArr){
          result.push({_k:dept.id+'_h',_t:'dept',_tr:'dh',name:dept.name,_dept:dept,_click:()=>self.drillDept(dept)});
          (function collect(nodes){for(const k of nodes){
            if(k.refId){const resolved=findNode(k.refId,self.tree);if(resolved){resolved._hasChildren=resolved.children&&resolved.children.length>0;result.push({_k:dept.id+'_'+resolved.id,_t:'kpi',_tr:'',_dept:dept,_click:()=>self.drillDept(dept),_n:resolved});if(resolved._hasChildren&&resolved.exp){for(const ch of resolved.children){const cn=ch.refId?findNode(ch.refId,self.tree):ch;if(cn)result.push({_k:dept.id+'_'+cn.id+'_c',_t:'kpi',_tr:'kpi-child',_dept:dept,_click:()=>self.drillDept(dept),_n:cn,_isChild:true});}}}continue;}
            if(k.children.length>0&&k.target===null){collect(k.children);continue;}
            if(k.companyDashboard){k._hasChildren=k.children&&k.children.length>0;result.push({_k:dept.id+'_'+k.id,_t:'kpi',_tr:'',_dept:dept,_click:()=>self.drillDept(dept),_n:k});
              if(k._hasChildren&&k.exp){for(const ch of k.children){const cn=ch.refId?findNode(ch.refId,self.tree):ch;if(cn)result.push({_k:dept.id+'_'+cn.id+'_c',_t:'kpi',_tr:'kpi-child',_dept:dept,_click:()=>self.drillDept(dept),_n:cn,_isChild:true});}}
            }
          }})(dept.children);
        }

        return result;
      },

      toggleW(e){const expanding=!this.sw;this.sw=!this.sw;this.$nextTick(()=>{setTimeout(()=>{if(expanding){const tbl=e.target.closest('table')||document.querySelector('.kg');if(!tbl)return;const ths=tbl.querySelectorAll('thead th');const lastWeekTh=ths.length>=3?ths[ths.length-3]:null;if(lastWeekTh){const r=lastWeekTh.getBoundingClientRect();window.scrollTo({left:window.scrollX+r.right-window.innerWidth,behavior:'smooth'});}}else{window.scrollTo({left:0,behavior:'smooth'});}},30);});},
      switchRole(r){this.role=r;this.bc=[{l:r==='ceo'?'Company KPIs':r==='lead'?this.leadDeptName:'My KPIs'}];this.activeDept=null;this.activeCh=null;this.icS=false;this.openSt=null;this.editMode=false;},
      drillDept(dept){this.activeDept=dept;this.activeCh=null;this.bc=[{l:this.role==='ceo'?'Company KPIs':this.leadDeptName},{l:dept.name}];this.openSt=null;},
      drillCh(ch){this.activeCh=ch;this.bc=[...this.bc.slice(0,2),{l:ch.name}];this.openSt=null;},
      navTo(i){this.bc=this.bc.slice(0,i+1);if(i===0){this.activeDept=null;this.activeCh=null;}if(i===1)this.activeCh=null;this.openSt=null;},

      uIc(i,w,v){
        const val=v===''?undefined:parseFloat(v);this.icD[i].weekly[w]=val;
        const k=this.icD[i];const vs=Object.values(k.weekly).filter(x=>x!==undefined);
        if(!vs.length){k.actual=null;k.pv=null;k.pr=null;return;}
        k.actual=k.cm==='Incremental'?vs.reduce((a,b)=>a+b,0):vs[vs.length-1];
        const p=k.actual/DE*DM;k.pv=Math.round(p*10)/10;k.pr=p/k.target;
        k.as=k.pr>=1?'green':k.pr>=0.8?'yellow':'red';this.icS=false;
      },

      opLabel(op){return{is:'is',is_not:'is not',contains:'contains',gt:'>',lt:'<',is_empty:'is empty',is_not_empty:'is not empty'}[op]||'is';},
      opsFor(fn){const d=fieldDefs.find(f=>f.name===fn);return ops[d?.type||'text'];},
      countAll(node){return countDescendants(node);},
      refName(refId){const orig=findNode(refId,this.tree);return orig?orig.name:'Unknown KPI';},

      addRoot(){const nn=N('n'+(++_nid),'NEW DEPARTMENT',[]);this.tree.push(nn);this._v++;this.toast='Department added';clearTimeout(this._toastTimer);this._toastTimer=setTimeout(()=>{this.toast='';},2000);},

      openAddPop(e,parentId,type){
        const r=e.currentTarget.getBoundingClientRect();
        const pw=280;const x=Math.min(r.left,window.innerWidth-pw-16);
        this.addPop={open:true,parentId,type,x,y:r.bottom+6};
        this.addPopQ='';
        this.$nextTick(()=>{this.$refs.addPopInput?.focus();});
      },

      get addPopResults(){
        this._v;
        const q=this.addPopQ.toLowerCase().trim();
        if(!q)return[];
        const parentId=this.addPop.parentId;
        const parent=findNode(parentId,this.tree);
        const existingIds=new Set();
        if(parent)(function ids(n){existingIds.add(n.id);(n.children||[]).forEach(ids);})(parent);
        const results=[];
        (function walk(nodes,path){for(const n of nodes){
          const p=path?path+' › '+n.name:n.name;
          if(!existingIds.has(n.id)&&n.name.toLowerCase().includes(q)&&!n.refId){
            results.push({...n,_path:path||'Root'});
          }
          if(n.children)walk(n.children,p);
        }})(this.tree,'');
        return results.slice(0,8);
      },

      createInPop(){
        const parentId=this.addPop.parentId;const type=this.addPop.type;
        this.addPop.open=false;
        const parent=findNode(parentId,this.tree);
        if(!parent)return;
        if(type==='dept'){
          const nn=N('n'+(++_nid),'New KPI',[],{companyDashboard:true,visibleIn:[parent.id==='sc'?'company':parent.id]});
          parent.children.push(nn);parent.exp=true;this._v++;
          this.$nextTick(()=>{this.openSourceModal(nn,true);});
        }else if(type==='group'){
          const nn=N('n'+(++_nid),'New KPI',[]);
          parent.children.push(nn);parent.exp=true;this._v++;
          this.$nextTick(()=>{this.openSourceModal(nn,true);});
        }else{
          const nn=N('n'+(++_nid),'New KPI',[]);
          parent.children.push(nn);parent.exp=true;this._v++;
          this.$nextTick(()=>{this.openSourceModal(nn,true);});
        }
      },

      linkInPop(kpi){
        const parentId=this.addPop.parentId;const type=this.addPop.type;
        this.addPop.open=false;
        const parent=findNode(parentId,this.tree);
        if(!parent)return;
        if(type==='child'){
          const ref=N('n'+(++_nid),'',[],{refId:kpi.id});
          parent.children.push(ref);parent.exp=true;
        }else{
          if(!kpi.visibleIn)kpi.visibleIn=[];
          if(!kpi.visibleIn.includes(parentId))kpi.visibleIn.push(parentId);
          if(parentId==='sc'||type==='dept')kpi.companyDashboard=true;
        }
        this._v++;
        this.toast='Linked: '+kpi.name;clearTimeout(this._toastTimer);this._toastTimer=setTimeout(()=>{this.toast='';},2000);
      },

      _findDeptOf(nodeId){
        for(const dept of this.tree){
          if(dept.id===nodeId)return dept;
          if(findNode(nodeId,dept.children))return dept;
        }
        return null;
      },

      addGroupToDept(dept){
        const nn=N('n'+(++_nid),'New Group',[N('n'+(++_nid),'New KPI',[])]);
        nn.target=null;
        dept.children.push(nn);dept.exp=true;this._v++;
        this.toast='Group added — drill into '+dept.name+' to see it';clearTimeout(this._toastTimer);this._toastTimer=setTimeout(()=>{this.toast='';},3000);
      },

      deleteNode(id){
        if(!id)return;
        const node=findNode(id,this.tree);
        if(node&&node.focusKpi){const fk=findNode('fk',this.tree);if(fk){const ri=fk.children.findIndex(c=>c.refId===id);if(ri>=0)fk.children.splice(ri,1);}}
        if(node&&node.refId){const orig=findNode(node.refId,this.tree);if(orig)orig.focusKpi=false;}
        removeFromTree(id,this.tree);
        this._v++;this.toast='Deleted';clearTimeout(this._toastTimer);this._toastTimer=setTimeout(()=>{this.toast='';},2000);
      },

      handleKey(e){
        if(e.key==='Escape'&&this.editMode){this.editMode=false;e.preventDefault();return;}
      },

      // Source config modal
      openSourceModal(kpi,startEditing){this.modal.kpi=kpi;this.modal.editing=!!startEditing;this.modal.viewCW=CW;this.modal.editCW=CW;this.modal.viewExpanded=false;this.modal.editExpanded=false;this.modal.open=true;this.prepareSourceEdit(kpi);},
      closeSourceModal(){this.modal.open=false;},

      isConn(k){return !!(k.db||k.source);},
      openCellPop(kpi,week,el){
        if(!this.isConn(kpi))return;this.openSt=null;this.openOwn=null;
        const r=el.getBoundingClientRect();const pw=340;const rx=window.innerWidth-r.right;
        this.cellPop.kpi=kpi;this.cellPop.week=week;this.cellPop.pos={x:rx>pw+16?r.right+8:r.left-pw-8,y:Math.min(Math.max(r.top-4,8),window.innerHeight-510)};this.cellPop.open=true;
      },
      closeCellPop(){
        if(!this.cellPop.open)return;
        this.cellPop.open=false;this.cellPop.kpi=null;this.cellPop.week=null;
      },
      openDtl(){
        const recs=getCellRecs(this.cellPop.kpi,this.cellPop.week);
        this.dtlData=recs.map(r=>({...r,_included:true}));
        this.dtl={open:true,kpi:this.cellPop.kpi,week:this.cellPop.week};
        this.dtlSearch=false;this.closeCellPop();
      },
      updateDtl(){
        const k=this.dtl.kpi;const w=this.dtl.week;
        if(k&&w!==null){
          const inc=this.dtlData.filter(r=>r._included).length;
          if(k.weekly)k.weekly[w]=inc;
          const wks=Object.values(k.weekly||{}).filter(v=>v!==undefined);
          if(wks.length){k.actual=k.agg==='average'?Math.round(wks.reduce((a,b)=>a+b,0)/wks.length):wks.reduce((a,b)=>a+b,0);}
          this.reCalc(k);this._v++;
        } else if(k&&w===null){
          const inc=this.dtlData.filter(r=>r._included).length;
          k.actual=inc;
          this.reCalc(k);this._v++;
        }
        this.toast='KPI updated';clearTimeout(this._toastTimer);this._toastTimer=setTimeout(()=>{this.toast='';},2000);
        this.closeDtl();
      },
      closeDtl(){this.dtl={open:false,kpi:null,week:null};this.dtlData=[];this.dtlSearch=false;this.dtlSt=null;this.dtlStRec=null;this.dtlStCol=null;},
      get cpRecs(){if(!this.cellPop.open||!this.cellPop.kpi)return[];return getCellRecs(this.cellPop.kpi,this.cellPop.week);},
      get cpCols(){if(!this.cellPop.kpi)return[];return getCellCols(this.cellPop.kpi);},
      get cpSmartCols(){if(!this.cellPop.kpi)return[];const cols=getCellCols(this.cellPop.kpi);const k=this.cellPop.kpi;if(k.fmt==='number'&&k.agg==='total'&&cols.includes('Value'))return cols.filter(c=>c!=='Value');return cols;},
      get dtlSmartCols(){if(!this.dtl.kpi)return[];const cols=getCellCols(this.dtl.kpi);const k=this.dtl.kpi;if(k.fmt==='number'&&k.agg==='total'&&cols.includes('Value'))return cols.filter(c=>c!=='Value');return cols;},
      get dtlIncludedCount(){return this.dtlData.filter(r=>r._included).length;},
      get dtlExcludedCount(){return this.dtlData.filter(r=>!r._included).length;},
      get dtlStatusOpts(){const src=this.dtl.kpi?.db||this.dtl.kpi?.source;if(src==='Marketing Tracking')return['Show','No Show','Pending','Cancelled'];if(src==='Personio')return['Applied','Interview','Offer','Hired','Rejected'];return['Won','Pending','Lost','Active','Cancelled'];},
      isDateCol(col){return/date|month|day/i.test(col);},
      toISODate(v){if(!v)return'';const p=v.match(/(\d{2})\/(\d{2})\/(\d{4})/);return p?`${p[3]}-${p[2]}-${p[1]}`:v;},
      fromISODate(v){if(!v)return'';const p=v.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:v;},
      dtlSearchResults(q){
        if(!q||q.length<1)return[];const ql=q.toLowerCase();const src=this.dtl.kpi?.db||this.dtl.kpi?.source;
        const mkt=[
          {name:'Pfeiffer GmbH',detail:'09/03/2026 · No Show · Paid Ads',_tpl:{Name:'Pfeiffer GmbH','Booking Date':'09/03/2026','UTM Source':'Paid Ads',Status:'No Show',Revenue:'€3.200'}},
          {name:'Albrecht & Co',detail:'11/03/2026 · Pending · Outbound Mail',_tpl:{Name:'Albrecht & Co','Booking Date':'11/03/2026','UTM Source':'Outbound Mail',Status:'Pending',Revenue:'€7.600'}},
          {name:'Dietrich Solutions',detail:'07/03/2026 · Show · Organic',_tpl:{Name:'Dietrich Solutions','Booking Date':'07/03/2026','UTM Source':'Organic',Status:'Show',Revenue:'€11.400'}},
          {name:'Vogt Consulting',detail:'10/03/2026 · Show · Referral',_tpl:{Name:'Vogt Consulting','Booking Date':'10/03/2026','UTM Source':'Referral',Status:'Show',Revenue:'€9.800'}},
          {name:'Seidel Holding',detail:'12/03/2026 · Cancelled · Paid Ads',_tpl:{Name:'Seidel Holding','Booking Date':'12/03/2026','UTM Source':'Paid Ads',Status:'Cancelled',Revenue:'—'}},
        ];
        const plecto=[
          {name:'Berger GmbH',detail:'10/03/2026 · Won · €8.500',_tpl:{Name:'Berger GmbH',Date:'10/03/2026',Value:'€8.500',Stage:'Won'}},
          {name:'Lorenz AG',detail:'08/03/2026 · Pending · €4.200',_tpl:{Name:'Lorenz AG',Date:'08/03/2026',Value:'€4.200',Stage:'Pending'}},
          {name:'Franke & Co',detail:'12/03/2026 · Won · €11.900',_tpl:{Name:'Franke & Co',Date:'12/03/2026',Value:'€11.900',Stage:'Won'}},
        ];
        const personio=[
          {name:'Th. Berger',detail:'Developer · Applied · 08/03/2026',_tpl:{Candidate:'Th. Berger',Date:'08/03/2026',Position:'Developer',Stage:'Applied'}},
          {name:'L. Maier',detail:'Sales Rep · Interview · 10/03/2026',_tpl:{Candidate:'L. Maier',Date:'10/03/2026',Position:'Sales Rep',Stage:'Interview'}},
          {name:'S. Krämer',detail:'CSM · Offer · 11/03/2026',_tpl:{Candidate:'S. Krämer',Date:'11/03/2026',Position:'CSM',Stage:'Offer'}},
        ];
        const aircall=[
          {name:'M. Fischer',detail:'Connected · 3:42 · 09/03/2026',_tpl:{Contact:'M. Fischer',Date:'09/03/2026',Duration:'3:42',Outcome:'Connected'}},
          {name:'K. Weber',detail:'Voicemail · 1:15 · 10/03/2026',_tpl:{Contact:'K. Weber',Date:'10/03/2026',Duration:'1:15',Outcome:'Voicemail'}},
          {name:'A. Braun',detail:'Connected · 5:20 · 11/03/2026',_tpl:{Contact:'A. Braun',Date:'11/03/2026',Duration:'5:20',Outcome:'Connected'}},
        ];
        const generic=[
          {name:'Meier GmbH',detail:'10/03/2026 · Active',_tpl:{Name:'Meier GmbH',Date:'10/03/2026',Value:'1',Status:'Active'}},
          {name:'Scholz AG',detail:'11/03/2026 · Active',_tpl:{Name:'Scholz AG',Date:'11/03/2026',Value:'1',Status:'Active'}},
          {name:'Krüger & Partner',detail:'09/03/2026 · Active',_tpl:{Name:'Krüger & Partner',Date:'09/03/2026',Value:'1',Status:'Active'}},
        ];
        let mockDb=mkt;
        if(src==='Plecto'||src==='CRM Pipeline')mockDb=plecto;
        else if(src==='Personio')mockDb=personio;
        else if(src==='Aircall')mockDb=aircall;
        else if(src!=='Marketing Tracking')mockDb=generic;
        return mockDb.filter(r=>r.name.toLowerCase().includes(ql)||r.detail.toLowerCase().includes(ql)).slice(0,3);
      },
      addSearchResult(sr){
        const rec={...sr._tpl,_included:true};
        this.dtlData.push(rec);
        this.toast='Record added';clearTimeout(this._toastTimer);this._toastTimer=setTimeout(()=>{this.toast='';},2000);
      },
      cpWeekLabel(){const w=this.cellPop.week;if(w===null)return MN[this.cM]+' '+this.cY;return 'CW'+w+' · '+(WR[w]||'');},
      dtlWeekLabel(){const w=this.dtl.week;if(w===null)return MN[this.cM]+' '+this.cY;return 'CW'+w+' · '+(WR[w]||'');},
      stBadgeClass(val){const v=(val||'').toLowerCase();if(['won','show','connected','hired','replied','qualified','completed','active','booked'].includes(v))return'st-won';if(['no show','no answer','bounced','disqualified','lost','cancelled'].includes(v))return'st-bad';return'st-pending';},

      prepareSourceEdit(kpi){
        this.modal.editName=kpi.name||'';this.modal.editFmt=kpi.fmt||'number';this.modal.editAgg=kpi.agg||'total';this.modal.editPeriod=kpi.period||'resets';
        this.modal.editOwner=kpi.ownerId||'';this.modal.editMode=kpi.sourceMode==='manual'?'manual':'connected';
        this.modal.editDb=kpi.db||'';this.modal.editFilters=kpi.filters?.length?kpi.filters.map(f=>({...f})):[{field:'',operator:'is',value:''}];
        this.modal.editDateScope=kpi.dateScope||'week';this.modal.editConfidence=kpi.sourceMode==='auto'?'auto':'review';
      },
      cancelSourceEdit(){this.modal.editing=false;this.prepareSourceEdit(this.modal.kpi);},
      saveSourceEdit(){
        const k=this.modal.kpi;k.name=this.modal.editName;k.fmt=this.modal.editFmt;k.agg=this.modal.editAgg;k.period=this.modal.editPeriod;k.ownerId=this.modal.editOwner;
        if(this.modal.editMode==='manual'){k.sourceMode='manual';k.source='';k.db='';}
        else{k.sourceMode=this.modal.editConfidence;k.db=this.modal.editDb;}
        k.filters=this.modal.editFilters.filter(f=>f.field&&(f.value||this.isUnaryOp(f.operator))).map(f=>({...f}));
        k.dateScope=this.modal.editDateScope;
        this.reCalc(k);this._v++;this.modal.editing=false;
      },
    };
  }
  </script>
