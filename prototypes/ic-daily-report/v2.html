<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IC Daily Report — DXR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: "Inter", system-ui, sans-serif;
      --color-p0: oklch(0.982 0 0); --color-p1: oklch(1 0 0);
      --color-g0: oklch(1 0 0); --color-g1: oklch(0.991 0 0); --color-g2: oklch(0.982 0 0);
      --color-g3: oklch(0.955 0 0); --color-g4: oklch(0.931 0 0); --color-g5: oklch(0.91 0 0);
      --color-g6: oklch(0.885 0 0); --color-g7: oklch(0.851 0 0); --color-g8: oklch(0.792 0 0);
      --color-g9: oklch(0.643 0 0); --color-g10: oklch(0.507 0 0);
      --color-g11: oklch(0.361 0.003 286.228); --color-g12: oklch(0.21 0.004 286.059);
      --color-a1: oklch(0.994 0.001 286.376); --color-a2: oklch(0.982 0.008 271.33);
      --color-a3: oklch(0.961 0.018 269.09); --color-a4: oklch(0.933 0.032 266.166);
      --color-a5: oklch(0.901 0.048 267.198); --color-a6: oklch(0.857 0.07 268.824);
      --color-a7: oklch(0.804 0.098 270.675); --color-a8: oklch(0.73 0.139 271.732);
      --color-a9: oklch(0.571 0.235 271.643); --color-a10: oklch(0.526 0.213 271.816);
      --color-a11: oklch(0.511 0.213 271.713); --color-a12: oklch(0.312 0.107 271.681);
      --color-y1: oklch(0.994 0.003 84.559); --color-y2: oklch(0.981 0.02 84.59);
      --color-y3: oklch(0.954 0.047 83.943); --color-y4: oklch(0.928 0.065 78.977);
      --color-y5: oklch(0.902 0.086 77.209); --color-y6: oklch(0.866 0.114 74.958);
      --color-y7: oklch(0.823 0.122 68.55); --color-y8: oklch(0.755 0.141 68.718);
      --color-y9: oklch(0.784 0.171 68.907); --color-y10: oklch(0.751 0.141 69.244);
      --color-y11: oklch(0.575 0.132 62.633); --color-y12: oklch(0.353 0.053 69.99);
      --color-d1: oklch(0.993 0.003 17.212); --color-d2: oklch(0.982 0.009 26.017);
      --color-d3: oklch(0.955 0.022 27.81); --color-d4: oklch(0.918 0.042 27.012);
      --color-d5: oklch(0.886 0.06 27.206); --color-d6: oklch(0.853 0.08 26.442);
      --color-d7: oklch(0.806 0.102 26.189); --color-d8: oklch(0.744 0.129 25.796);
      --color-d9: oklch(0.631 0.218 26.103); --color-d10: oklch(0.591 0.22 26.112);
      --color-d11: oklch(0.56 0.218 26.228); --color-d12: oklch(0.34 0.115 26.406);
      --color-s1: oklch(0.994 0.006 137.773); --color-s2: oklch(0.982 0.011 136.559);
      --color-s3: oklch(0.96 0.025 137.807); --color-s4: oklch(0.934 0.04 137.208);
      --color-s5: oklch(0.901 0.058 136.615); --color-s6: oklch(0.858 0.079 136.575);
      --color-s7: oklch(0.798 0.104 136.63); --color-s8: oklch(0.715 0.142 136.47);
      --color-s9: oklch(0.6 0.155 136.544); --color-s10: oklch(0.555 0.142 136.627);
      --color-s11: oklch(0.526 0.141 136.444); --color-s12: oklch(0.326 0.058 136.282);
      --color-alpha-2: oklch(0 0 0 / 0.02); --color-alpha-4: oklch(0 0 0 / 0.04);
      --color-alpha-6: oklch(0 0 0 / 0.06); --color-alpha-8: oklch(0 0 0 / 0.08);
      --color-alpha-10: oklch(0 0 0 / 0.1); --color-alpha-12: oklch(0 0 0 / 0.12);
      --color-alpha-16: oklch(0 0 0 / 0.16); --color-alpha-24: oklch(0 0 0 / 0.24);
      --color-alpha-36: oklch(0 0 0 / 0.36); --color-alpha-48: oklch(0 0 0 / 0.48);
      --color-alpha-80: oklch(0 0 0 / 0.8);
      --text-micro: 10px; --text-micro--font-weight: 450; --text-micro--line-height: 14px;
      --text-micro-medium: 10px; --text-micro-medium--font-weight: 500; --text-micro-medium--line-height: 14px;
      --text-mini: 12px; --text-mini--font-weight: 450; --text-mini--line-height: 15px;
      --text-mini-medium: 12px; --text-mini-medium--font-weight: 500; --text-mini-medium--line-height: 15px;
      --text-sm: 13px; --text-sm--font-weight: 450; --text-sm--line-height: 18px; --text-sm--letter-spacing: -0.28px;
      --text-sm-medium: 13px; --text-sm-medium--font-weight: 500; --text-sm-medium--line-height: 18px; --text-sm-medium--letter-spacing: -0.28px;
      --text-regular: 14px; --text-regular--font-weight: 450; --text-regular--line-height: 20px; --text-regular--letter-spacing: -0.13px;
      --text-regular-medium: 14px; --text-regular-medium--font-weight: 500; --text-regular-medium--line-height: 20px; --text-regular-medium--letter-spacing: -0.13px;
      --radius-0: 0px; --radius-2: 2px; --radius-4: 4px; --radius-6: 6px; --radius-8: 8px; --radius-10: 10px; --radius-12: 12px; --radius-full: 999px;
      --shadow-xs: 0 0 0 1px var(--color-alpha-6), 0 1px 3px 0 var(--color-alpha-4);
      --shadow-md: 0px 0px 1px 0px rgba(0,0,0,.27), 0px 4px 6px -1px rgba(0,0,0,.1), 0px 2px 4px -2px rgba(0,0,0,.1);
      --shadow-lg: 0px 0px 1px 0px rgba(0,0,0,.20), 0px 10px 15px -3px rgba(0,0,0,.1), 0px 4px 6px -4px rgba(0,0,0,.1);
      --duration-fast: 120ms; --duration-normal: 200ms; --duration-slow: 300ms;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1); --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }
    [x-cloak]{display:none!important}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type=number]{-moz-appearance:textfield}

    .kg{border-collapse:separate;border-spacing:0;width:100%;table-layout:fixed;border-left:1px solid var(--color-g11);border-top:1px solid var(--color-g11)}
    .kg th,.kg td{border-right:1px solid var(--color-g11);border-bottom:1px solid var(--color-g11);padding:0 10px;text-align:center;vertical-align:middle;height:36px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .kg th{background:var(--color-g11);color:var(--color-g7);height:32px}
    .kg td{background:var(--color-g12);color:var(--color-g3)}
    .kg td:first-child,.kg th:first-child{text-align:left;overflow:visible}
    .kg td.st-cell{overflow:visible}
    .kg .dh td{background:var(--color-a9);color:white;font-weight:600;border-color:var(--color-a10);letter-spacing:.3px}
    .pc-g{background:var(--color-s6)!important;color:var(--color-s12)!important;font-weight:500}
    .pc-y{background:var(--color-y6)!important;color:var(--color-y12)!important;font-weight:500}
    .pc-r{background:var(--color-d6)!important;color:var(--color-d12)!important;font-weight:500}
    .sc-g{background:var(--color-s7)!important;color:var(--color-s12)!important}
    .sc-y{background:var(--color-y7)!important;color:var(--color-y12)!important}
    .sc-r{background:var(--color-d8)!important;color:var(--color-d12)!important}
    .wk{color:var(--color-g6)}
    .kg input.ei{border:none;padding:0;margin:0;height:100%;background:transparent;font:inherit;color:inherit;text-align:center;outline:none;width:100%;cursor:default}
    .kg input.ei:focus{cursor:text;background:var(--color-g11);border-radius:2px}
    .pace-cell{position:relative;cursor:default}
    .pace-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--color-g11);color:var(--color-g3);padding:5px 10px;border-radius:var(--radius-4);font-size:11px;font-weight:400;white-space:nowrap;z-index:30;pointer-events:none;box-shadow:var(--shadow-md)}
    .pace-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--color-g11)}
    .pace-cell:hover .pace-tip{display:block}
    .st-drop{background:var(--color-g12);border:1px solid var(--color-g10)}
    .st-drop button:hover{background:var(--color-g11)}
    .kg td.cell-conn{cursor:pointer;position:relative}
    .kg td.cell-conn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--color-a8);opacity:0;transition:opacity 120ms}
    .kg td.cell-conn:hover::after{opacity:1}

    .cd-pop{position:fixed;z-index:60;width:340px;max-height:420px;background:var(--color-p1);border:1px solid var(--color-g4);border-radius:var(--radius-8);box-shadow:var(--shadow-lg);overflow:hidden;display:flex;flex-direction:column}
    .cd-pop-body{overflow-y:auto;flex:1;min-height:0}
    .cd-pop table{width:100%;border-collapse:collapse}
    .cd-pop th{text-align:left;padding:6px 10px;font-size:11px;font-weight:500;color:var(--color-g10);border-bottom:1px solid var(--color-g4);background:var(--color-g2)}
    .cd-pop td{padding:5px 10px;font-size:12px;color:var(--color-g11);border-bottom:1px solid var(--color-g3)}
    .cd-pop tr:last-child td{border-bottom:0}
    .cd-pop tr:hover td{background:var(--color-g2)}

    .eod-modal{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center}
    .eod-inner{background:var(--color-p1);border-radius:var(--radius-12);box-shadow:var(--shadow-lg);width:90%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
  </style>
</head>
<body class="bg-p0 font-sans antialiased" x-data="app()" x-cloak>

  <!-- ═══ HEADER ═══ -->
  <header class="sticky top-0 z-30 flex items-center justify-between border-b border-g4 bg-p1 px-6 py-2.5">
    <div class="flex items-center gap-3">
      <div class="flex h-7 w-7 items-center justify-center rounded-6 bg-a9 text-mini-medium text-white">D</div>
      <span class="text-regular-medium text-g12">DXR KPIs</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="relative" x-data="{open:false}">
        <button @click="open=!open" class="flex items-center gap-2 rounded-6 bg-g2 px-3 py-1.5 text-sm text-g11 shadow-xs hover:bg-g3 transition-colors">
          <svg class="h-4 w-4 text-g8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
          <span x-text="userName(uid)"></span>
          <svg class="h-3.5 w-3.5 text-g8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div x-show="open" @click.away="open=false" x-transition class="absolute right-0 top-full mt-1 w-64 rounded-8 bg-p1 shadow-lg border border-g4 z-40 p-1 max-h-72 overflow-y-auto">
          <template x-for="u in users" :key="u.id">
            <button class="w-full text-left rounded-6 px-3 py-2 text-sm transition-colors flex items-center justify-between" :class="uid===u.id?'bg-a3 text-a11':'text-g11 hover:bg-g3'" @click="uid=u.id;eodState='pending';open=false">
              <div class="flex items-center gap-2">
                <span x-text="u.name"></span>
                <span class="inline-flex rounded-full px-1.5 py-0.5 text-micro-medium whitespace-nowrap" :class="deptChipClass(u.dept)" x-text="u.role"></span>
              </div>
              <svg x-show="uid===u.id" class="h-4 w-4 text-a9 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
          </template>
        </div>
      </div>
      <div class="flex items-center gap-1">
        <button class="rounded-4 p-1 text-g9 hover:bg-g3 hover:text-g11 transition-colors" @click="cM===0?(cM=11,cY--):cM--"><svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg></button>
        <span class="min-w-24 text-center text-sm-medium text-g11" x-text="MN[cM]+' '+cY"></span>
        <button class="rounded-4 p-1 text-g9 hover:bg-g3 hover:text-g11 transition-colors" @click="cM===11?(cM=0,cY++):cM++"><svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></button>
      </div>
    </div>
  </header>

  <main class="mx-auto px-6 py-5" style="max-width:1400px" @click="openSt=null;closePop()">

    <!-- ═══ ZONE 1: EOD PROMPT CARD ═══ -->
    <template x-if="myKpis.length>0">
      <div class="mb-5">

        <!-- Pending state -->
        <div x-show="eodState==='pending'" class="rounded-10 bg-p1 border border-g4 shadow-xs flex items-center justify-between px-4 py-3.5 transition-all">
          <div class="flex items-center gap-3">
            <div class="flex h-8 w-8 items-center justify-center rounded-8 bg-a3 shrink-0">
              <svg class="h-4 w-4 text-a11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>
            </div>
            <div>
              <p class="text-sm-medium text-g12">End-of-Day Report</p>
              <p class="text-mini text-g9"><span x-text="manualCount"></span> KPI<span x-text="manualCount!==1?'s':''"></span> need your input · <span x-text="todayLabel"></span></p>
            </div>
          </div>
          <button class="rounded-6 bg-a9 px-3.5 py-1.5 text-sm text-white shadow-xs hover:bg-a10 transition-colors flex items-center gap-1.5" @click="openEod()">
            Complete Report
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>

        <!-- Submitted state -->
        <div x-show="eodState==='submitted'" class="rounded-10 bg-p1 border border-s5 shadow-xs flex items-center justify-between px-4 py-3.5 transition-all">
          <div class="flex items-center gap-3">
            <div class="flex h-8 w-8 items-center justify-center rounded-8 bg-s3 shrink-0">
              <svg class="h-4 w-4 text-s11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div>
              <p class="text-sm-medium text-g12">EOD Report Submitted</p>
              <p class="text-mini text-g9">Submitted at <span x-text="eodTime"></span> · <span x-text="todayLabel"></span></p>
            </div>
          </div>
          <button class="rounded-6 px-3 py-1.5 text-sm text-g9 hover:bg-g3 hover:text-g11 transition-colors" @click="openEod()">Edit Report</button>
        </div>

        <!-- Day off state -->
        <div x-show="eodState==='dayoff'" class="rounded-10 bg-p1 border border-g4 shadow-xs flex items-center justify-between px-4 py-3.5 transition-all">
          <div class="flex items-center gap-3">
            <div class="flex h-8 w-8 items-center justify-center rounded-8 bg-g2 shrink-0">
              <svg class="h-4 w-4 text-g8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
            </div>
            <div>
              <p class="text-sm-medium text-g12">Marked as Day Off</p>
              <p class="text-mini text-g9"><span x-text="todayLabel"></span></p>
            </div>
          </div>
          <button class="rounded-6 px-3 py-1.5 text-sm text-g9 hover:bg-g3 hover:text-g11 transition-colors" @click="eodState='pending'">Undo</button>
        </div>

      </div>
    </template>

    <!-- ═══ EMPTY STATE ═══ -->
    <template x-if="myKpis.length===0">
      <div class="rounded-8 bg-p1 shadow-xs py-20 text-center">
        <div class="w-12 h-12 rounded-10 bg-g2 flex items-center justify-center mx-auto mb-4">
          <svg class="h-6 w-6 text-g8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
        </div>
        <p class="text-sm text-g11">No KPIs assigned to you</p>
        <p class="text-mini text-g9 mt-1">Talk to your team lead to get set up.</p>
      </div>
    </template>

    <!-- ═══ ZONE 3: KPI OVERVIEW TABLE ═══ -->
    <template x-if="myKpis.length>0">
      <div class="space-y-4">
        <div class="flex items-center justify-between mb-1">
          <h2 class="text-sm-medium text-g11"><span x-text="userName(uid)"></span> — KPI Overview</h2>
          <p class="text-mini text-g9" x-text="MN[cM]+' '+cY+' · CW'+CW"></p>
        </div>
        <template x-for="grp in grouped" :key="grp.path">
          <div class="overflow-x-auto rounded-8">
            <div style="min-width:1060px">
              <table class="kg text-sm">
                <thead><tr>
                  <th style="width:220px" class="sc"><span class="text-mini-medium text-g7" x-text="grp.path"></span></th>
                  <th style="width:100px" class="text-mini-medium text-g7">Target</th>
                  <th style="width:100px" class="text-mini-medium text-g7">Actual</th>
                  <th style="width:110px" class="text-mini-medium text-g7">Pace</th>
                  <th style="width:130px" class="text-mini-medium text-g7">Status</th>
                  <template x-for="(w,wi) in WK" :key="w">
                    <th style="width:90px" class="text-mini-medium" :class="w===CW?'text-a7':'text-g7'" :style="(wi===0?'border-left:2px solid var(--color-a8)':'')+(w===CW?';background:var(--color-a12)':'')"><div x-text="'W'+(wi+1)"></div><div class="text-micro font-normal" :class="w===CW?'text-a7':'text-g8'" x-text="WR[w]"></div></th>
                  </template>
                </tr></thead>
                <tbody>
                  <template x-for="k in grp.kpis" :key="k.id">
                    <tr>
                      <td class="sc" style="background:var(--color-g12)">
                        <span class="text-g3" x-text="k.name"></span>
                        <span class="text-micro text-g8 ml-1" x-text="aggLabel(k.agg)"></span>
                      </td>
                      <td class="tabular-nums text-g5"><span x-text="F(k.target,k.fmt)"></span></td>
                      <td class="tabular-nums font-medium text-g2" :class="isConn(k)?'cell-conn':''" @click.stop="if(isConn(k))openPop(k,$event.currentTarget)"><span x-text="k.actual!==null?F(k.actual,k.fmt):'—'"></span></td>
                      <td class="tabular-nums font-medium" :class="(k.pv!==null?pcC(k.pr):'')+' '+(k.pv!==null?'pace-cell':'')">
                        <span x-text="k.pv!==null?F(k.pv,k.fmt):'—'"></span>
                        <template x-if="k.pv!==null"><span class="pace-tip">Projected end-of-month at current pace</span></template>
                      </td>
                      <td :class="scC(k.status)+' st-cell'" class="relative">
                        <template x-if="k.actual!==null"><div>
                          <button class="w-full flex items-center justify-center gap-1" @click.stop="openSt=openSt===k.id?null:k.id"><span x-text="scL(k.status)"></span><svg class="h-3 w-3 opacity-40 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg></button>
                          <div x-show="openSt===k.id" x-transition.opacity class="absolute left-1/2 -translate-x-1/2 top-full mt-0.5 z-20 w-40 rounded-8 p-1 st-drop shadow-md">
                            <template x-for="s in STS" :key="s"><button class="flex w-full items-center gap-2 rounded-6 px-3 py-1.5 text-sm text-g3 transition-colors" @click.stop="k.status=s;openSt=null"><span class="inline-block h-3 w-6 rounded-2" :class="scC(s)"></span><span x-text="scL(s)"></span></button></template>
                          </div>
                        </div></template>
                        <template x-if="k.actual===null"><span class="text-g9">—</span></template>
                      </td>
                      <template x-for="(w,wi) in WK" :key="w">
                        <td :style="(wi===0?'border-left:2px solid var(--color-a8)':'')+(w===CW?';background:var(--color-a12)':'')" :class="isConn(k)&&k.weekly?.[w]!==undefined?'cell-conn':''">
                          <template x-if="w===CW && !isConn(k)">

      if(src==='Plecto')return['Name','Date','Value','Stage'];if(src==='Aircall')return['Contact','Date','Duration','Outcome'];
      if(src==='Instantly')return['Recipient','Date','Subject','Status'];if(src==='YouTube')return['Video','Date','Views','Watchtime'];
      if(src==='Personio')return['Candidate','Date','Position','Stage'];if(src==='DATEV')return['Category','Month','Amount','Type'];
      if(src==='Airtable')return['Name','Date','Source','Status'];if(src==='AI Tool')return['Contact','Date','Score','Outcome'];
      if(src==='Marketing Tracking')return['Name','Booking Date','UTM Source','Status','Revenue'];
      return['Name','Date','Value','Status'];
    }

    function groupBy(kpis){
      const map=new Map();
      for(const k of kpis){
        if(!map.has(k.path))map.set(k.path,{path:k.path,kpis:[]});
        map.get(k.path).kpis.push(k);
      }
      return Array.from(map.values());
    }

    return{
      uid:'u4',
      users,
      cM:2,cY:2026,MN,WK,CW,WR,STS,
      openSt:null,
      eodOpen:false,
      eodState:'pending',
      eodTime:'',
      toast:'',
      pop:{open:false,kpi:null,x:0,y:0,recs:[],cols:[]},

      get myKpis(){return allKpis.filter(k=>k.ownerId===this.uid);},
      get manualCount(){return this.myKpis.filter(k=>k.sourceMode==='manual').length;},
      get grouped(){return groupBy(this.myKpis);},
      get modalKpis(){return this.myKpis;},
      get modalGrouped(){return groupBy(this.modalKpis);},
      get filledCount(){return this.modalKpis.filter(k=>this.isConn(k)?k.weekly?.[CW]!==undefined:k.weekly?.[CW]!==undefined).length;},
      get todayLabel(){return'Thursday, 12 Mar 2026';},

      userName(id){return users.find(u=>u.id===id)?.name||'Unknown';},
      deptChipClass(dept){return deptColors[dept]||'bg-g3 text-g10';},
      aggLabel(a){return{total:'Total',average:'Avg',max:'Max',manual:'Manual'}[a]||'Total';},
      isConn(k){return k.sourceMode!=='manual'&&(k.db||k.source);},

      F(v,fmt){
        if(v===null||v===undefined)return'—';
        if(fmt==='currency'){if(Math.abs(v)>=1000)return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);return new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:2}).format(v);}
        if(fmt==='percentage'){const r=Math.round(v*10)/10;return(r%1===0?r.toFixed(0):r.toFixed(1).replace('.',','))+'%';}
        if(typeof v==='number'){if(v>=1000)return new Intl.NumberFormat('de-DE').format(Math.round(v));return String(Math.round(v*10)/10).replace('.',',');}
        return String(v);
      },
      pcC(r){if(!r)return'';if(r>=1)return'pc-g';if(r>=0.8)return'pc-y';return'pc-r';},
      scC(s){return{green:'sc-g',yellow:'sc-y',red:'sc-r'}[s]||'';},
      scL(s){return{green:'On-Track',yellow:'Behind',red:'Off Track'}[s]||'—';},

      reCalc(k){
        const vs=Object.values(k.weekly||{}).filter(x=>x!==undefined&&x!==null);
        if(!vs.length){k.actual=null;k.pv=null;k.pr=0;return;}
        k.actual=k.agg==='average'?vs.reduce((a,b)=>a+b,0)/vs.length:vs.reduce((a,b)=>a+b,0);
        const p=k.actual/DE*DM;k.pv=k.fmt==='percentage'?Math.round(p*10)/10:Math.round(p);k.pr=k.target?p/k.target:0;
        if(k.target)k.status=k.pr>=1?'green':k.pr>=0.8?'yellow':'red';
      },

      openEod(){this.eodOpen=true;},
      submitReport(){
        const now=new Date();
        this.eodTime=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
        this.eodState='submitted';
        this.eodOpen=false;
        this.toast='EOD Report submitted';
        setTimeout(()=>{this.toast='';},2500);
      },
      markDayOff(){
        this.eodState='dayoff';
        this.eodOpen=false;
        this.toast='Marked as day off';
        setTimeout(()=>{this.toast='';},2500);
      },
      openPop(kpi,el){
        const r=el.getBoundingClientRect();
        this.pop={open:true,kpi,x:Math.min(r.left,window.innerWidth-360),y:r.bottom+6,recs:genRecs(kpi,CW),cols:getCols(kpi)};
      },
      closePop(){this.pop.open=false;},
    };
  }
  </script>
</body>
