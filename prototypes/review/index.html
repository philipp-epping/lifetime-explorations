<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Queue — Lifetime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <style type="text/tailwindcss">

      --font-sans: "Inter", system-ui, sans-serif;

      --color-p0: oklch(0.982 0 0);
      --color-p1: oklch(1 0 0);

      --color-g0: oklch(1 0 0);
      --color-g1: oklch(0.991 0 0);
      --color-g2: oklch(0.982 0 0);
      --color-g3: oklch(0.955 0 0);
      --color-g4: oklch(0.931 0 0);
      --color-g5: oklch(0.91 0 0);
      --color-g6: oklch(0.885 0 0);
      --color-g7: oklch(0.851 0 0);
      --color-g8: oklch(0.792 0 0);
      --color-g9: oklch(0.643 0 0);
      --color-g10: oklch(0.507 0 0);
      --color-g11: oklch(0.361 0.003 286.228);
      --color-g12: oklch(0.21 0.004 286.059);

      --color-a1: oklch(0.994 0.001 286.376);
      --color-a2: oklch(0.982 0.008 271.33);
      --color-a3: oklch(0.961 0.018 269.09);
      --color-a4: oklch(0.933 0.032 266.166);
      --color-a5: oklch(0.901 0.048 267.198);
      --color-a6: oklch(0.857 0.07 268.824);
      --color-a7: oklch(0.804 0.098 270.675);
      --color-a8: oklch(0.73 0.139 271.732);
      --color-a9: oklch(0.571 0.235 271.643);
      --color-a10: oklch(0.526 0.213 271.816);
      --color-a11: oklch(0.511 0.213 271.713);
      --color-a12: oklch(0.312 0.107 271.681);

      --color-y1: oklch(0.994 0.003 84.559);
      --color-y2: oklch(0.981 0.02 84.59);
      --color-y3: oklch(0.954 0.047 83.943);
      --color-y4: oklch(0.928 0.065 78.977);
      --color-y5: oklch(0.902 0.086 77.209);
      --color-y6: oklch(0.866 0.114 74.958);
      --color-y7: oklch(0.823 0.122 68.55);
      --color-y8: oklch(0.755 0.141 68.718);
      --color-y9: oklch(0.784 0.171 68.907);
      --color-y10: oklch(0.751 0.141 69.244);
      --color-y11: oklch(0.575 0.132 62.633);
      --color-y12: oklch(0.353 0.053 69.99);

      --color-d1: oklch(0.993 0.003 17.212);
      --color-d2: oklch(0.982 0.009 26.017);
      --color-d3: oklch(0.955 0.022 27.81);
      --color-d4: oklch(0.918 0.042 27.012);
      --color-d5: oklch(0.886 0.06 27.206);
      --color-d6: oklch(0.853 0.08 26.442);
      --color-d7: oklch(0.806 0.102 26.189);
      --color-d8: oklch(0.744 0.129 25.796);
      --color-d9: oklch(0.631 0.218 26.103);
      --color-d10: oklch(0.591 0.22 26.112);
      --color-d11: oklch(0.56 0.218 26.228);
      --color-d12: oklch(0.34 0.115 26.406);

      --color-s1: oklch(0.994 0.006 137.773);
      --color-s2: oklch(0.982 0.011 136.559);
      --color-s3: oklch(0.96 0.025 137.807);
      --color-s4: oklch(0.934 0.04 137.208);
      --color-s5: oklch(0.901 0.058 136.615);
      --color-s6: oklch(0.858 0.079 136.575);
      --color-s7: oklch(0.798 0.104 136.63);
      --color-s8: oklch(0.715 0.142 136.47);
      --color-s9: oklch(0.6 0.155 136.544);
      --color-s10: oklch(0.555 0.142 136.627);
      --color-s11: oklch(0.526 0.141 136.444);
      --color-s12: oklch(0.326 0.058 136.282);

      --color-alpha-2: oklch(0 0 0 / 0.02);
      --color-alpha-4: oklch(0 0 0 / 0.04);
      --color-alpha-6: oklch(0 0 0 / 0.06);
      --color-alpha-8: oklch(0 0 0 / 0.08);
      --color-alpha-10: oklch(0 0 0 / 0.1);
      --color-alpha-12: oklch(0 0 0 / 0.12);
      --color-alpha-16: oklch(0 0 0 / 0.16);
      --color-alpha-24: oklch(0 0 0 / 0.24);
      --color-alpha-36: oklch(0 0 0 / 0.36);
      --color-alpha-48: oklch(0 0 0 / 0.48);
      --color-alpha-80: oklch(0 0 0 / 0.8);

      --text-micro: 10px;
      --text-micro--font-weight: 450;
      --text-micro--line-height: 14px;
      --text-micro-medium: 10px;
      --text-micro-medium--font-weight: 500;
      --text-micro-medium--line-height: 14px;
      --text-mini: 12px;
      --text-mini--font-weight: 450;
      --text-mini--line-height: 15px;
      --text-mini-medium: 12px;
      --text-mini-medium--font-weight: 500;
      --text-mini-medium--line-height: 15px;
      --text-sm: 13px;
      --text-sm--font-weight: 450;
      --text-sm--line-height: 18px;
      --text-sm--letter-spacing: -0.28px;
      --text-sm-medium: 13px;
      --text-sm-medium--font-weight: 500;
      --text-sm-medium--line-height: 18px;
      --text-sm-medium--letter-spacing: -0.28px;
      --text-regular: 14px;
      --text-regular--font-weight: 450;
      --text-regular--line-height: 20px;
      --text-regular--letter-spacing: -0.13px;
      --text-regular-medium: 14px;
      --text-regular-medium--font-weight: 500;
      --text-regular-medium--line-height: 20px;
      --text-regular-medium--letter-spacing: -0.13px;

      --radius-0: 0px;
      --radius-2: 2px;
      --radius-4: 4px;
      --radius-6: 6px;
      --radius-8: 8px;
      --radius-10: 10px;
      --radius-12: 12px;
      --radius-full: 999px;

      --shadow-xs: 0 0 0 1px var(--color-alpha-6), 0 1px 3px 0 var(--color-alpha-4);
      --shadow-md: 0px 0px 1px 0px rgba(0, 0, 0, 0.27), 0px 4px 6px -1px rgba(0, 0, 0, 0.1), 0px 2px 4px -2px rgba(0, 0, 0, 0.1);

      --duration-fast: 120ms;
      --duration-normal: 200ms;
      --duration-slow: 300ms;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-p0 font-sans antialiased">

  <div x-data="reviewQueue()" x-cloak @keydown.window="handleKeydown($event)" class="h-screen flex flex-col">

    <!-- Hidden file input for upload -->
    <input type="file" data-file-input class="hidden" accept=".pdf,.png,.jpg,.jpeg" @change="handleFileUpload($event)">

    <!-- ===== CHECKPOINT: deferred items ===== -->
    <div x-show="completionState === 'checkpoint'" x-transition.opacity.duration.300ms class="flex-1 flex items-center justify-center">
      <div class="text-center max-w-sm">
        <div class="w-16 h-16 rounded-full bg-y3 mx-auto mb-5 flex items-center justify-center">
          <svg class="w-8 h-8 text-y11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h1 class="text-lg font-semibold text-g12 tracking-tight"><span x-text="deferredCount"></span> items still need attention</h1>
        <p class="text-sm text-g9 mt-2">You reviewed <span class="text-g11 font-medium" x-text="resolvedCount"></span> items. What about the rest?</p>
        <div class="flex flex-col items-center gap-2 mt-6 w-full">
          <button @click="reviewDeferred()" class="w-full rounded-6 bg-a9 px-4 py-2.5 text-sm text-white shadow-xs hover:bg-a10 transition-colors">Review now</button>
          <button @click="markWaitingOnOthers()" class="w-full rounded-6 bg-p1 px-4 py-2.5 text-sm text-g11 shadow-xs hover:bg-g3 transition-colors">Waiting on others</button>
          <button @click="completionState = 'done'" class="text-sm text-g9 hover:text-g11 transition-colors mt-1">Skip for now</button>
        </div>
      </div>
    </div>

    <!-- ===== COMPLETION: done ===== -->
    <div x-show="completionState === 'done'" x-transition.opacity.duration.300ms class="flex-1 flex items-center justify-center">
      <!-- Full celebration: everything resolved, no deferred/blocked -->
      <div x-show="isFullyComplete" class="text-center max-w-sm">
        <div class="w-16 h-16 rounded-full bg-s3 mx-auto mb-5 flex items-center justify-center">
          <svg class="w-8 h-8 text-s11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h1 class="text-lg font-semibold text-g12 tracking-tight" x-text="monthFilter !== 'all' ? monthFilter + ' — done!' : 'All done!'"></h1>
        <p class="text-sm text-g9 mt-2"><span class="text-g11 font-medium" x-text="resolvedCount"></span> items reviewed — ready for export.</p>
        <div class="flex flex-col items-center gap-2 mt-6 w-full">
          <button class="w-full rounded-6 bg-a9 px-4 py-2.5 text-sm text-white shadow-xs hover:bg-a10 transition-colors">View Dashboard</button>
          <div class="flex items-center gap-2 w-full">
            <button class="flex-1 rounded-6 bg-p1 px-4 py-2.5 text-sm text-g11 shadow-xs hover:bg-g3 transition-colors">Export to Tax Advisor</button>
            <button x-show="nextMonth" @click="goToNextMonth()" class="flex-1 rounded-6 bg-p1 px-4 py-2.5 text-sm text-g11 shadow-xs hover:bg-g3 transition-colors" x-text="'Continue to ' + nextMonth"></button>
          </div>
        </div>
      </div>
      <!-- Partial: good progress, but some items blocked/deferred -->
      <div x-show="!isFullyComplete" class="text-center max-w-sm">
        <div class="w-16 h-16 rounded-full bg-a3 mx-auto mb-5 flex items-center justify-center">
          <svg class="w-8 h-8 text-a11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h1 class="text-lg font-semibold text-g12 tracking-tight">Nice work!</h1>
        <p class="text-sm text-g9 mt-2">
          <span class="text-g11 font-medium" x-text="resolvedCount"></span> of <span x-text="filteredItems.length"></span> items reviewed.
          <span x-show="blockedCount > 0" class="text-g9" x-text="blockedCount + ' waiting on others.'"></span>
          <span x-show="blockedCount === 0 && deferredCount > 0" class="text-g9" x-text="deferredCount + ' skipped for now.'"></span>
        </p>
        <div class="flex flex-col items-center gap-2 mt-6 w-full">
          <button x-show="nextMonth" @click="goToNextMonth()" class="w-full rounded-6 bg-a9 px-4 py-2.5 text-sm text-white shadow-xs hover:bg-a10 transition-colors" x-text="'Continue to ' + nextMonth"></button>
          <button class="w-full rounded-6 bg-p1 px-4 py-2.5 text-sm text-g11 shadow-xs hover:bg-g3 transition-colors">Exit</button>
        </div>
      </div>
    </div>

    <!-- ===== ACTIVE REVIEW ===== -->
    <template x-if="completionState === 'active' && filteredItems.length > 0">
      <div class="flex-1 flex flex-col min-h-0">

        <!-- Top bar -->
        <div class="flex items-center gap-4 px-5 h-13 border-b border-g4 bg-p1 shrink-0">
          <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" class="flex items-center gap-1.5 rounded-6 px-2.5 py-1.5 text-sm text-g11 hover:bg-g3 transition-colors">
              <svg class="w-4 h-4 text-g9" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span x-text="monthFilter === 'all' ? 'All months' : monthFilter"></span>
              <svg class="w-3 h-3 text-g9" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div x-show="open" @click.away="open = false" x-transition.opacity
                 class="absolute left-0 top-full mt-1 z-30 w-48 rounded-8 bg-p1 shadow-md py-1">
              <template x-for="m in monthOptions" :key="m.value">
                <button @click="setMonthFilter(m.value); open = false"
                        :class="monthFilter === m.value ? 'bg-g3 text-g12' : 'text-g11'"
                        class="flex items-center justify-between w-full px-3 py-1.5 text-sm hover:bg-g3 transition-colors text-left">
                  <span x-text="m.label"></span>
                  <span class="text-mini text-g9" x-text="m.count"></span>
                </button>
              </template>
            </div>
          </div>

          <div class="flex items-center gap-3 ml-auto">
            <span class="text-sm-medium text-g12">Review</span>
            <span class="text-sm text-g9 tabular-nums">
              <span class="text-g11" x-text="currentIndex + 1"></span> of <span x-text="filteredItems.length"></span>
            </span>
          </div>

          <button class="flex items-center gap-1.5 ml-auto text-sm text-g9 hover:text-g11 transition-colors">
            <span>Exit</span>
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <!-- Progress bar -->
        <div class="h-1 bg-g3 shrink-0">
          <div class="h-full bg-a9 transition-all duration-slow ease-out" :style="`width: ${progressPercent}%`"></div>
        </div>

        <!-- Split view -->
        <div class="flex-1 flex min-h-0">
          <div x-show="showContent"
               x-transition:enter="transition ease-out duration-200"
               x-transition:enter-start="opacity-0 translate-y-1"
               x-transition:enter-end="opacity-100 translate-y-0"
               x-transition:leave="transition ease-in duration-150"
               x-transition:leave-start="opacity-100 translate-y-0"
               x-transition:leave-end="opacity-0 -translate-y-1"
               class="flex-1 flex min-h-0">

            <!-- LEFT PANEL -->
            <div class="w-[55%] border-r border-g4 bg-p1 overflow-y-auto p-6">
              <template x-if="currentItem">
                <div>
                  <!-- Transaction info -->
                  <div class="mb-5">
                    <div class="flex items-start justify-between mb-0.5">
                      <h2 class="text-regular-medium text-g12" x-text="currentItem.counterparty"></h2>
                      <span class="text-regular-medium text-g12 tabular-nums shrink-0 ml-4" x-text="formatAmount(currentItem.amount)"></span>
                    </div>
                    <p class="text-sm text-g9 mb-2" x-text="currentItem.description"></p>
                    <div class="flex items-center gap-2 text-mini text-g9">
                      <span x-text="formatDate(currentItem.date)"></span>
                      <span>·</span>
                      <span>from</span>
                      <div class="flex items-center gap-1.5">
                        <div class="w-4 h-4 rounded-4 bg-d9 flex items-center justify-center">
                          <svg class="w-2.5 h-2.5 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
                        </div>
                        <span class="text-g11" x-text="currentItem.accountName"></span>
                      </div>
                    </div>
                  </div>

                  <!-- Private badge -->
                  <div x-show="currentItem.isPrivate" class="mb-4 flex items-center gap-2 rounded-6 bg-g3 px-3 py-2">
                    <svg class="w-4 h-4 text-g10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    <span class="text-sm text-g11">Private transaction</span>
                    <button @click="currentItem.isPrivate = false" class="text-mini text-a11 hover:text-a12 ml-auto">Remove</button>
                  </div>

                  <!-- ☐/✓ Category -->
                  <div class="border-t border-g4 pt-4">
                    <div class="flex items-center gap-2 mb-3">
                      <div x-show="currentItem.selectedCategory" class="w-4 h-4 rounded-full bg-s9 flex items-center justify-center">
                        <svg class="w-2.5 h-2.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                      </div>
                      <div x-show="!currentItem.selectedCategory" class="w-4 h-4 rounded-full border-2 border-g5"></div>
                      <h3 class="text-sm-medium" :class="currentItem.selectedCategory ? 'text-g12' : 'text-g11'">Category</h3>
                    </div>

                    <!-- Selected category card -->
                    <div x-show="currentItem.selectedCategory && !showCategoryBrowser" class="rounded-8 shadow-xs overflow-hidden">
                      <div class="flex items-center gap-3 px-3 py-2.5 bg-a3">
                        <svg class="w-4 h-4 text-a11 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                        <div class="min-w-0 flex-1">
                          <div class="text-sm text-a12 truncate" x-text="currentItem.selectedCategory"></div>
                          <div class="text-mini text-a11 truncate" x-text="getCategoryPath(currentItem.selectedCategory)"></div>
                        </div>
                        <button @click="openCategoryBrowser()" class="flex items-center gap-1 text-mini text-a11 hover:text-a12 shrink-0">
                          <kbd class="inline-flex items-center justify-center w-4 h-4 rounded-4 bg-a4 text-micro-medium text-a11">C</kbd>
                          Change
                        </button>
                      </div>
                    </div>

                    <!-- Category picker (suggestions + search) -->
                    <div x-show="!currentItem.selectedCategory || showCategoryBrowser" @click.away="revertCategory()">
                      <div class="relative mb-3">
                        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-g9" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        <input type="text"
                               data-category-input
                               x-model="categorySearch"
                               @keydown="handleCategoryKeydown($event)"
                               class="w-full rounded-6 bg-p1 pl-8 pr-3 py-1.5 text-sm text-g12 shadow-xs outline-none placeholder:text-g9 focus:ring-2 focus:ring-a9"
                               placeholder="Search categories...">
                        <!-- Search results dropdown -->
                        <div x-show="categorySearch.length > 0 && categorySearchResults.length > 0" x-transition.opacity
                             class="absolute left-0 right-0 top-full mt-1 z-20 max-h-48 overflow-y-auto rounded-8 bg-p1 shadow-md py-1">
                          <template x-for="(cat, idx) in categorySearchResults" :key="cat.name">
                            <button @click="selectCategory(cat.name)"
                                    class="flex items-center gap-3 w-full px-3 py-2 text-left transition-colors"
                                    :class="_categoryHighlight === idx ? 'bg-a3' : 'hover:bg-g3'">
                              <div class="min-w-0">
                                <div class="text-sm text-g12 truncate" x-text="cat.name"></div>
                                <div class="text-mini text-g9 truncate" x-text="cat.path"></div>
                              </div>
                            </button>
                          </template>
                          <div x-show="categorySearchResults.length === 0" class="px-3 py-2 text-sm text-g9">No categories found</div>
                        </div>
                      </div>

                      <!-- AI suggestions (when not searching) -->
                      <div x-show="currentItem.suggestions.length > 0 && categorySearch.length === 0" class="rounded-8 shadow-xs overflow-hidden">
                        <template x-for="(sug, idx) in currentItem.suggestions" :key="sug.name">
                          <button @click="selectCategory(sug.name)"
                                  class="flex items-center gap-3 w-full px-3 py-2.5 text-left transition-colors border-b border-g4 last:border-b-0"
                                  :class="_categoryHighlight === idx ? 'bg-a3' : (sug.ai ? 'bg-a2 hover:bg-a3' : 'hover:bg-g3')">
                            <span class="w-5 h-5 rounded-4 bg-g3 flex items-center justify-center text-micro-medium text-g10 shrink-0" x-text="idx + 1"></span>
                            <div class="min-w-0 flex-1">
                              <div class="text-sm text-g12 truncate" x-text="sug.name"></div>
                              <div class="text-mini text-g9 truncate" x-text="sug.path"></div>
                            </div>
                            <template x-if="sug.ai">
                              <span class="inline-flex items-center gap-1 rounded-full bg-a3 px-1.5 py-0.5 text-micro-medium text-a11 shrink-0">
                                <svg class="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
                                AI suggestion
                              </span>
                            </template>
                          </button>
                        </template>
                      </div>

                      <!-- Full category browser (Change mode) -->
                      <div x-show="showCategoryBrowser && categorySearch.length === 0 && currentItem.suggestions.length === 0" class="rounded-8 shadow-xs overflow-hidden max-h-56 overflow-y-auto">
                        <template x-for="cat in categories" :key="cat.name">
                          <button @click="selectCategory(cat.name)"
                                  class="flex items-center gap-3 w-full px-3 py-2 text-left hover:bg-g3 transition-colors border-b border-g4 last:border-b-0">
                            <div class="min-w-0">
                              <div class="text-sm text-g12 truncate" x-text="cat.name"></div>
                              <div class="text-mini text-g9 truncate" x-text="cat.path"></div>
                            </div>
                          </button>
                        </template>
                      </div>
                    </div>
                  </div>

                  <!-- ☐/✓ Receipt -->
                  <div x-show="showReceiptSection && !currentItem.isPrivate"
                       x-transition:enter="transition ease-out duration-300"

                      </div>

                      <button @click="triggerUpload()" class="mt-2 flex items-center gap-1.5 text-mini text-a11 hover:text-a12">

                    </div>
                  </div>

            </div>

            <!-- RIGHT PANEL (preview only) -->

                        <div class="text-sm-medium text-g12" x-text="currentItem.counterparty"></div>

                      </div>
                      <div class="flex justify-between text-sm text-g9">

                        <span class="text-g11" x-text="formatAmount(currentItem.amount)"></span>
                      </div>
                      <div class="border-t border-g4 mt-3 pt-3 flex justify-between text-sm-medium text-g12">

                        <span x-text="formatAmount(currentItem.amount)"></span>
                      </div>
                      <div class="text-center mt-4 text-mini text-g9" x-text="formatDate(currentItem.date)"></div>

                  </div>

                </div>

            </div>
          </div>
        </div>

        <!-- Shortcut bar -->
        <div class="flex items-center px-5 h-11 border-t border-g4 bg-p1 shrink-0">
          <button @click="goBack()" :disabled="currentIndex === 0"

            <button disabled class="flex items-center gap-1.5 text-mini text-g8 cursor-not-allowed">

            <button @click="triggerUpload()" class="flex items-center gap-1.5 text-mini text-g9 hover:text-g11 transition-colors">

            <button @click="togglePrivate()" class="flex items-center gap-1.5 text-mini transition-colors"

                   :class="currentItem?.isPrivate ? 'bg-g12 text-white' : 'bg-g3 text-g10'">P</kbd>
              <span>Private</span>

            <button @click="deferItem()" class="flex items-center gap-1.5 text-mini text-g9 hover:text-g11 transition-colors">
              <kbd class="inline-flex items-center justify-center w-5 h-5 rounded-4 bg-g3 text-micro-medium text-g10">L</kbd>

            </button>
          </div>

          <button @click="goForward()"
                  :class="'text-g9 hover:text-g11'"
                  class="flex items-center gap-1.5 text-mini transition-colors">
            <span>Next</span>
            <kbd class="inline-flex items-center justify-center w-5 h-5 rounded-4 bg-g3 text-micro-medium text-g10">N</kbd>

        </div>

      <div class="text-center max-w-sm">
        <div class="w-16 h-16 rounded-full bg-g3 mx-auto mb-5 flex items-center justify-center">
          <svg class="w-8 h-8 text-g9" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>

        <p class="text-sm text-g9 mt-2">All transactions are categorized and have receipts. You're all set.</p>
      </div>
    </div>

  </div>

        findNextActive(startIdx) {
          const items = this.filteredItems;
          for (let i = startIdx; i < items.length; i++) {
            if (!items[i].resolved && !items[i].deferred && !items[i].blocked) return i;
          }
          return -1;
        },

        reviewDeferred() {
          this.filteredItems.forEach(i => { if (i.deferred) i.deferred = false; });
          this.completionState = 'active';
          this.currentIndex = 0;
          const first = this.findNextActive(0);
          if (first !== -1) this.currentIndex = first;
        },

        transitionTo(newIdx) {
          clearTimeout(this._autoAdvanceTimer);
          this.showContent = false;
          this.showCategoryBrowser = false;
          this._previousCategory = null;
          this.categorySearch = '';
          this.receiptSearch = '';
          this._categoryHighlight = -1;
          setTimeout(() => {
            this.currentIndex = newIdx;
            this.showContent = true;
          }, 160);
        },

        handleDrop(event) {
          this.isDragging = false;
          const files = event.dataTransfer?.files;
          if (files?.length > 0 && this.currentItem) {
            const fileName = files[0].name;
            if (this.currentItem.receiptResolution) {
              if (!this.currentItem.additionalReceipts) this.currentItem.additionalReceipts = [];
              this.currentItem.additionalReceipts.push({ name: fileName, detail: this.formatAmount(this.currentItem.amount) });
            } else {
              this.currentItem.receiptResolution = 'uploaded';
              this.currentItem.matchedReceiptName = fileName;
              this.tryAutoAdvance();
            }
          }
        },

        setMonthFilter(value) {
          this.monthFilter = value;
          this.currentIndex = 0;
          const first = this.findNextActive(0);
          if (first !== -1) this.currentIndex = first;
        },

        handleCategoryKeydown(event) {
          const list = this.categorySearch
            ? this.categorySearchResults
            : this.currentItem?.suggestions || [];

          if (event.key === 'ArrowDown') {
            event.preventDefault();
            this._categoryHighlight = Math.min(this._categoryHighlight + 1, list.length - 1);
            return;
          }
          if (event.key === 'ArrowUp') {
            event.preventDefault();
            this._categoryHighlight = Math.max(this._categoryHighlight - 1, 0);
            return;
          }
          if ((event.key === '1' || event.key === '2' || event.key === '3') && this.categorySearch === '') {
            event.preventDefault();
            const idx = parseInt(event.key) - 1;
            const suggestions = this.currentItem?.suggestions;
            if (suggestions && suggestions[idx]) {
              this.selectCategory(suggestions[idx].name);
              event.target.blur();
            }
            return;
          }
          if (event.key === 'Enter') {
            event.preventDefault();
            if (this._categoryHighlight >= 0 && list[this._categoryHighlight]) {
              this.selectCategory(list[this._categoryHighlight].name);
              event.target.blur();
            } else if (this.categorySearch && this.categorySearchResults.length > 0) {
              this.selectCategory(this.categorySearchResults[0].name);
              this.categorySearch = '';
              event.target.blur();
            } else {
              event.target.blur();
            }
            this._categoryHighlight = -1;
            return;
          }
          if (event.key === 'Escape') {
            event.preventDefault();
            if (this._previousCategory) {
              this.revertCategory();
            } else {
              this.categorySearch = '';
            }
            this._categoryHighlight = -1;
            event.target.blur();
            return;
          }
          this._categoryHighlight = -1;
        },

        handleReceiptKeydown(event) {
          if ((event.key === '1' || event.key === '2') && this.receiptSearch === '') {
            event.preventDefault();
            const idx = parseInt(event.key) - 1;
            const sug = this.currentItem?.receiptSuggestions?.[idx];
            if (sug) {
              this.selectReceipt(sug);
              event.target.blur();
            }
          }
          if (event.key === 'Enter') {
            event.preventDefault();
            if (this.receiptSearch && this.receiptSearchResults.length > 0) {
              this.selectReceipt(this.receiptSearchResults[0]);
              this.receiptSearch = '';
              event.target.blur();
            } else {
              event.target.blur();
            }
          }
          if (event.key === 'Escape') {
            event.preventDefault();
            this.receiptSearch = '';
            event.target.blur();
          }
        },

        handleKeydown(event) {
          if (this.completionState !== 'active') return;
          const isInput = document.activeElement && document.activeElement.tagName === 'INPUT';
          if (isInput) return;

          if (event.key === 'b' || event.key === 'B') {
            event.preventDefault();
            this.goBack();
          }
          if (event.key === 'n' || event.key === 'N') {
            event.preventDefault();
            this.goForward();
          }
          if (event.key === 'c' || event.key === 'C') {
            event.preventDefault();
            this.focusCategory();
          }
          if (event.key === 'r' || event.key === 'R') {
            event.preventDefault();
            this.focusReceipt();
          }
          if (event.key === 'u' || event.key === 'U') {
            event.preventDefault();
            this.triggerUpload();
          }
          if (event.key === 'p' || event.key === 'P') {
            event.preventDefault();
            this.togglePrivate();
          }
          if (event.key === 'l' || event.key === 'L') {
            event.preventDefault();
            this.deferItem();
          }
          if (event.key === '1' || event.key === '2' || event.key === '3') {
            event.preventDefault();
            const idx = parseInt(event.key) - 1;
            const item = this.currentItem;
            if (!item) return;
            if (!item.selectedCategory && item.suggestions?.[idx]) {
              this.selectCategory(item.suggestions[idx].name);
            } else if (item.selectedCategory && item.needsReceipt && !item.receiptResolution && item.receiptSuggestions?.[idx]) {
              this.selectReceipt(item.receiptSuggestions[idx]);
            }
          }
        },

        formatAmount(amount) {
          return '€' + amount.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        },

        formatDate(dateStr) {
          const d = new Date(dateStr + 'T00:00:00');
          return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        },
      };
    }
  </script>
